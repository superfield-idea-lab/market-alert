name: Container Nightly Sanity

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-health-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app_rw
          POSTGRES_PASSWORD: app_rw_password
          POSTGRES_DB: calypso_app
        options: >-
          --health-cmd "pg_isready -U app_rw -d calypso_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build frontend
        run: cd apps/web && bun --bun vite build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          load: true
          push: false
          tags: calypso-nightly:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Initialize databases
        run: psql -f packages/db/init.sql
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: app_rw
          PGPASSWORD: app_rw_password
          PGDATABASE: calypso_app

      - name: Start app container
        run: |
          docker run -d \
            --name calypso \
            --network host \
            -e DATABASE_URL=postgres://app_rw:app_rw_password@localhost:5432/calypso_app \
            -e AUDIT_DATABASE_URL=postgres://audit_w:audit_w_password@localhost:5432/calypso_audit \
            -e ANALYTICS_DATABASE_URL=postgres://analytics_w:analytics_w_password@localhost:5432/calypso_analytics \
            -e JWT_SECRET=ci-smoke-test-secret \
            -e PORT=31415 \
            -e RELEASE_TAG=nightly \
            calypso-nightly:test

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:31415/health; then
              echo ""
              echo "Container is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Health check timed out — container logs:"
          docker logs calypso
          exit 1

      - name: Stop and remove container
        if: always()
        run: docker rm -f calypso || true
