name: Container

on:
  release:
    types: [published]
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/server/**'
      - 'apps/worker/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'Dockerfile.release'
      - 'Dockerfile.worker'
      - 'Dockerfile.agent-worker'
      - '.github/workflows/container.yml'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write

jobs:
  # ── Detect which components changed (used by PR jobs) ─────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Detect changed components
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # On release, always build all components
            echo "app=true" >> "$GITHUB_OUTPUT"
            echo "worker=true" >> "$GITHUB_OUTPUT"
          else
            # On pull_request, check which component files changed
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only HEAD~1 HEAD)

            APP_CHANGED=false
            WORKER_CHANGED=false

            while IFS= read -r file; do
              case "$file" in
                apps/web/*|apps/server/*|packages/*|Dockerfile|Dockerfile.release)
                  APP_CHANGED=true ;;
                apps/worker/*|Dockerfile.worker|Dockerfile.agent-worker)
                  WORKER_CHANGED=true ;;
              esac
            done <<< "$CHANGED"

            echo "app=$APP_CHANGED" >> "$GITHUB_OUTPUT"
            echo "worker=$WORKER_CHANGED" >> "$GITHUB_OUTPUT"
          fi

  # ── PR build: main app image (no push, no release artifacts required) ─────
  build-app-pr:
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.changes.outputs.app == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build main app image (build check only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── PR build: worker image (no push) ─────────────────────────────────────
  build-worker-pr:
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.changes.outputs.worker == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create codex binary stub for build validation
        # Dockerfile.worker requires a codex binary at codex-binary/codex in the
        # build context. For PR build checks we use a minimal stub so the layer
        # copy succeeds without downloading the real binary.
        run: |
          mkdir -p codex-binary
          echo '#!/bin/sh' > codex-binary/codex
          chmod +x codex-binary/codex

      - name: Build worker image (build check only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          tags: ghcr.io/${{ github.repository }}/worker:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release: main application image (Dockerfile.release, with push) ───────
  build-test-push-app:
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && needs.changes.outputs.app == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app_rw
          POSTGRES_PASSWORD: app_rw_password
          POSTGRES_DB: calypso_app
        options: >-
          --health-cmd "pg_isready -U app_rw -d calypso_app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}

      - name: Download web-dist from release
        run: gh release download "${{ github.ref_name }}" --pattern "web-dist.tar.gz"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract web-dist
        run: |
          mkdir -p apps/web/dist
          tar -xzf web-dist.tar.gz -C apps/web/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          load: true
          push: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Initialize databases
        run: bun run packages/db/init-remote.ts
        env:
          ADMIN_DATABASE_URL: postgres://app_rw:app_rw_password@localhost:5432/calypso_app
          APP_RW_PASSWORD: app_rw_password
          AUDIT_W_PASSWORD: audit_w_password
          ANALYTICS_W_PASSWORD: analytics_w_password
          AGENT_CODING_PASSWORD: agent_coding_password
          AGENT_ANALYSIS_PASSWORD: agent_analysis_password
          AGENT_CODE_CLEANUP_PASSWORD: agent_code_cleanup_password
          AGENT_EMAIL_INGEST_PASSWORD: agent_email_ingest_password

      - name: Start app container
        run: |
          docker run -d \
            --name calypso \
            --network host \
            -v "$PWD/packages/db/schema.sql:/app/dist/schema.sql:ro" \
            -e DATABASE_URL=postgres://app_rw:app_rw_password@localhost:5432/calypso_app \
            -e AUDIT_DATABASE_URL=postgres://audit_w:audit_w_password@localhost:5432/calypso_audit \
            -e ANALYTICS_DATABASE_URL=postgres://analytics_w:analytics_w_password@localhost:5432/calypso_analytics \
            -e JWT_SECRET=ci-smoke-test-secret \
            -e PORT=31415 \
            -e RELEASE_TAG=${{ github.ref_name }} \
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:31415/health; then
              echo ""
              echo "Container is healthy"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Health check timed out — container logs:"
          docker logs calypso
          exit 1

      - name: Stop test container
        if: always()
        run: docker rm -f calypso || true

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:latest

  # ── Release: worker image (Dockerfile.worker, with push) ─────────────────
  build-test-push-worker:
    needs: changes
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && needs.changes.outputs.worker == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/worker:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
