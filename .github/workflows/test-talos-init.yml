name: Talos Host Init Tests

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  test-talos-local:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NAMESPACE: calypso-demo

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Start local Docker registry
        run: docker run -d -p 5000:5000 --name registry registry:2

      - name: Build branch image and push to local registry
        run: |
          docker build -t localhost:5000/calypso/calypso-starter-ts:branch-test .
          docker push localhost:5000/calypso/calypso-starter-ts:branch-test

      - name: Install talosctl
        run: curl -sL https://talos.dev/install | sh

      - name: Create local Talos cluster
        run: |
          talosctl cluster create --provisioner docker \
            --workers 0 \
            --registry-mirror localhost:5000=http://172.17.0.1:5000

          # Wait until nodes are ready
          kubectl wait --for=condition=Ready nodes --all --timeout=120s || true

      - name: Run init-host-talos.sh (local mode, branch image)
        run: bash scripts/init-host-talos.sh 127.0.0.1 demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: branch-test
          CALYPSO_IMAGE_REPO: localhost:5000/calypso/calypso-starter-ts

      - name: Verify deployment
        run: bash scripts/ci/verify-init.sh
        env:
          NAMESPACE: calypso-demo
          DB_MODE: local

      - name: App smoke test
        run: bash scripts/ci/app-smoke.sh
        env:
          PORT: '31415'
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUDIT_DATABASE_URL: ${{ env.AUDIT_DATABASE_URL }}
          ANALYTICS_DATABASE_URL: ${{ env.ANALYTICS_DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          PF_PID: ${{ env.PF_PID }}
