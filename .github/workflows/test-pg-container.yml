name: PG container tests

on:
  push:
    branches: [main, 'UX/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-pg-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_SUBMODULE_PAT }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Run PG container tests
        # Docker is available on ubuntu-latest runners by default.
        run: bun --bun vitest run packages/db/pg-container.test.ts
