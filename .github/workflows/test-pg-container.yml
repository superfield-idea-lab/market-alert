name: PG container tests

on:
  push:
    branches: [main, 'UX/**', 'feat/**', 'fix/**']
    paths:
      - 'packages/db/**'
      - 'apps/server/**'
      - '.github/workflows/test-pg-container.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/db/**'
      - 'apps/server/**'
      - '.github/workflows/test-pg-container.yml'
  workflow_dispatch:

concurrency:
  group: test-pg-container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Run PG container tests
        # Docker is available on ubuntu-latest runners by default.
        run: bun --bun vitest run packages/db/pg-container.test.ts packages/db/corpus-chunk-store.test.ts
