name: Lighthouse CI — PWA Baseline

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/src/**'
      - 'apps/web/public/**'
      - '.github/workflows/lighthouse-ci.yml'
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: superfield
          POSTGRES_PASSWORD: superfield
          POSTGRES_DB: superfield
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Dependencies
        run: bun install

      - name: Build web app (includes service worker)
        run: bun run build
        working-directory: apps/web

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://superfield:superfield@localhost:5432/superfield
        run: bun run db:migrate

      - name: Start production preview server
        env:
          DATABASE_URL: postgres://superfield:superfield@localhost:5432/superfield
          AUDIT_DATABASE_URL: postgres://superfield:superfield@localhost:5432/superfield
          ANALYTICS_DATABASE_URL: postgres://superfield:superfield@localhost:5432/superfield
          JWT_SECRET: test-secret-for-lighthouse-ci
          TEST_MODE: 'true'
          PORT: '5174'
        run: |
          bun run scripts/dev-start.ts &
          bunx wait-on http://127.0.0.1:5174 --timeout 60000

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        env:
          LHCI_BUILD_CONTEXT__CURRENT_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: lhci autorun
