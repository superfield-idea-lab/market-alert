name: React Component Tests

on:
  push:
    branches: [main, 'UX/**', 'feat/**', 'fix/**']
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'packages/core/**'
      - 'tests/unit/**'
      - '.github/workflows/test-component.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'packages/core/**'
      - 'tests/unit/**'
      - '.github/workflows/test-component.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install Dependencies
        run: bun install
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run Component Tests
        run: bun --bun vitest run --config apps/web/vitest.browser.config.ts
