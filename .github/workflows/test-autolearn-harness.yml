name: Autolearn state-machine integration harness

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
    paths:
      - 'packages/db/autolearn-state-machine.ts'
      - 'packages/db/schema.sql'
      - 'tests/integration/autolearn-state-machine.spec.ts'
      - 'tests/integration/vitest.config.ts'
      - '.github/workflows/test-autolearn-harness.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/db/autolearn-state-machine.ts'
      - 'packages/db/schema.sql'
      - 'tests/integration/autolearn-state-machine.spec.ts'
      - 'tests/integration/vitest.config.ts'
      - '.github/workflows/test-autolearn-harness.yml'
  workflow_dispatch:

concurrency:
  group: test-autolearn-harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    runs-on: ubuntu-latest
    # Docker is available on ubuntu-latest runners by default.
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Run autolearn state-machine integration harness
        run: bun --bun vitest run --config tests/integration/vitest.config.ts
