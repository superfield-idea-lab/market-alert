name: Host Init Tests

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  # ── Pre-flight: check prerequisite files and release availability ─────────
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has-dockerfile: ${{ steps.check.outputs.has-dockerfile }}
      has-init-host: ${{ steps.check.outputs.has-init-host }}
      has-release: ${{ steps.check.outputs.has-release }}
      release-tag: ${{ steps.check.outputs.release-tag }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "has-dockerfile=$( [ -f Dockerfile ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has-init-host=$( [ -f scripts/init-host.sh ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          RELEASE_TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName 2>/dev/null || true)
          if [[ -n "${RELEASE_TAG}" ]]; then
            echo "has-release=true" >> "$GITHUB_OUTPUT"
            echo "release-tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "has-release=false" >> "$GITHUB_OUTPUT"
            echo "release-tag=" >> "$GITHUB_OUTPUT"
          fi

  # ── Shared setup steps (composite would require a separate action file) ────
  # Each job below follows the same pattern:
  #   1. Install bun + deps
  #   2. Build/load image
  #   3. Install k3s
  #   4. Run init-host.sh
  #   5. scripts/ci/verify-init.sh   ← extracted, runnable locally too
  #   6. scripts/ci/app-smoke.sh     ← extracted, runnable locally too

  # ── Branch integration test — local postgres ─────────────────────────────
  branch-local-mode:
    needs: preflight
    if: github.event_name != 'schedule' && needs.preflight.outputs.has-dockerfile == 'true' && needs.preflight.outputs.has-init-host == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      NAMESPACE: calypso-demo

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build container image from branch source
        run: docker build -t ghcr.io/${{ github.repository }}:branch-test .

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode 644 --disable traefik" sh -
          for i in $(seq 1 30); do sudo k3s ctr version > /dev/null 2>&1 && break; sleep 2; done

      - name: Import branch image into k3s containerd
        run: docker save ghcr.io/${{ github.repository }}:branch-test | sudo k3s ctr images import -

      - name: Run init-host.sh (local mode, branch image)
        run: sudo -E bash scripts/init-host.sh demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: branch-test

      - name: Verify deployment
        run: bash scripts/ci/verify-init.sh
        env:
          NAMESPACE: calypso-demo
          DB_MODE: local

      - name: App smoke test
        run: bash scripts/ci/app-smoke.sh
        env:
          PORT: '31415'
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUDIT_DATABASE_URL: ${{ env.AUDIT_DATABASE_URL }}
          ANALYTICS_DATABASE_URL: ${{ env.ANALYTICS_DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          PF_PID: ${{ env.PF_PID }}

  # ── Branch integration test — remote postgres mock ────────────────────────
  branch-remote-mode:
    needs: preflight
    if: github.event_name != 'schedule' && needs.preflight.outputs.has-dockerfile == 'true' && needs.preflight.outputs.has-init-host == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      NAMESPACE: calypso-demo

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build container image from branch source
        run: docker build -t ghcr.io/${{ github.repository }}:branch-test .

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--write-kubeconfig-mode 644 --disable traefik" sh -
          for i in $(seq 1 30); do sudo k3s ctr version > /dev/null 2>&1 && break; sleep 2; done

      - name: Import branch image into k3s containerd
        run: docker save ghcr.io/${{ github.repository }}:branch-test | sudo k3s ctr images import -

      - name: Start postgres Docker container (simulates managed external DB)
        run: |
          docker run -d --name pg-remote -e POSTGRES_PASSWORD=adminpass -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 20); do
            docker exec pg-remote psql -U postgres -c "SELECT 1" > /dev/null 2>&1 && break
            echo "Waiting for postgres... attempt ${i}"; sleep 2
          done

      - name: Run init-host.sh (remote mode, branch image)
        run: sudo -E bash scripts/init-host.sh demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: branch-test
          REMOTE_PG_HOST: 172.17.0.1
          REMOTE_PG_PORT: '5432'
          REMOTE_PG_ADMIN_DB: postgres
          REMOTE_PG_ADMIN_USER: postgres
          REMOTE_PG_ADMIN_PASSWORD: adminpass
          REMOTE_PG_SSL: disable

      - name: Verify deployment
        run: bash scripts/ci/verify-init.sh
        env:
          NAMESPACE: calypso-demo
          DB_MODE: remote

      - name: Verify idempotency — run init-host.sh a second time
        run: sudo -E bash scripts/init-host.sh demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: branch-test
          REMOTE_PG_HOST: 172.17.0.1
          REMOTE_PG_PORT: '5432'
          REMOTE_PG_ADMIN_DB: postgres
          REMOTE_PG_ADMIN_USER: postgres
          REMOTE_PG_ADMIN_PASSWORD: adminpass
          REMOTE_PG_SSL: disable

      - name: App smoke test
        run: bash scripts/ci/app-smoke.sh
        env:
          PORT: '31415'
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUDIT_DATABASE_URL: ${{ env.AUDIT_DATABASE_URL }}
          ANALYTICS_DATABASE_URL: ${{ env.ANALYTICS_DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

  # ── Release smoke test — local postgres ──────────────────────────────────
  release-local-mode:
    needs: preflight
    if: >
      needs.preflight.outputs.has-release == 'true' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        github.ref == 'refs/heads/main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      NAMESPACE: calypso-demo

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run init-host.sh (local mode, latest release)
        run: sudo -E bash scripts/init-host.sh demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: ${{ needs.preflight.outputs.release-tag }}

      - name: Verify deployment
        run: bash scripts/ci/verify-init.sh
        env:
          NAMESPACE: calypso-demo
          DB_MODE: local

      - name: App smoke test
        run: bash scripts/ci/app-smoke.sh
        env:
          PORT: '31415'
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUDIT_DATABASE_URL: ${{ env.AUDIT_DATABASE_URL }}
          ANALYTICS_DATABASE_URL: ${{ env.ANALYTICS_DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          PF_PID: ${{ env.PF_PID }}

  # ── Release smoke test — remote postgres mock ─────────────────────────────
  release-remote-mode:
    needs: preflight
    if: >
      needs.preflight.outputs.has-release == 'true' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        github.ref == 'refs/heads/main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      NAMESPACE: calypso-demo

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Start postgres Docker container (simulates managed external DB)
        run: |
          docker run -d --name pg-remote -e POSTGRES_PASSWORD=adminpass -p 5432:5432 postgres:16-alpine
          for i in $(seq 1 20); do
            docker exec pg-remote psql -U postgres -c "SELECT 1" > /dev/null 2>&1 && break
            echo "Waiting for postgres... attempt ${i}"; sleep 2
          done

      - name: Run init-host.sh (remote mode, latest release)
        run: sudo -E bash scripts/init-host.sh demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: ${{ needs.preflight.outputs.release-tag }}
          REMOTE_PG_HOST: 172.17.0.1
          REMOTE_PG_PORT: '5432'
          REMOTE_PG_ADMIN_DB: postgres
          REMOTE_PG_ADMIN_USER: postgres
          REMOTE_PG_ADMIN_PASSWORD: adminpass
          REMOTE_PG_SSL: disable

      - name: Verify deployment
        run: bash scripts/ci/verify-init.sh
        env:
          NAMESPACE: calypso-demo
          DB_MODE: remote

      - name: Verify idempotency — run init-host.sh a second time
        run: sudo -E bash scripts/init-host.sh demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: ${{ needs.preflight.outputs.release-tag }}
          REMOTE_PG_HOST: 172.17.0.1
          REMOTE_PG_PORT: '5432'
          REMOTE_PG_ADMIN_DB: postgres
          REMOTE_PG_ADMIN_USER: postgres
          REMOTE_PG_ADMIN_PASSWORD: adminpass
          REMOTE_PG_SSL: disable

      - name: App smoke test
        run: bash scripts/ci/app-smoke.sh
        env:
          PORT: '31415'
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUDIT_DATABASE_URL: ${{ env.AUDIT_DATABASE_URL }}
          ANALYTICS_DATABASE_URL: ${{ env.ANALYTICS_DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
