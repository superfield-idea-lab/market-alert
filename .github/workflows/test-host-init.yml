              echo "Postgres is ready after ${i} attempts"
              break
            fi
            echo "Waiting for postgres... attempt ${i}"
            sleep 2
          done

      - name: Run init-host.sh (remote mode, latest release)
        run: sudo -E bash scripts/init-host.sh demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: ${{ needs.preflight.outputs.release-tag }}
          REMOTE_PG_HOST: 172.17.0.1
          REMOTE_PG_PORT: '5432'
          REMOTE_PG_ADMIN_DB: postgres
          REMOTE_PG_ADMIN_USER: postgres
          REMOTE_PG_ADMIN_PASSWORD: adminpass
          REMOTE_PG_SSL: disable

      - name: Verify calypso-db-init-secret deleted
        run: |
          if kubectl get secret calypso-db-init-secret --namespace=calypso-demo 2>/dev/null; then
            echo "ERROR: calypso-db-init-secret still exists after init-host.sh completed!" >&2
            exit 1
          fi
          echo "Verified: calypso-db-init-secret has been deleted."

      - name: Verify ADMIN_DATABASE_URL not in long-lived secrets
        run: |
          for secret in calypso-api-secrets calypso-db-secrets; do
            if kubectl get secret "${secret}" --namespace=calypso-demo 2>/dev/null; then
              keys=$(kubectl get secret "${secret}" --namespace=calypso-demo \
                -o jsonpath='{.data}' 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(' '.join(d.keys()))" || echo "")
              if echo "${keys}" | grep -qi "admin"; then
                echo "ERROR: admin credentials found in ${secret}!" >&2
                exit 1
              fi
            fi
          done
          echo "Verified: ADMIN_DATABASE_URL not present in long-lived secrets."

      - name: Extract connection URLs from calypso-api-secrets
        run: |
          DATABASE_URL=$(kubectl get secret calypso-api-secrets -n calypso-demo \
            -o jsonpath='{.data.DATABASE_URL}' | base64 -d)
          AUDIT_DATABASE_URL=$(kubectl get secret calypso-api-secrets -n calypso-demo \
            -o jsonpath='{.data.AUDIT_DATABASE_URL}' | base64 -d)
          ANALYTICS_DATABASE_URL=$(kubectl get secret calypso-api-secrets -n calypso-demo \
            -o jsonpath='{.data.ANALYTICS_DATABASE_URL}' | base64 -d)
          JWT_SECRET=$(kubectl get secret calypso-api-secrets -n calypso-demo \
            -o jsonpath='{.data.JWT_SECRET}' | base64 -d)
          echo "DATABASE_URL=${DATABASE_URL}" >> "$GITHUB_ENV"
          echo "AUDIT_DATABASE_URL=${AUDIT_DATABASE_URL}" >> "$GITHUB_ENV"
          echo "ANALYTICS_DATABASE_URL=${ANALYTICS_DATABASE_URL}" >> "$GITHUB_ENV"
          echo "JWT_SECRET=${JWT_SECRET}" >> "$GITHUB_ENV"

      - name: Run migrate()
        run: bun run packages/db/migrate.ts
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUDIT_DATABASE_URL: ${{ env.AUDIT_DATABASE_URL }}
          ANALYTICS_DATABASE_URL: ${{ env.ANALYTICS_DATABASE_URL }}

      - name: Verify calypso_app tables exist
        run: |
          docker run --rm --network=host postgres:16-alpine \
            psql "${DATABASE_URL}" -c "\dt" | grep -E "entity_types|entities"

      - name: Verify calypso_audit tables exist
        run: |
          docker run --rm --network=host postgres:16-alpine \
            psql "${AUDIT_DATABASE_URL}" -c "\dt" | grep "audit_log"

      - name: Verify calypso_analytics tables exist
        run: |
          docker run --rm --network=host postgres:16-alpine \
            psql "${ANALYTICS_DATABASE_URL}" -c "\dt" | grep -E "analytics_events|audit_replica"

      - name: Verify audit_w INSERT grant
        run: |
          docker run --rm --network=host postgres:16-alpine \
            psql "${AUDIT_DATABASE_URL}" \
            -c "INSERT INTO audit_log (id, action, entity_type, entity_id, changes) VALUES ('ci-release-remote-1', 'create', 'test', 'test-1', '{}')"

      - name: Verify idempotency — run init-host.sh a second time
        run: sudo -E bash scripts/init-host.sh demo
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          MNEMONIC: 'abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about'
          CALYPSO_IMAGE_TAG: ${{ needs.preflight.outputs.release-tag }}
          REMOTE_PG_HOST: 172.17.0.1
          REMOTE_PG_PORT: '5432'
          REMOTE_PG_ADMIN_DB: postgres
          REMOTE_PG_ADMIN_USER: postgres
          REMOTE_PG_ADMIN_PASSWORD: adminpass
          REMOTE_PG_SSL: disable

      - name: Start app server and assert /health returns 200
        run: |
          bun run apps/server/src/index.ts &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> "$GITHUB_ENV"
          for i in $(seq 1 20); do
            if curl -sf http://localhost:31415/health > /dev/null 2>&1; then
              echo "App is healthy after ${i} attempts"
              break
            fi
            echo "Waiting for app... attempt ${i}"
            sleep 2
          done
          curl -sf http://localhost:31415/health
        env:
          PORT: 31415
          ENCRYPTION_DISABLED: 'true'

      - name: Stop app server
        if: always()
        run: |
          if [[ -n "${APP_PID:-}" ]]; then
            kill "$APP_PID" 2>/dev/null || true
          fi
