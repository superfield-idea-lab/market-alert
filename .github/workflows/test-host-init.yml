              break
            fi
            echo "Waiting for app... attempt ${i}"
            sleep 2
          done
          curl -sf http://localhost:31415/health
        env:
          PORT: 31415
          ENCRYPTION_DISABLED: 'true'

      - name: Stop app server
        if: always()
        run: |
          if [[ -n "${APP_PID:-}" ]]; then
            kill "$APP_PID" 2>/dev/null || true
          fi

  # ── Release smoke test — local postgres ──────────────────────────────────
  # Pulls the latest published GHCR tag and runs init-host.sh with it.
  # Intentional: tests operational readiness of the released image, not the
  # branch. Runs nightly, on workflow_dispatch, and on pushes to main.
  # Skipped entirely when no GitHub Release exists yet.
  release-local-mode:
    needs: preflight
    if: >
      needs.preflight.outputs.has-release == 'true' &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        github.ref == 'refs/heads/main'
      )
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml

