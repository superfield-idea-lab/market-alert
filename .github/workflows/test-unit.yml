name: Unit Tests

on:
  push:
    branches: [main, 'UX/**', 'feat/**', 'fix/**']
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'calypso-blueprint/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'calypso-blueprint/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'README.md'
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install Dependencies
        run: bun install
      - name: Lint and Format Check
        run: bun run lint
      - name: Run Unit Tests
        run: bun --bun vitest run tests/unit apps/*/tests/unit
      - name: Coverage gate (Phase 0 — health probe)
        # Note: coverage-v8 requires node:inspector which Bun does not yet
        # implement (https://github.com/oven-sh/bun/issues/2445). This step
        # intentionally runs WITHOUT --bun to use Node.js coverage instrumentation.
        # Must run from apps/server/ so the include path (src/api/health.ts)
        # resolves to the correct module. Threshold: 99% lines/branches/functions.
        working-directory: apps/server
        run: bun vitest run --coverage tests/unit/health.test.ts
