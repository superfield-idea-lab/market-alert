name: Unit Tests

on:
  push:
    branches: [main, 'UX/**', 'feat/**', 'fix/**']
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'calypso-blueprint/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'calypso-blueprint/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - 'README.md'
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install Dependencies
        run: bun install
      - name: Lint and Format Check
        run: bun run lint
      - name: Run Unit Tests
        run: bun --bun vitest run tests/unit apps/*/tests/unit
