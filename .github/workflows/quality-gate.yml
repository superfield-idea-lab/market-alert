name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install Dependencies
        run: bun install
      - name: Lint Check
        run: bun run lint
      - name: Format Check
        run: bun run format:check
      - name: Build Verification
        run: bun run build
