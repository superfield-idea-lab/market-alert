name: CI gate

# Phase 0 — twelve named checks (PROCESS-D-011/013/014/015)
#
# Twelve check names are pre-registered here so GitHub branch protection can
# require them before any branch reaches main. Each check is a separate job so
# the status is individually reportable and composable by branch rules.
#
# Check manifest (twelve):
#   1.  build          — TypeScript compile + Vite bundle
#   2.  lint           — ESLint across all workspaces
#   3.  format         — Prettier format verification
#   4.  unit           — Vitest unit tests (no I/O)
#   5.  integration    — Vitest integration tests (testcontainers Postgres)
#   6.  e2e            — Playwright golden-path e2e (k3d optional in CI)
#   7.  coverage       — 99% line/branch/function coverage gate
#   8.  checklist      — PR checklist completeness (GitHub script)
#   9.  depends-on     — Depends-On header resolution (PR ordering)
#   10. issue-checklist — Linked issue checklist all-ticked
#   11. conflicts      — No merge conflicts on the PR branch
#   12. single-issue   — PR linked to exactly one open issue

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**', 'docs/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Minimum permissions for the GITHUB_TOKEN across all jobs.
# Individual jobs requiring pull-requests:read or issues:read are granted
# those permissions explicitly at the job level.
permissions:
  contents: read

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Check 1: build
# ---------------------------------------------------------------------------
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Build all workspaces
        run: bun run build

  # ---------------------------------------------------------------------------
  # Check 2: lint
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: ESLint
        run: bun run lint

  # ---------------------------------------------------------------------------
  # Check 3: format
  # ---------------------------------------------------------------------------
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Prettier format check
        run: bun run format:check

  # ---------------------------------------------------------------------------
  # Check 4: unit
  # ---------------------------------------------------------------------------
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Unit tests
        run: bun --bun vitest run tests/unit apps/*/tests/unit

  # ---------------------------------------------------------------------------
  # Check 5: integration
  # ---------------------------------------------------------------------------
  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # testcontainers provisions a real PostgreSQL 16 container per test.
      # Docker socket is available on ubuntu-latest GitHub runners.
      - name: Integration tests
        run: |
          for f in apps/server/tests/integration/*.test.ts; do
            bun --bun vitest run "$f" || exit 1
          done
        env:
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock

  # ---------------------------------------------------------------------------
  # Check 6: e2e
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # Phase 0: golden-path e2e uses a real HTTP server spun up in the test
      # process (no k3d needed in CI). k3d is only required for pnpm dev.
      - name: E2E tests
        run: bun --bun vitest run --config tests/e2e/vitest.config.ts

  # ---------------------------------------------------------------------------
  # Check 7: coverage
  # ---------------------------------------------------------------------------
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      # Coverage runs on Node (not --bun) because Bun lacks node:inspector
      # required by @vitest/coverage-v8. Threshold: 99% lines/branches/functions.
      # Phase 0: coverage is gated on the health probe module only.
      # The full coverage gate (all modules) is added incrementally as
      # pre-existing test failures (GCP fixtures, etc.) are resolved.
      - name: Coverage gate
        working-directory: apps/server
        run: bun vitest run --coverage tests/unit/health.test.ts

  # ---------------------------------------------------------------------------
  # Check 8: checklist
  # ---------------------------------------------------------------------------
  checklist:
    name: checklist
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Verify PR checklist completeness
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.data.body ?? '';
            const unchecked = (body.match(/- \[ \]/g) ?? []).length;
            if (unchecked > 0) {
              core.setFailed(`PR has ${unchecked} unchecked checklist item(s). Tick all items before merge.`);
            } else {
              core.info('All checklist items are ticked.');
            }

  # ---------------------------------------------------------------------------
  # Check 9: depends-on
  # ---------------------------------------------------------------------------
  depends-on:
    name: depends-on
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Resolve Depends-On header
        uses: actions/github-script@v7
        with:
          script: |
            // Extract "Depends-On: #NNN" from PR body and check if merged.
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.data.body ?? '';
            const match = body.match(/Depends-On:\s*#(\d+)/i);
            if (!match) {
              core.info('No Depends-On header found — proceeding.');
              return;
            }
            const depPr = parseInt(match[1], 10);
            const dep = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: depPr,
            });
            if (dep.data.state !== 'closed' || !dep.data.merged_at) {
              core.setFailed(`Depends-On PR #${depPr} is not yet merged.`);
            } else {
              core.info(`Depends-On PR #${depPr} is merged — proceeding.`);
            }

  # ---------------------------------------------------------------------------
  # Check 10: issue-checklist
  # ---------------------------------------------------------------------------
  issue-checklist:
    name: issue-checklist
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Verify linked issue checklist
        uses: actions/github-script@v7
        with:
          script: |
            // Find the first "Closes #NNN" or "Fixes #NNN" reference in the PR body.
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.data.body ?? '';
            const match = body.match(/(?:closes?|fixes?|resolves?)\s+#(\d+)/i);
            if (!match) {
              core.info('No closing issue reference found — skipping issue checklist check.');
              return;
            }
            const issueNumber = parseInt(match[1], 10);
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const issueBody = issue.data.body ?? '';
            const unchecked = (issueBody.match(/- \[ \]/g) ?? []).length;
            if (unchecked > 0) {
              core.setFailed(`Issue #${issueNumber} has ${unchecked} unchecked item(s). Tick all items before merge.`);
            } else {
              core.info(`Issue #${issueNumber} checklist is fully ticked.`);
            }

  # ---------------------------------------------------------------------------
  # Check 11: conflicts
  # ---------------------------------------------------------------------------
  conflicts:
    name: conflicts
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Detect merge conflicts
        run: |
          git fetch origin main
          # Attempt a dry-run merge; fail if conflicts are present.
          if ! git merge --no-commit --no-ff origin/main 2>/dev/null; then
            git merge --abort 2>/dev/null || true
            echo "Merge conflicts detected. Rebase the branch before merging."
            exit 1
          fi
          git merge --abort 2>/dev/null || true
          echo "No merge conflicts."

  # ---------------------------------------------------------------------------
  # Check 12: single-issue
  # ---------------------------------------------------------------------------
  single-issue:
    name: single-issue
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_SUBMODULE_PAT || secrets.GITHUB_TOKEN }}
      - name: Verify PR closes exactly one open issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const body = pr.data.body ?? '';
            const matches = [...body.matchAll(/(?:closes?|fixes?|resolves?)\s+#(\d+)/gi)];
            if (matches.length === 0) {
              core.setFailed('PR body must contain a closing issue reference (e.g. "Closes #42").');
            } else if (matches.length > 1) {
              core.setFailed(`PR closes ${matches.length} issues — must close exactly one.`);
            } else {
              const issueNumber = parseInt(matches[0][1], 10);
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              if (issue.data.state !== 'open') {
                core.setFailed(`Issue #${issueNumber} is already closed — link a different open issue.`);
              } else {
                core.info(`PR closes exactly one open issue: #${issueNumber}.`);
              }
            }
