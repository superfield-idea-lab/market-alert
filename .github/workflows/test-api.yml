name: API Integration Tests

on:
  push:
    branches: [main, 'UX/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_SUBMODULE_PAT }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install Dependencies
        run: bun install
      - name: Run API Integration Tests
        run: |
          if [ -f apps/server/vitest.integration.config.ts ]; then
            bun --bun vitest run --config apps/server/vitest.integration.config.ts
          else
            echo "::notice::vitest.integration.config.ts not found — skipping (feature not yet landed)"
          fi
