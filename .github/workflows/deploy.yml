# deploy.yml — GitOps deploy workflow for Calypso
#
# Deployment is always an explicit human action via workflow_dispatch.
# Release (release.yml) and deploy are separate concerns:
#   - release.yml builds and pushes the container image on a version tag
#   - deploy.yml applies a chosen image tag to an environment
#
# Production deploys require reviewer approval via GitHub Environment protection.
# Operators can deploy an older tag or re-deploy (rollback) without a new release.
#
# See docs/host-init-script.md for the full deployment runbook, including
# GitHub Environment setup, SSH tunnel troubleshooting, and secret configuration.

name: Deploy

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Image tag to deploy (e.g. v1.2.3 or sha-abc1234)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - demo
          - prod

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      # ── 1. Validate image tag format ────────────────────────────────────────
      - name: Validate image tag
        run: |
          if [[ ! "${{ inputs.image-tag }}" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+|sha-[a-f0-9]{7,40})$ ]]; then
            echo "::error::Invalid image tag format: ${{ inputs.image-tag }}"
            echo "::error::Expected semver (v1.2.3) or sha- prefix (sha-abc1234)"
            exit 1
          fi
          echo "Image tag validated: ${{ inputs.image-tag }}"

      # ── 2. Checkout repository (deploy.sh lives here) ───────────────────────
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_SUBMODULE_PAT }}

      # ── 3. Install Bun ──────────────────────────────────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      # ── 4. Install kubectl ──────────────────────────────────────────────────
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      # ── 5. Authenticate to Google Cloud via WIF ────────────────────────────
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Start ssh-agent
        shell: bash
        run: |
          eval "$(ssh-agent -s)"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      # ── 8. Create GitHub deployment event (pending) ─────────────────────────
      - name: Create deployment event
        id: deployment
        run: |
          DEPLOY_ID=$(gh api repos/${{ github.repository }}/deployments \
            -f ref="${{ github.sha }}" \
            -f environment="${{ inputs.environment }}" \
            -f description="Deploy ${{ inputs.image-tag }} by ${{ github.actor }}" \
            -f auto_merge=false \
            --jq .id)
          echo "deploy_id=${DEPLOY_ID}" >> $GITHUB_OUTPUT
          echo "Created GitHub deployment event ID: ${DEPLOY_ID}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Run Google Cloud liveness + deploy flow ──────────────────────────
      - name: Deploy
        run: |
          bun run scripts/gcp/deploy.ts \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --zone "${{ secrets.GCP_ZONE }}" \
            --environment "${{ inputs.environment }}" \
            --vm-name "${{ secrets.GCP_VM_NAME }}" \
            --alloydb-cluster "${{ secrets.GCP_ALLOYDB_CLUSTER }}" \
            --alloydb-instance "${{ secrets.GCP_ALLOYDB_INSTANCE }}" \
            --tag "${{ inputs.image-tag }}"
        env:
          GCP_ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
          DEPLOY_NAMESPACE: ${{ secrets.DEPLOY_NAMESPACE }}
          DEPLOY_SA_NAME: ${{ secrets.DEPLOY_SA_NAME }}

      # ── 11. Update GitHub deployment status ─────────────────────────────────
      - name: Mark deployment success
        if: success()
        run: |
          gh api repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.deploy_id }}/statuses \
            -f state=success \
            -f description="Deployed ${{ inputs.image-tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark deployment failure
        if: failure()
        run: |
          gh api repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.deploy_id }}/statuses \
            -f state=failure \
            -f description="Failed to deploy ${{ inputs.image-tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 12. Cleanup (always runs) ────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          if [[ -n "${SSH_AGENT_PID:-}" ]]; then
            ssh-agent -k >/dev/null
          fi
          echo "Cleanup complete."
