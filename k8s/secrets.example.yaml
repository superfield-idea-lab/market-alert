# Secrets template — copy to secrets.yaml, fill in real values, then apply.
#
# IMPORTANT: secrets.yaml must NEVER be committed to version control.
# Add secrets.yaml to .gitignore before creating it.
#
# Apply order:
#   kubectl apply -f k8s/secrets.yaml          # apply filled-in secrets
#   kubectl apply -f k8s/postgres.yaml
#   kubectl apply -f k8s/db-init-job.yaml
#   kubectl wait --for=condition=complete job/calypso-db-init
#   kubectl apply -f k8s/app.yaml
#
# Secret values must be base64-encoded:
#   echo -n 'my-value' | base64
#
# Or use stringData (plain text, encoded automatically by kubectl):
#   stringData:
#     KEY: plain-text-value

---
# calypso-secrets
# Used by: postgres StatefulSet, calypso-app Deployment
apiVersion: v1
kind: Secret
metadata:
  name: calypso-secrets
type: Opaque
stringData:
  # PostgreSQL superuser credentials (used by the postgres StatefulSet)
  POSTGRES_USER: 'postgres'
  POSTGRES_PASSWORD: '<postgres-superuser-password>'
  POSTGRES_DB: 'calypso_app'

  # Application database connection URLs (used by calypso-app)
  # Format: postgres://<user>:<password>@<host>:<port>/<dbname>
  DATABASE_URL: 'postgres://app_rw:<app-rw-password>@calypso-postgres:5432/calypso_app'
  AUDIT_DATABASE_URL: 'postgres://audit_w:<audit-w-password>@calypso-postgres:5432/calypso_audit'
  ANALYTICS_DATABASE_URL: 'postgres://analytics_w:<analytics-w-password>@calypso-postgres:5432/calypso_analytics'

  # External API keys (optional — omit keys that are not needed)
  SUBSTACK_API_KEY: ''
  BLOOMBERG_API_KEY: ''
  YAHOO_API_KEY: ''

---
# calypso-db-init-secret
# Used by: calypso-db-init Job (init-remote.ts genesis initialisation)
apiVersion: v1
kind: Secret
metadata:
  name: calypso-db-init-secret
type: Opaque
stringData:
  # Admin connection URL — must have CREATE ROLE and CREATE DATABASE privileges.
  # Format: postgres://<admin-user>:<admin-password>@<host>:<port>/<admin-dbname>
  ADMIN_DATABASE_URL: 'postgres://postgres:<postgres-superuser-password>@calypso-postgres:5432/postgres'

  # Passwords that init-remote.ts will assign to the three application roles.
  # These must match the passwords embedded in the DATABASE_URL / AUDIT_DATABASE_URL /
  # ANALYTICS_DATABASE_URL values in calypso-secrets above.
  APP_RW_PASSWORD: '<app-rw-password>'
  AUDIT_W_PASSWORD: '<audit-w-password>'
  ANALYTICS_W_PASSWORD: '<analytics-w-password>'

  # Passwords for per-type worker agent DB roles (agent_coding, agent_analysis).
  # These must match the AGENT_DATABASE_URL values in the per-worker secrets below.
  AGENT_CODING_PASSWORD: '<agent-coding-password>'
  AGENT_ANALYSIS_PASSWORD: '<agent-analysis-password>'

  # Optional: override default database names (calypso_app / calypso_audit / calypso_analytics)
  # APP_DB: "calypso_app"
  # AUDIT_DB: "calypso_audit"
  # ANALYTICS_DB: "calypso_analytics"

---
# calypso-worker-coding-secret
# Used by: calypso-worker-coding Deployment (agent_coding DB role, coding vendor API key)
apiVersion: v1
kind: Secret
metadata:
  name: calypso-worker-coding-secret
type: Opaque
stringData:
  # DB URL using agent_coding role — SELECT on task_queue_view_coding only, no writes
  AGENT_DATABASE_URL: 'postgres://agent_coding:<agent-coding-password>@calypso-postgres:5432/calypso_app'
  # API gateway URL for task claim and result submission
  API_BASE_URL: 'http://calypso-app'
  # Vendor API key scoped to this agent type (e.g. Claude API key)
  VENDOR_API_KEY: '<coding-vendor-api-key>'

---
# calypso-worker-analysis-secret
# Used by: calypso-worker-analysis Deployment (agent_analysis DB role, analysis vendor API key)
apiVersion: v1
kind: Secret
metadata:
  name: calypso-worker-analysis-secret
type: Opaque
stringData:
  # DB URL using agent_analysis role — SELECT on task_queue_view_analysis only, no writes
  AGENT_DATABASE_URL: 'postgres://agent_analysis:<agent-analysis-password>@calypso-postgres:5432/calypso_app'
  # API gateway URL for task claim and result submission
  API_BASE_URL: 'http://calypso-app'
  # Vendor API key scoped to this agent type (e.g. Gemini API key)
  VENDOR_API_KEY: '<analysis-vendor-api-key>'
