# Secrets template — copy to secrets.yaml, fill in real values, then apply.
#
# IMPORTANT: secrets.yaml must NEVER be committed to version control.
# Add secrets.yaml to .gitignore before creating it.
#
# Apply order:
#   kubectl apply -f k8s/secrets.yaml          # apply filled-in secrets
#   kubectl apply -f k8s/postgres.yaml
#   kubectl apply -f k8s/db-init-job.yaml
#   kubectl wait --for=condition=complete job/superfield-db-init
#   kubectl apply -f k8s/app.yaml
#
# Secret values must be base64-encoded:
#   echo -n 'my-value' | base64
#
# Or use stringData (plain text, encoded automatically by kubectl):
#   stringData:
#     KEY: plain-text-value

---
# superfield-secrets
# Used by: postgres StatefulSet, superfield-app Deployment
apiVersion: v1
kind: Secret
metadata:
  name: superfield-secrets
type: Opaque
stringData:
  # PostgreSQL superuser credentials (used by the postgres StatefulSet)
  POSTGRES_USER: 'postgres'
  POSTGRES_PASSWORD: '<postgres-superuser-password>'
  POSTGRES_DB: 'superfield_app'

  # Application database connection URLs (used by superfield-app)
  # Format: postgres://<user>:<password>@<host>:<port>/<dbname>
  DATABASE_URL: 'postgres://app_rw:<app-rw-password>@superfield-postgres:5432/superfield_app'
  AUDIT_DATABASE_URL: 'postgres://audit_w:<audit-w-password>@superfield-postgres:5432/superfield_audit'
  ANALYTICS_DATABASE_URL: 'postgres://analytics_w:<analytics-w-password>@superfield-postgres:5432/superfield_analytics'

  # External API keys (optional — omit keys that are not needed)
  SUBSTACK_API_KEY: ''
  BLOOMBERG_API_KEY: ''
  YAHOO_API_KEY: ''

---
# superfield-db-init-secret
# Used by: superfield-db-init Job (init-remote.ts genesis initialisation)
apiVersion: v1
kind: Secret
metadata:
  name: superfield-db-init-secret
type: Opaque
stringData:
  # Admin connection URL — must have CREATE ROLE and CREATE DATABASE privileges.
  # Format: postgres://<admin-user>:<admin-password>@<host>:<port>/<admin-dbname>
  ADMIN_DATABASE_URL: 'postgres://postgres:<postgres-superuser-password>@superfield-postgres:5432/postgres'

  # Passwords that init-remote.ts will assign to the three application roles.
  # These must match the passwords embedded in the DATABASE_URL / AUDIT_DATABASE_URL /
  # ANALYTICS_DATABASE_URL values in superfield-secrets above.
  APP_RW_PASSWORD: '<app-rw-password>'
  AUDIT_W_PASSWORD: '<audit-w-password>'
  ANALYTICS_W_PASSWORD: '<analytics-w-password>'

  # Password for the email_ingest agent DB role. Must match AGENT_DATABASE_URL in the worker secret below.
  AGENT_EMAIL_INGEST_PASSWORD: '<agent-email-ingest-password>'

  # Optional: override default database names (superfield_app / superfield_audit / superfield_analytics)
  # APP_DB: "superfield_app"
  # AUDIT_DB: "superfield_audit"
  # ANALYTICS_DB: "superfield_analytics"

---
# superfield-agent-worker-secret
# Used by: superfield-agent-worker Deployment (k8s/agent-worker.yaml)
# This secret provides runtime credentials for the Claude CLI-backed agent worker.
# The Claude API key is NOT stored here — it is stored encrypted in the worker_credentials
# table and decrypted at startup using ENCRYPTION_MASTER_KEY.
apiVersion: v1
kind: Secret
metadata:
  name: superfield-agent-worker-secret
type: Opaque
stringData:
  # DB URL using agent_claude role — SELECT on task_queue_view_claude only, no writes.
  # This role must be created by the genesis init script.
  AGENT_DATABASE_URL: 'postgres://agent_claude:<agent-claude-password>@superfield-postgres:5432/superfield_app'
  # API gateway URL for task claim and result submission
  API_BASE_URL: 'http://superfield-app'
  # Master encryption key for decrypting the Claude credential bundle from the DB.
  # Must match the ENCRYPTION_MASTER_KEY used by the app server that stored the credential.
  # Format: 64 hex characters (32 bytes). Generate with: openssl rand -hex 32
  ENCRYPTION_MASTER_KEY: '<64-hex-char-encryption-master-key>'
  # Repository URL for the initContainer git clone (read-only code mount).
  # Use a read-only deploy key or public URL.
  REPO_URL: 'https://github.com/<owner>/superfield-starter-ts.git'
