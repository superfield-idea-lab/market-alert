# Namespace definitions with Linkerd sidecar injection enabled.
#
# PRD §7 requires mutually authenticated and encrypted inter-service traffic.
# Linkerd achieves this by injecting a lightweight proxy sidecar into every pod
# in these namespaces.  The `linkerd.io/inject: enabled` annotation instructs
# the Linkerd admission controller to inject the proxy automatically.
#
# Namespaces:
#   superfield-server  — API gateway (superfield-app)
#   superfield-web     — Frontend (PWA) serving pods
#   superfield-worker  — Background worker pods (agent-worker, type workers)
#
# Apply order:
#   kubectl apply -f k8s/linkerd/namespaces.yaml
#   (before any workload manifests in the same namespace)
#
# Canonical references:
#   https://linkerd.io/2.14/features/automatic-mtls/
#   https://linkerd.io/2.14/reference/proxy-configuration/
#   https://linkerd.io/2.14/tasks/adding-your-service/
---
apiVersion: v1
kind: Namespace
metadata:
  name: superfield-server
  labels:
    # Linkerd sidecar injection at the namespace level.
    # All pods created in this namespace receive a Linkerd proxy sidecar
    # unless they opt out with linkerd.io/inject: disabled.
    linkerd.io/inject: enabled
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: superfield-web
  labels:
    linkerd.io/inject: enabled
  annotations:
    linkerd.io/inject: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: superfield-worker
  labels:
    linkerd.io/inject: enabled
  annotations:
    linkerd.io/inject: enabled
