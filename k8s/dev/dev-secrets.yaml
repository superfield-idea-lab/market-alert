# Dev ConfigMap — plain-text dev-only Postgres credentials.
#
# These credentials are used exclusively by the local k3d dev cluster.
# They are intentionally weak and committed to the repository because they
# only apply inside the local dev cluster (k3d) where there is no external
# network exposure.
#
# NEVER use these credentials in CI or production. Production credentials
# are sourced from Kubernetes Secrets created out-of-band.
#
# The DATABASE_URL in this ConfigMap is the in-cluster URL. For access from
# the host, k3d exposes port 5432 via the loadbalancer (see dev-k3d.ts).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: calypso-dev-config
  labels:
    env: dev
data:
  # PostgreSQL superuser credentials
  POSTGRES_USER: 'calypso'
  POSTGRES_PASSWORD: 'calypso'
  POSTGRES_DB: 'calypso'

  # Connection URL for in-cluster services (e.g. migration runner job)
  DATABASE_URL: 'postgres://calypso:calypso@calypso-dev-postgres:5432/calypso'

  # Host-side connection URL (accessed through the k3d loadbalancer)
  DATABASE_URL_HOST: 'postgres://calypso:calypso@localhost:5432/calypso'
