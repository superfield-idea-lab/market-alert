name: Unit tests v3

on:
  push:
    branches: [main, 'UX/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format:check
      - name: Run unit tests
        run: bun --bun vitest run tests/unit apps/*/tests/unit
