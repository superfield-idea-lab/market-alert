  # ── Antipatterns ──────────────────────────────────────────────────────────────

  - number: UX-X-001
    hash: fe86cd8bdfff
    name: screen-first-design
    type: antipattern
    description: >
     Designing the interface before mapping the service flow produces
      interfaces that expose gaps in the service design as confusing dead ends
      or workaround paths. A screen that cannot be explained by a service flow
      state does not belong in the product.
    links:
      - {target: d7f85752c1b1, rel: contradicts}
      - {target: 173636ad122f, rel: contradicts}
      - {target: 103dbdf604b7, rel: contradicts}
    deprecated: false

  - number: UX-X-002
    hash: e450c8a60d0d
    name: developer-console-as-admin-ui
    type: antipattern
    description: >
     Shipping without an admin interface and substituting direct database
      access, terminal commands, or API clients for administrative tasks means
      the admin UX is unspecified, untested, inconsistent, and inaccessible to
      non-developers. Administration is a product surface with real users.
    links:
      - {target: e43e9ff85857, rel: contradicts}
      - {target: 60c41e0c35c7, rel: contradicts}
      - {target: 5f59ffbb3def, rel: contradicts}
    deprecated: false

  - number: UX-X-003
    hash: 5af7abcb16da
    name: browser-automation-as-agent-integration
    type: antipattern
    description: >
     Pointing an agent at a human-facing browser interface — whether through a
      headless browser, DOM scraping, or visual element parsing — produces an
      integration that breaks silently on any layout change and cannot be
      tested deterministically. The agent interface is a product surface; it
      must be designed and maintained as one.
    links:
      - {target: e43e9ff85857, rel: contradicts}
      - {target: 8de237165c47, rel: contradicts}
      - {target: a2a41eddd7d4, rel: contradicts}
    deprecated: false

  - number: UX-X-004
    hash: 39003e63eb4b
    name: invisible-agent-participation
    type: antipattern
    description: >
     An AI agent operating on a user account that the user cannot see,
      scope-limit, or audit is a trust violation regardless of what the agent
      does. The end-user's mental model of their account does not include the
      agent; that gap is a UX defect that becomes a support and trust problem.
    links:
      - {target: b6f0649c24cf, rel: contradicts}
      - {target: f1508d8f738f, rel: contradicts}
      - {target: c165af9c20b4, rel: contradicts}
    deprecated: false

  - number: UX-X-005
    hash: f7986c534086
    name: beauty-deferred
    type: antipattern
    description: >
     Treating visual quality as a polish pass at the end of development anchors
      stakeholders and users on an unpolished baseline that is expensive to
      correct. The first demo sets the quality anchor. Ship the first demo at
      the intended quality level or do not demo.
    links:
      - {target: 95f2b6bff569, rel: contradicts}
      - {target: d6f18baa5d77, rel: contradicts}
    deprecated: false

  - number: UX-X-006
    hash: 96e80a0c1f27
    name: one-interface-all-actor-types
    type: antipattern
    description: >
     Building a single interface that attempts to serve end-users,
      administrators, and agents simultaneously produces an interface that
      serves none of them well. Each actor type has distinct goals, available
      actions, and appropriate interaction patterns. Shared foundations do not
      imply a shared surface.
    links:
      - {target: e43e9ff85857, rel: contradicts}
      - {target: 60c41e0c35c7, rel: contradicts}
    deprecated: false

  - number: UX-X-007
    hash: c2b183d34453
    name: multiple-prominent-paths-same-action
    type: antipattern
    description: >
     Offering two buttons that appear to do the same thing, two navigation
      entries for the same destination, or two API endpoints for the same
      operation forces the user to reason about whether the paths are truly
      equivalent. One path is a design decision; two paths are an unresolved
      design conflict.
    links:
      - {target: 8d514b83d768, rel: contradicts}
      - {target: 6723c3820539, rel: contradicts}
      - {target: ed3622189556, rel: contradicts}
    deprecated: false

  - number: UX-X-008
    hash: 52bdae16f26b
    name: complexity-surfaced-by-default
    type: antipattern
    description: >
     Showing all capabilities, settings, and options on first use causes
      cognitive overload and slows users to the speed of their least-needed
      feature. Default views must be designed for the primary task; everything
      else requires deliberate disclosure.
    links:
      - {target: 9b929c73ac69, rel: contradicts}
      - {target: 6c3fb70bfa32, rel: contradicts}
    deprecated: false

  - number: UX-X-009
    hash: 8c1b6d4f2a90
    name: derived-artifacts-treated-as-authority
    type: antipattern
    description: >
     Markdown notes, Mermaid diagrams, HTML previews, or SVG mockups become
      the source of truth instead of being regenerated from canonical JSON.
      Manual edits to derived artifacts create drift, make review ambiguous,
      and break the audit trail between phases.
    links:
      - {target: 1f7f7b6a4c21, rel: contradicts}
      - {target: e49ebcb9644c, rel: contradicts}
    deprecated: false

  - number: UX-X-010
    hash: ad4e1c7f9b20
    name: single-pass-review-approval
    type: antipattern
    description: >
     Approving UX after a single non-gated critique pass, or accepting vague
      reviewer comments without explicit issue, evidence, severity, and
      proposed fix, allows polished-but-invalid designs to escape review.
      UX approval must be earned through the defined gate sequence and
      revision loop.
    links:
      - {target: 1f4c2d9a7b8e, rel: contradicts}
      - {target: 7c2e1a9d5b4f, rel: contradicts}
    deprecated: false

  - number: UX-X-011
    hash: 5f2d9c6b3a8e
    name: spec-authored-outside-blueprint-grammar
    type: antipattern
    description: >
     An agent or human producing a specification without reference to the
      blueprint's controlled vocabularies, derivation rules, or field
      schemas. The resulting spec may be internally coherent and visually
      plausible, but it cannot be gated, compared, or reproduced. Authoring
      outside the grammar is equivalent to improvising without a blueprint.
    links:
      - {target: 2f4a8b1c6d9e, rel: contradicts}
      - {target: 2f8d6e4b1c5a, rel: contradicts}
    deprecated: false

  - number: UX-X-012
    hash: 6a3e1d7c4b9f
    name: implementation-gated-without-spec-gate
    type: antipattern
    description: >
     Running implementation conformance checks against a specification that
      has not itself passed the spec-conformance gate. The audit chain is
      broken: the implementation may conform to an invalid contract, and
      the blueprint's constraints are enforced only at the final step.
    links:
      - {target: 3e7b9d1f4c8a, rel: contradicts}
      - {target: 4b1f8d6a3c7e, rel: contradicts}
    deprecated: false

  - number: UX-X-013
    hash: 7b4f2e8d5c1a
    name: free-text-spec-fields
    type: antipattern
    description: >
     Specification fields accept free-text values where a controlled
      vocabulary should apply. Two agents producing specs for the same
      capability will select different labels for the same concept, making
      spec-to-spec comparison impossible and defeating the provenance
      chain.
    links:
      - {target: 2f8d6e4b1c5a, rel: contradicts}
      - {target: 5c8e2a7b3f1d, rel: contradicts}
    deprecated: false

  - number: UX-X-014
    hash: 7c9a4b2e1f6d
    name: inline-contract-in-source-comments
    type: antipattern
    description: >
     Encoding view specifications, state matrices, or conformance claims
      as inline comments (JSDoc tags, annotation blocks, banner comments)
      in source files instead of adjacent canonical JSON. Comments are
      free-text, not schema-validatable, and drift silently from the
      rendered contract. The source file's inline marker is a pointer to
      adjacent canonical artifacts, not a substitute for them.
    links:
      - {target: 9f6d4b1a3c8e, rel: contradicts}
      - {target: 1f7f7b6a4c21, rel: contradicts}
      - {target: 8c1b6d4f2a90, rel: contradicts}
    deprecated: false

  - number: UX-X-015
    hash: 8d1e5f3b2c7a
    name: view-artifacts-outside-view-directory
    type: antipattern
    description: >
     Storing a view's canonical spec, state matrix, or conformance
      evidence in a location other than the view's own source directory
      — e.g., a central /docs tree, a separate governance repository, or
      CI artifact storage only. An agent editing the source cannot see
      the contract or last-passing evidence, and drift is invisible until
      CI runs. The agent's only reliable locator for governance artifacts
      is adjacency to the source.
    links:
      - {target: 8e5c3a9f2b1d, rel: contradicts}
    deprecated: false
