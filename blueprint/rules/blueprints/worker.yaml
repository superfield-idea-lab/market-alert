  # ── Antipatterns ──

  - number: WORKER-X-001
    hash: a76fb9bc6f9a
    name: direct-database-access
    type: antipattern
    description: >
      A worker container with any database connection — read or write — violates the
      zero-database-connectivity principle. Read-only access is not safe: it requires database
      credentials in the worker environment, opens a port-5432 network path, exposes schema
      structure to probing, risks connection pool exhaustion, and creates conditions for future
      scope creep. A worker with write access additionally bypasses schema validation, business
      logic, access control, and audit logging simultaneously. All application state access —
      reads and writes — goes through the API server. There are no exceptions.
    links:
      - {target: 828eead860c0, rel: contradicts}
      - {target: 04607753d09a, rel: contradicts}
      - {target: 6259fcb38e4b, rel: contradicts}
    deprecated: false

  - number: WORKER-X-002
    hash: 2e7a7257dbee
    name: shared-service-token
    type: antipattern
    description: >
      A single agent service token shared by all agent types makes it impossible to revoke one
      type's access without revoking all, and makes audit logs unintelligible. Each agent type
      must have its own service identity and token.
    links:
      - {target: f84a99a27579, rel: contradicts}
      - {target: ea60e28aaddd, rel: contradicts}
    deprecated: false

  - number: WORKER-X-003
    hash: dc26e8d71101
    name: broad-scope-delegated-token
    type: antipattern
    description: >
      A delegated token granting general write access on behalf of the user rather than access
      to a specific task result endpoint is a user session token in disguise. Scope must be as
      narrow as the operation requires: submit a result for this task, nothing else.
    links:
      - {target: 99b401f918f7, rel: contradicts}
      - {target: 94e51d38d726, rel: contradicts}
    deprecated: false

  - number: WORKER-X-004
    hash: 93c252df0ba7
    name: long-lived-delegated-tokens
    type: antipattern
    description: >
      A delegated token that lives for hours or days outlives the agent session it was created
      for and becomes a credential that can be intercepted, cached, or leaked. TTL must be short
      enough that expiry before use is the expected outcome of a crashed agent.
    links:
      - {target: 99b401f918f7, rel: contradicts}
      - {target: 87b56473f379, rel: contradicts}
      - {target: fa8aa9357401, rel: contradicts}
    deprecated: false

  - number: WORKER-X-005
    hash: cf2b1cacf907
    name: runtime-capability-selection
    type: antipattern
    description: >
      An agent that reads configuration at runtime to decide which task types or vendor APIs it
      can access has moved the capability boundary from infrastructure to application layer.
      Infrastructure-layer enforcement (API service tokens, network policy, Kubernetes manifest)
      is the only enforcement that cannot be overridden by buggy or adversarial code.
    links:
      - {target: 01372075c497, rel: contradicts}
    deprecated: false

  - number: WORKER-X-006
    hash: 50e243fb9728
    name: shell-form-cli-invocation
    type: antipattern
    description: >
      Invoking a vendor CLI via a shell string (sh -c "claude --print ...") exposes the agent to
      shell injection if any part of the prompt is interpolated. Vendor CLIs must be invoked
      using array-form process spawn with input via stdin. This applies even to trusted input
      since AI-generated content may contain adversarial payloads.
    links:
      - {target: 6a55cc478eca, rel: contradicts}
      - {target: fb9c8615723a, rel: contradicts}
    deprecated: false

  - number: WORKER-X-007
    hash: 445514ee90dd
    name: runtime-vendor-cli-update
    type: antipattern
    description: >
      Any mechanism allowing the worker container to download and execute a new vendor CLI
      version at runtime (npm install, pip install, curl-pipe-bash) is a remote code execution
      vulnerability. Vendor CLI versions are fixed at image build time; updates require a new
      image build and rolling deployment.
    links:
      - {target: 6a55cc478eca, rel: contradicts}
      - {target: 5ae0f5e26e80, rel: contradicts}
      - {target: 5931495979c4, rel: contradicts}
    deprecated: false

  - number: WORKER-X-008
    hash: 092c015ce976
    name: prompt-content-in-audit-log
    type: antipattern
    description: >
      An audit log storing full prompt text and AI responses contains user data, potentially
      sensitive context, and possibly regulated content. Logs are often less protected than
      application data. The audit log stores hashes and metadata; content lives in the task
      record under the application's standard encryption and access control.
    links:
      - {target: 8979f3da3356, rel: contradicts}
      - {target: 1d4f90a4eaed, rel: contradicts}
    deprecated: false

  - number: WORKER-X-009
    hash: b1e3f7a2c849
    name: worker-with-database-credentials
    type: antipattern
    description: >
      Injecting a database connection string, DATABASE_URL, or any database credential into a
      worker container environment — even with the intent of enforcing read-only access at the
      PostgreSQL role level. The credential is the vulnerability: it can be extracted from the
      process environment, leaked via structured logs, or used directly with any PostgreSQL client.
      The correct enforcement is no credential at all, backed by a network policy that makes port
      5432 structurally unreachable from the worker namespace. Role-level enforcement at the
      database is defense-in-depth for the API server; it is not a substitute for credential
      absence in worker containers.
    links:
      - {target: 828eead860c0, rel: contradicts}
      - {target: ba3b855fc0a5, rel: contradicts}
      - {target: bf7fc36b1d50, rel: contradicts}
    deprecated: false
