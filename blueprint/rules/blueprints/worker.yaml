meta:
  domain: WORKER
  title: Worker Blueprint
  version: 1
  requires:
    - AUTH
    - DATA
    - ENV
  vision: |
    Workers are the execution model for all asynchronous CPU-bound tasks in Superfield — not just AI
    workloads. AI agent orchestration (CLI babysitting, vendor API calls) is one category of worker
    task; ETL workflows, document generation, report compilation, scheduled batch jobs, and any
    other operation that should not block an HTTP request handler are equally first-class. The API
    server is HTTP-only: it handles requests, creates task_queue entries, and returns. It never
    executes CPU-bound work itself.

    An autonomous process that can write directly to a database is a process that can corrupt data
    without a human in the loop, without an audit trail, and without the business logic and
    validation that the application layer enforces. This is not a theoretical risk — it is the
    inevitable outcome of giving an autonomous process unfettered write access to shared state.
    The process will use that access, because it is the path of least resistance to completing its
    task. Every shortcut the architecture permits will eventually be taken.

    Superfield treats workers as first-class service participants with a deliberately constrained
    capability set. A worker reads from a structured task queue, executes work in its domain —
    calling AI vendor APIs, invoking CLI tools, running ETL pipelines, generating documents,
    applying transformations — and then submits its results to the application's API layer using
    a delegated user credential. The API layer validates, authorizes, and commits the write exactly
    as it would for a human-initiated request. The worker is not special. Its writes are subject to
    the same schema validation, the same access control checks, and the same audit logging as any
    other request. The worker cannot bypass this path because the database is structurally
    unreachable from the worker container at the network level.

    This model also separates concerns cleanly. The worker knows how to execute its domain task. It
    does not know how to validate business rules, enforce schema constraints, or make authorization
    decisions. Those responsibilities belong to the API layer, which has always owned them. Routing
    worker writes through the API is not bureaucracy — it is a recognition that the worker is good
    at one thing and should not be trusted to do another.

    The cost of ignoring this blueprint is a worker-shaped hole in the application's security
    model. A worker with direct write access can bypass validation, silently corrupt records, act
    on stale reads without conflict detection, and exfiltrate data through any write surface it can
    reach. These outcomes are not hypothetical. They are the natural consequence of treating workers
    as trusted insiders rather than as externally-constrained service participants.

rules:
  # ── Threats ──

  - number: WORKER-T-001
    hash: 6259fcb38e4b
    name: direct-db-write-bypasses-validation
    type: threat
    description: >
      Agent writes malformed or adversarially crafted data directly to the database, bypassing
      API-layer validation and business logic. All writes must pass through the API layer.
    links:
      - {target: 828eead860c0, rel: depends_on}
      - {target: 04607753d09a, rel: depends_on}
      - {target: a76fb9bc6f9a, rel: depends_on}
    deprecated: false

  - number: WORKER-T-002
    hash: dc243cc9fac7
    name: compromised-credential-grants-api-overreach
    type: threat
    description: >
      A compromised agent service token is used to access API endpoints beyond its intended scope.
      Workers hold no database credentials; the only credential a worker possesses is a per-type
      API service token scoped to task discovery and result submission. Compromise of that token
      cannot grant database access because the worker has no database network path. API-layer
      scope validation limits the blast radius to the agent type the token was issued for.
    links:
      - {target: 828eead860c0, rel: depends_on}
      - {target: cebee7387f5b, rel: depends_on}
    deprecated: false

  - number: WORKER-T-003
    hash: 6dbf9c26bf09
    name: agent-reads-unauthorized-data
    type: threat
    description: >
      Agent reads data outside its authorized scope such as another user's records. Because workers
      have no database connection, all data reads are mediated by the API. The API enforces
      authorization on every read endpoint; the delegated token's scope limits which resources the
      worker may fetch. There is no database-layer read path for a worker to bypass.
    links:
      - {target: f84a99a27579, rel: depends_on}
      - {target: 828eead860c0, rel: depends_on}
    deprecated: false

  - number: WORKER-T-004
    hash: 6f31a0c88cf2
    name: stale-task-claim
    type: threat
    description: >
      Agent acts on a task that has already been claimed or cancelled. The task queue must use
      atomic claim operations; acting on a stale task must produce a rejected API response.
    links:
      - {target: fec546a4edeb, rel: depends_on}
      - {target: ab32dbdcf326, rel: depends_on}
    deprecated: false

  - number: WORKER-T-005
    hash: 87b56473f379
    name: delegated-token-outlives-task
    type: threat
    description: >
      A delegated user token used by the agent outlives the task it was issued for. Delegated
      tokens must be single-use and task-scoped; a consumed token must not be reusable.
    links:
      - {target: 99b401f918f7, rel: depends_on}
      - {target: 94e51d38d726, rel: depends_on}
      - {target: 93c252df0ba7, rel: depends_on}
    deprecated: false

  - number: WORKER-T-006
    hash: 7262b1c5db4f
    name: agent-impersonates-different-user
    type: threat
    description: >
      Agent submits a result that impersonates a different user. The API layer must verify that
      the delegated token's user identity matches the task's owner.
    links:
      - {target: 94e51d38d726, rel: depends_on}
      - {target: f594ba0a6011, rel: depends_on}
    deprecated: false

  - number: WORKER-T-007
    hash: 5ae0f5e26e80
    name: container-shell-access
    type: threat
    description: >
      Agent container gains shell access or package management capability. Worker containers
      must be distroless-style with no shell, no package manager, and no runtime binary
      installation path.
    links:
      - {target: 04c8e0e0c08d, rel: depends_on}
      - {target: 6cee5e4dbf44, rel: depends_on}
      - {target: 445514ee90dd, rel: depends_on}
    deprecated: false

  - number: WORKER-T-008
    hash: 7bd1b8579f60
    name: cross-agent-type-access
    type: threat
    description: >
      Agent type A subscribes to the task stream or claims tasks belonging to agent type B.
      Because workers have no database connection, cross-type access must come through the API.
      The API validates the per-type service token on every request; a coding-agent token cannot
      subscribe to the analysis SSE stream or claim analysis tasks. Type isolation is enforced
      at the API layer and by network policy.
    links:
      - {target: f84a99a27579, rel: depends_on}
      - {target: cebee7387f5b, rel: depends_on}
      - {target: f020f72a449a, rel: depends_on}
    deprecated: false

  - number: WORKER-T-009
    hash: c445b05e81e2
    name: vendor-api-key-leak
    type: threat
    description: >
      AI vendor API key leaked from worker container environment. Vendor API keys must be scoped
      to minimum permissions and rotated on schedule.
    links:
      - {target: 79fd515f9792, rel: depends_on}
    deprecated: false

  - number: WORKER-T-010
    hash: 1192f1b1f366
    name: vendor-cli-data-exfiltration
    type: threat
    description: >
      Agent spawns a vendor CLI binary that exfiltrates data via network. Worker containers must
      have narrowly scoped network egress; vendor CLI calls must be audited via structured
      logging.
    links:
      - {target: a1524a8bda56, rel: depends_on}
      - {target: 8979f3da3356, rel: depends_on}
    deprecated: false

  # ── Principles ──

  - number: WORKER-P-001
    hash: 828eead860c0
    name: zero-database-connectivity
    type: principle
    description: >
      Worker containers have no database connection, no database credentials, and no network path
      to the database port. This is a stronger guarantee than read-only access: even a read-only
      database connection is an attack surface — credentials can be stolen from the environment,
      the connection pool can be exhausted, schema structure can be probed, and read-only access
      creates the conditions for future scope creep. All worker interaction with application state
      — task discovery, task claiming, data reads, result submission — passes through the API
      server. The database is physically unreachable from the worker container at the network
      level, and no credential that could reach it exists in the worker's environment.
    links:
      - {target: 6259fcb38e4b, rel: mitigates}
      - {target: dc243cc9fac7, rel: mitigates}
      - {target: bf7fc36b1d50, rel: refines}
    deprecated: false

  - number: WORKER-P-002
    hash: 04607753d09a
    name: writes-through-authenticated-api
    type: principle
    description: >
      All agent writes are user-authenticated API transactions. Every live state change an agent
      produces is submitted as an authenticated request to the application API using a delegated
      credential. The API validates input, checks authorization, enforces business rules, and
      writes through the standard data layer. For consequential operations the worker may submit
      a signed transaction intent. The database is not reachable; the API is the only production
      write surface.
    links:
      - {target: 6259fcb38e4b, rel: mitigates}
      - {target: 94e51d38d726, rel: refines}
      - {target: cbc1e836c877, rel: refines}
    deprecated: false

  - number: WORKER-P-003
    hash: 01372075c497
    name: deployment-time-capability-declaration
    type: principle
    description: >
      Agent capability is declared at deployment, not at runtime. Task type subscription,
      database role, vendor API access, and network egress rules are declared in the deployment
      manifest and enforced by infrastructure. The agent does not self-select capabilities at
      runtime.
    links:
      - {target: cf2b1cacf907, rel: refines}
      - {target: f84a99a27579, rel: refines}
    deprecated: false

  - number: WORKER-P-004
    hash: 04c8e0e0c08d
    name: distroless-with-explicit-allowances
    type: principle
    description: >
      Distroless-style workers still need explicit runtime allowances. A practical worker may
      require a writable temp directory, mounted CA bundles, vendor credential files, and a
      controlled config home. Those allowances must be explicit, minimal, and predeclared.
      Distroless means no shell, no package manager, no ad hoc debugging tools, and no
      self-mutation at runtime.
    links:
      - {target: 5ae0f5e26e80, rel: mitigates}
      - {target: 6cee5e4dbf44, rel: refines}
    deprecated: false

  - number: WORKER-P-005
    hash: 3b08589dd247
    name: deterministic-policy-gates
    type: principle
    description: >
      Worker policy is enforced through deterministic gates. The Superfield workflow defines
      machine-checkable gates for write prohibition, image composition, allowed writable paths,
      vendor binary provenance, network egress constraints, and digital-twin isolation. If
      checks cannot be evaluated deterministically, the worker path relies on convention rather
      than policy.
    links:
      - {target: cbc1e836c877, rel: refines}
    deprecated: false

  - number: WORKER-P-006
    hash: 99b401f918f7
    name: single-use-task-scoped-tokens
    type: principle
    description: >
      Delegated tokens are single-use and task-scoped. The API issues a short-lived, task-scoped
      token at task creation. The agent uses it to submit the result and the token is
      invalidated on first use. If the agent fails, the token expires by TTL. A delegated token
      cannot be used for a different task, to read out-of-scope data, or to initiate a new task.
    links:
      - {target: 87b56473f379, rel: mitigates}
      - {target: 94e51d38d726, rel: refines}
      - {target: dc26e8d71101, rel: refines}
      - {target: 93c252df0ba7, rel: refines}
    deprecated: false

  - number: WORKER-P-007
    hash: 6e0a5f6d7052
    name: simulation-in-digital-twins
    type: principle
    description: >
      Simulation happens in digital twins, not on production. When a task requires trying
      transaction sequences or simulating downstream effects, the worker executes inside a
      sandboxed digital twin. Twin execution may produce proposals, diffs, and predicted events
      but does not mutate production state. Promotion from simulation to live submission is a
      separate, explicitly authorized step.
    links:
      - {target: f97902bbcca1, rel: refines}
      - {target: 7affec197709, rel: refines}
      - {target: 26d63fdd6ec7, rel: refines}
    deprecated: false

  - number: WORKER-P-008
    hash: f84a99a27579
    name: agent-type-isolation
    type: principle
    description: >
      Agent types are isolated from each other. Different agent types are deployed with different
      per-type API service tokens and different vendor API credentials. An agent of type A cannot
      subscribe to type B's task stream, claim type B's tasks, use type B's API keys, or submit
      results using type B's identity. Isolation is enforced at network policy and API validation
      layers. There are no per-type database roles for worker containers — workers have no
      database access of any kind.
    links:
      - {target: 7bd1b8579f60, rel: mitigates}
      - {target: cebee7387f5b, rel: refines}
      - {target: f020f72a449a, rel: refines}
    deprecated: false

  - number: WORKER-P-009
    hash: 1ff01557fc89
    name: general-purpose-async-execution
    type: principle
    description: >
      Workers handle all async CPU-bound tasks, not just AI workloads. AI agent orchestration
      (CLI babysitting, vendor API calls) is one category; ETL workflows, document generation,
      report compilation, and scheduled batch jobs are equally valid worker tasks. The API server
      is HTTP-only — it handles requests, creates task_queue entries, and returns. It never
      executes CPU-bound work. This separation ensures the API server's response latency is
      bounded by I/O, not by worker task duration.
    links:
      - {target: 828eead860c0, rel: refines}
      - {target: 6259fcb38e4b, rel: mitigates}
    deprecated: false

  # ── Design Patterns ──

  - number: WORKER-D-001
    hash: fec546a4edeb
    name: api-streaming-task-discovery
    type: design_pattern
    description: >
      Workers discover tasks exclusively through a streaming API endpoint, not by querying the
      database. The API server maintains one PostgreSQL LISTEN connection per agent type and fans
      new-task notifications to all connected workers of that type over Server-Sent Events (SSE).
      The worker connects to GET /api/v1/tasks/stream authenticated with its per-type service
      token; the API validates the token and opens an SSE stream restricted to that agent type.
      Each SSE event signals task availability. The worker then calls POST /api/v1/tasks/claim to
      atomically claim the next available task. The API server's internal poll interval provides a
      heartbeat SSE event as a fallback when no pg_notify fires within the window.
    problem: |
      Workers need low-latency task discovery without holding a database connection. A direct
      database poll requires database credentials in the worker container, a persistent socket to
      port 5432, and gives workers a surface to probe schema or exhaust the connection pool.
    solution: |
      The API server is the only process with a database connection. It LISTENs internally on
      per-type pg_notify channels and forwards events to workers via SSE. Workers authenticate
      with a per-type service token scoped to their agent type; the SSE endpoint validates the
      token and streams only events for that type. If no pg_notify arrives before the poll
      interval elapses, the API server emits a heartbeat event, prompting connected workers to
      attempt a claim. The claim itself is an atomic UPDATE ... WHERE status = 'pending'
      RETURNING *, executed by the API server. Workers have no database credentials and cannot
      reach port 5432.
    tradeoffs: |
      SSE adds a persistent long-lived HTTP connection per worker replica. The API server must
      manage fan-out to N concurrent SSE clients. At high replica counts this is manageable —
      SSE connections are cheap compared to database connections. The claim operation still adds
      one API round-trip, which is the correct cost — the claim is the authorization gate.
    links:
      - {target: 828eead860c0, rel: refines}
      - {target: 6f31a0c88cf2, rel: mitigates}
      - {target: 869d373d9461, rel: depends_on}
    deprecated: false

  - number: WORKER-D-002
    hash: 94e51d38d726
    name: delegated-user-token
    type: design_pattern
    description: >
      At task creation the API generates a single-use, task-scoped capability token derived from
      the creating user's identity. The token encodes task ID, user ID, allowed API endpoints,
      and expiry. The agent presents the token when submitting results; the API verifies scope,
      executes the write on behalf of the encoded user, records the worker as executor, and
      invalidates the token.
    problem: |
      Agent-submitted results must be authorized as actions of the user who created the task, not
      as actions of a generic service identity. A service token that grants write access on behalf
      of any user is too broad; an agent with no user context cannot produce audit-attributable
      writes.
    solution: |
      At task creation, the API generates a single-use, task-scoped capability token derived from
      the creating user's identity. The token encodes: the task ID it is valid for, the user ID it
      acts on behalf of, the specific API endpoints it may call, and an expiry time. The agent
      receives the token as part of the claimed task payload. When submitting a result, the agent
      presents the token; the API verifies the token's scope, executes the write on behalf of the
      encoded user, records the worker identity as the executor, and invalidates the token.
    tradeoffs: |
      Token invalidation requires server-side state (a used-token log or a task status check).
      Stateless token validation is not sufficient for single-use semantics. This is an acceptable
      cost — the alternative is replayable tokens. If the agent crashes after claiming the token
      but before submitting, the task must be designed to be retried with a new claim.
    links:
      - {target: 99b401f918f7, rel: refines}
      - {target: 87b56473f379, rel: mitigates}
      - {target: 7262b1c5db4f, rel: mitigates}
    deprecated: false

  - number: WORKER-D-003
    hash: cbc1e836c877
    name: signed-transaction-intent
    type: design_pattern
    description: >
      For consequential business actions the worker submits a signed transaction intent to the
      API instead of writing state directly. The API authenticates delegated authority, verifies
      worker identity, and hands the intent to the validator. The validator checks policy,
      business rules, and current state, then appends the accepted transaction through the
      standard write path. The committed record preserves both principal authority and execution
      provenance.
    problem: |
      Some agent tasks produce consequential business actions where the platform must preserve
      both what the agent proposed and what the system ultimately accepted.
    solution: |
      The worker submits a signed transaction intent to the API instead of writing state directly.
      The API authenticates the delegated authority, verifies the worker identity, and hands the
      intent to the validator. The validator checks policy, business rules, and current state, then
      appends the accepted transaction through the standard write path. The committed record
      preserves both principal authority and execution provenance.
    tradeoffs: |
      Intent submission adds another step between task completion and final state mutation. That
      cost is intentional: enterprise-grade business actions require a visible validation boundary,
      not direct mutation from worker output.
    links:
      - {target: 04607753d09a, rel: refines}
      - {target: 3b08589dd247, rel: refines}
      - {target: 24b901f01525, rel: refines}
      - {target: a83da95e0890, rel: refines}
    deprecated: false

  - number: WORKER-D-004
    hash: 6a55cc478eca
    name: vendor-binary-process-spawn
    type: design_pattern
    description: >
      Vendor CLI binaries are copied into the worker image at build time. The agent invokes them
      using direct process spawn (array form), not via a shell interpreter. Input is passed as
      arguments or via stdin; output is captured on stdout/stderr. No shell interpolation
      occurs. Vendor CLI updates require rebuilding and redeploying the worker image.
    problem: |
      Worker containers must invoke AI vendor CLIs (claude, gemini, codex) without a shell,
      without package management, and without the ability to install or modify the binaries at
      runtime.
    solution: |
      Vendor CLI binaries and their runtime dependencies are copied into the worker container image
      at build time. The agent daemon invokes them using a direct process spawn call — not via a
      shell interpreter. The binary path is hardcoded in the agent's configuration. All input to
      the binary is passed as arguments or via stdin; no shell interpolation occurs. All output is
      captured on stdout/stderr and parsed by the agent.
    tradeoffs: |
      Vendor CLI binaries must be updated by rebuilding and redeploying the worker container image.
      There is no mechanism for the agent to self-update its CLIs. This is intentional — a
      container that can update its own binaries is a container that can be induced to run arbitrary
      code. The release pipeline for the worker image is the update mechanism.
    links:
      - {target: 5ae0f5e26e80, rel: mitigates}
      - {target: 50e243fb9728, rel: refines}
      - {target: 445514ee90dd, rel: refines}
      - {target: fb9c8615723a, rel: refines}
    deprecated: false

  - number: WORKER-D-005
    hash: 8979f3da3356
    name: structured-execution-audit-log
    type: design_pattern
    description: >
      Every agent execution (task claim, vendor API call, CLI invocation, result submission) is
      logged to a structured audit table via the API. Log entries include task ID, agent type,
      operation type, input hash, output hash, token used, timestamp, and result status. Actual
      prompt and response content is stored in the task record under the data blueprint's
      encryption and retention policies, never written directly by the agent.
    problem: |
      An agent that calls an AI vendor API or spawns a vendor CLI generates outputs that must be
      attributable, inspectable, and retainable for debugging and compliance — but these outputs
      must not bypass the data layer's privacy controls.
    solution: |
      Every agent execution — task claim, vendor API call, vendor CLI invocation, result submission
      — is logged to a structured audit table via the API (not directly). The log entry includes:
      task ID, agent type, operation type, input hash (not plaintext), output hash, token used,
      timestamp, and result status. The actual prompt and response content may be stored in the
      task record itself (subject to the data blueprint's encryption and retention policies) but are
      never written directly by the agent.
    tradeoffs: |
      Hashing inputs and outputs enables tamper detection but prevents content inspection without
      the original. For debugging this is inconvenient; for compliance it is necessary. The task
      record, accessible via the API to authorized users, contains the full content where policy
      permits.
    links:
      - {target: 1192f1b1f366, rel: mitigates}
      - {target: 69e1235be7de, rel: refines}
      - {target: 1d4f90a4eaed, rel: refines}
      - {target: 092c015ce976, rel: refines}
    deprecated: false

  - number: WORKER-D-006
    hash: f97902bbcca1
    name: sandboxed-digital-twin-execution
    type: design_pattern
    description: >
      The worker requests or is assigned a sandboxed digital twin containing only the
      production-relevant state slice needed for the task. The twin runs with isolated
      credentials and is torn down after execution. The worker uses it to simulate transactions,
      observe downstream events, and produce a structured artifact of proposed changes. Only a
      later authorized submission may affect production.
    problem: |
      An agent needs to test a consequential transaction sequence or workflow before it is safe to
      ask the platform to commit it. Doing that exploration against production state is unsafe;
      doing it against fabricated data is misleading.
    solution: |
      The worker requests or is assigned a sandboxed digital twin. The twin contains only the
      production-relevant slice of state needed for the task, runs with isolated credentials, and
      is torn down automatically after execution. The worker uses the twin to simulate transactions,
      observe downstream events, and produce a structured artifact: proposed transaction sequence,
      state diff, emitted events, and invariant results. Only a later authorized submission may
      affect production.
    tradeoffs: |
      Twin orchestration increases worker complexity and requires fast clone creation
      infrastructure. The payoff is that agent experimentation becomes a supported platform
      capability instead of an unsafe improvisation.
    links:
      - {target: 6e0a5f6d7052, rel: refines}
      - {target: 7affec197709, rel: refines}
      - {target: 26d63fdd6ec7, rel: refines}
    deprecated: false

  - number: WORKER-D-007
    hash: cebee7387f5b
    name: per-agent-type-service-token
    type: design_pattern
    description: >
      Each agent type is issued a dedicated API service token at deployment time. The token
      encodes the agent type and is scoped to: subscribing to that type's SSE task stream,
      calling the claim endpoint for tasks of that type, and submitting results using a delegated
      user token. The service token is injected via a Kubernetes Secret scoped to that agent
      type's deployment. Adding a new agent type requires issuing a new service token and
      explicit review.
    problem: |
      Multiple agent types must not be able to subscribe to each other's task streams, claim each
      other's tasks, or submit results under each other's identity — even if they share the same
      container image or binary.
    solution: |
      Each agent type is issued a dedicated API service token at deployment time. The API validates
      the token on every request and rejects any request where the token's encoded agent type does
      not match the requested resource (e.g. a coding token cannot subscribe to the analysis stream
      or claim an analysis task). The service token carries no database credentials and grants no
      database access. Isolation is enforced at the API layer; there are no per-type database roles
      for worker containers.
    tradeoffs: |
      Each new agent type requires a new service token provisioned out-of-band and a cluster
      re-apply. Token issuance is not self-service. This is intentional — adding a new agent type
      is an architectural decision, not a configuration change, and requires explicit review.
    links:
      - {target: 828eead860c0, rel: refines}
      - {target: f84a99a27579, rel: refines}
      - {target: 6dbf9c26bf09, rel: mitigates}
      - {target: 7bd1b8579f60, rel: mitigates}
    deprecated: false

  - number: WORKER-D-008
    hash: 6ce2baacd8ee
    name: worker-spawning-model
    type: design_pattern
    description: >
      Workers follow one of two spawning models depending on task characteristics. Long-running
      poll loop: a worker replica runs continuously, polling the task queue at intervals, claiming
      and executing tasks as they arrive. Appropriate for high-frequency task types where startup
      cost matters (AI CLI orchestration, ETL runners). Short-running single-task: a worker is
      spawned on demand (e.g. a k8s Job) to execute a specific task, then exits. Appropriate for
      infrequent, heavyweight tasks (document generation, batch migration) where idle resource
      consumption matters. Both models use the same claim-execute-submit lifecycle; the difference
      is whether the claim loop runs in a persistent process or in a per-task container.
    problem: |
      A one-size-fits-all worker model wastes resources: a persistent worker running idle for rare
      tasks consumes memory and CPU; a per-task spawn for high-frequency tasks incurs container
      startup overhead on every task.
    solution: |
      Two spawning models under the same lifecycle contract. Long-running workers suit frequent
      tasks. Short-running Jobs suit rare, heavyweight tasks. The task queue and API-mediated write
      path are identical for both.
    tradeoffs: |
      Two operational models to monitor and deploy. The claim-execute-submit contract is shared,
      so the only divergence is in scheduling and lifecycle management.
    links:
      - {target: 1ff01557fc89, rel: refines}
      - {target: 828eead860c0, rel: refines}
    deprecated: false

  # ── Architectures ──

  - number: WORKER-A-001
    hash: 293e98fe383a
    name: single-agent-single-replica
    type: architecture
    description: >
      Single agent type, single replica. Worker container communicates with the API only — for SSE
      task discovery, task claiming, and result submission. The worker has no database connection,
      no database credentials, and no network path to port 5432. All application state access is
      mediated by the API server. Appropriate for early-stage projects with low task volume.
      No redundancy; tasks queue up if the worker dies.
    diagram: |
      ┌─────────────────────────────────────────────────────────────────┐
      │  Cluster                                                        │
      │                                                                 │
      │  ┌─────────────────┐     ┌──────────────────────────────────┐   │
      │  │  Worker Container│     │  API Container                 │   │
      │  │                 │     │                                  │   │
      │  │  Bun daemon     │────▶│  GET  /tasks/stream (SSE)        │   │
      │  │  Vendor CLIs    │────▶│  POST /tasks/claim               │   │
      │  │  (no shell)     │────▶│  POST /tasks/{id}/result         │   │
      │  │  no DB creds    │     │  (validates delegated token)     │   │
      │  └─────────────────┘     └──────────────┬───────────────────┘   │
      │                                         │ reads + writes         │
      │                                         ▼                        │
      │  ┌─────────────────────────────────────────────────────────┐    │
      │  │  Database Container                                     │    │
      │  │  task_queue_view_<type>  (API server reads)             │    │
      │  │  task_queue table        (API server writes)            │    │
      │  └─────────────────────────────────────────────────────────┘    │
      │                                                                 │
      │  ──────── Network policy ────────────────────────────────────   │
      │  Worker → API:  allowed (HTTPS)                                 │
      │  Worker → DB:   blocked (no credentials, no network path)       │
      │  API    → DB:   allowed (app_rw role, connection pool)          │
      └─────────────────────────────────────────────────────────────────┘
    when_appropriate: |
      Single agent type, early-stage project, low task volume. One replica is sufficient. The task
      claim is atomic so no queue starvation occurs with a single consumer.
    tradeoffs: |
      No redundancy — if the worker container dies, tasks queue up until it restarts. No horizontal
      scaling. Acceptable for low task volume where the task queue provides natural buffering.
    links:
      - {target: 828eead860c0, rel: refines}
      - {target: 04607753d09a, rel: refines}
      - {target: fec546a4edeb, rel: refines}
    deprecated: false

  - number: WORKER-A-002
    hash: fee38de47d57
    name: multi-agent-concurrent-replicas
    type: architecture
    description: >
      Multiple agent types running concurrently with per-type replicas scaling independently.
      Each type has its own Kubernetes deployment, per-type API service token, and vendor API
      credentials. No agent type holds database credentials. A single API layer serves as the
      sole read/write surface for all agent types. Isolation is enforced by API-layer token
      validation and network policy; there are no per-type database roles for workers.
    diagram: |
      ┌──────────────────────────────────────────────────────────────────────┐
      │  Cluster                                                             │
      │                                                                      │
      │  ┌─────────────────────┐   ┌─────────────────────┐                  │
      │  │  Agent: coding (×N) │   │ Agent: analysis (×M) │                 │
      │  │  token: coding_svc  │   │ token: analysis_svc  │                 │
      │  │  vendor: claude CLI │   │ vendor: gemini API   │                 │
      │  │  no DB credentials  │   │ no DB credentials    │                 │
      │  └──────────┬──────────┘   └──────────┬───────────┘                 │
      │             │ SSE + claim              │ SSE + claim                 │
      │             └──────────┬──────────────┘                              │
      │                        ▼                                             │
      │             ┌──────────────────────┐                                 │
      │             │  API Server          │  ← sole DB read/write surface  │
      │             │  SSE fan-out         │                                 │
      │             │  claim + result      │                                 │
      │             │  validates token     │                                 │
      │             │  enforces type scope │                                 │
      │             └──────────┬───────────┘                                 │
      │                        │ app_rw role                                 │
      │             ┌──────────▼───────────┐                                 │
      │             │  Database            │                                 │
      │             │  view: _coding       │  (API server reads)            │
      │             │  view: _analysis     │  (API server reads)            │
      │             │  task_queue table    │  (API server reads + writes)   │
      │             └──────────────────────┘                                 │
      │                                                                      │
      │  ──────── Network policy ─────────────────────────────────────────  │
      │  Worker → API: allowed (HTTPS, per-type service token)              │
      │  Worker → DB:  blocked (no credentials, no network path)            │
      └──────────────────────────────────────────────────────────────────────┘
    when_appropriate: |
      Multiple agent types running concurrently. Replicas per agent type scale with task volume.
      Each type is independently deployable and independently scalable.
    tradeoffs: |
      Requires per-type Kubernetes deployments, per-type API service tokens, and per-type vendor
      API credentials. The operational surface grows with each agent type added. The isolation
      guarantees make this necessary at any scale where multiple agent types operate on shared
      infrastructure.
    links:
      - {target: f84a99a27579, rel: refines}
      - {target: cebee7387f5b, rel: refines}
      - {target: 293e98fe383a, rel: refines}
    deprecated: false

