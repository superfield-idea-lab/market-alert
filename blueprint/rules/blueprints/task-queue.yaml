  # ── Antipatterns ──

  - number: TQ-X-001
    hash: 4573785143b4
    name: polling-without-backoff
    type: antipattern
    description: >
      The API server's internal poll loop running with no interval or backoff when the queue is
      empty wastes database connections, CPU, and I/O. The API server's poll loop must sleep for
      a configurable interval (default: seconds, not milliseconds) when no tasks are found.
      Workers never poll the database directly; they receive SSE heartbeats driven by the API
      server's poll loop and are never in a position to create a tight database poll loop.
    links:
      - {target: d3356916c05d, rel: contradicts}  # TQ-P-005 notification-assists-polling-not-replaces
    deprecated: false

  - number: TQ-X-002
    hash: 95ded67ad0b9
    name: business-data-in-payload
    type: antipattern
    description: >
      Embedding user content, financial amounts, email addresses, or any business data in the
      queue payload. The payload JSONB is visible in database logs, monitoring tools, error
      reporters, and dead-letter inspection. Every field in the payload is a field that can leak
      through infrastructure tooling that was never designed for PII handling.
    links:
      - {target: dae3a050b125, rel: contradicts}  # TQ-P-002 opaque-reference-payloads
    deprecated: false

  - number: TQ-X-003
    hash: 2db711f071fb
    name: retry-without-limit
    type: antipattern
    description: >
      A task that retries indefinitely consumes worker capacity on every attempt and never
      surfaces the underlying failure to an operator. Unbounded retry transforms a transient
      failure into a permanent resource drain. Retries must be bounded with a maximum attempt
      count and a dead-letter terminal state.
    links:
      - {target: 989f89ed43f6, rel: contradicts}  # TQ-P-004 bounded-retry-with-dead-letter
    deprecated: false

  - number: TQ-X-004
    hash: 0718a9a15e3f
    name: notification-as-sole-trigger
    type: antipattern
    description: >
      The API server relying on LISTEN/NOTIFY as the sole mechanism for task discovery, with no
      internal poll-loop fallback. Notifications are best-effort — lost during connection
      interruptions, channel buffer overflows, and API server restarts. The API server's bounded
      poll loop is mandatory; SSE heartbeats driven by that loop ensure workers receive a wakeup
      even when no pg_notify fires. Workers that depend only on SSE task_available events (and
      receive no heartbeat) will stall silently if the API server's LISTEN connection drops.
    links:
      - {target: d3356916c05d, rel: contradicts}  # TQ-P-005 notification-assists-polling-not-replaces
    deprecated: false

  - number: TQ-X-006
    hash: d9c4e1b72a30
    name: worker-direct-database-connection
    type: antipattern
    description: >
      A worker container connecting to the database for any purpose — including reading the task
      queue view — violates zero-database-connectivity (WORKER-P-001). The task queue is not a
      public read surface; it is an internal API-server resource. Even a read-only connection
      grants the worker database credentials, a port-5432 network path, and the ability to probe
      schema structure and exhaust the connection pool. Task discovery must flow through the API's
      SSE stream (WORKER-D-001); task claiming must flow through the API's claim endpoint. The
      database is not a worker API.
    links:
      - {target: 828eead860c0, rel: contradicts}   # WORKER-P-001 zero-database-connectivity
      - {target: fec546a4edeb, rel: contradicts}   # WORKER-D-001 api-streaming-task-discovery
      - {target: d3356916c05d, rel: contradicts}   # TQ-P-005 notification-assists-polling-not-replaces
    deprecated: false

  - number: TQ-X-005
    hash: 6a18e8f4ff97
    name: api-server-executes-cpu-bound-work
    type: antipattern
    description: >
      The API server executing CPU-bound work inline — running an ETL pipeline, generating a PDF,
      or invoking an AI CLI process within an HTTP request handler. CPU-bound work in the request
      path blocks the event loop (or thread pool), increases response latency for all clients, and
      makes the operation non-retryable if the request times out. The API server creates a
      task_queue entry and returns immediately; workers execute the work asynchronously.
    links:
      - {target: 1ff01557fc89, rel: contradicts}
      - {target: 05868a1ea754, rel: contradicts}
    deprecated: false
