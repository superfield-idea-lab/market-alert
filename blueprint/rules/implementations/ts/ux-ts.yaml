meta:
  domain: IMPL-UX
  title: UX - TypeScript Implementation
  implements: UX
  version: 1

rules:
  # ── Package Structure ──────────────────────────────────────────────────────────

  - number: IMPL-UX-001
    hash: c9183c1222df
    name: monorepo-surface-layout
    type: implementation
    description: >
      Monorepo organized into packages/ui (design-system, end-user, admin),
      packages/services (capability-api), and apps (web, admin, agent-sdk,
      server with api and agent-router). Each actor type maps to a distinct
      app consuming shared packages.
    links:
      - {target: 67863239eb85, rel: implements}  # UX-A-001 unified-service-layer-multiple-surfaces
      - {target: 60c41e0c35c7, rel: implements}  # UX-D-004 unified-design-system-across-user-types
    deprecated: false

  # ── Core Interfaces ────────────────────────────────────────────────────────────

  - number: IMPL-UX-002
    hash: e403416186fd
    name: capability-interface
    type: implementation
    description: >
      TypeScript Capability interface with id, allowedActors (ActorType[]),
      and requiredScopes (string[]). Serves as the atomic unit of UX design
      and access control across all surfaces.
    links:
      - {target: 8de237165c47, rel: implements}  # UX-D-003 agent-native-interface
      - {target: 300c0e349c72, rel: implements}  # UX-A-002 api-first-client-agnostic
    deprecated: false

  - number: IMPL-UX-003
    hash: 45c3e9f3959c
    name: actor-type-enum
    type: implementation
    description: >
      ActorType union type ('end-user' | 'admin' | 'agent') determines which
      interface surface is appropriate for each actor. Used by Capability to
      gate access per surface.
    links:
      - {target: e43e9ff85857, rel: implements}  # UX-P-003 medium-appropriate-interface-per-user-type
    deprecated: false

  - number: IMPL-UX-004
    hash: 89d1ed6147ee
    name: agent-presence-interface
    type: implementation
    description: >
      AgentPresence interface declares agent identity, account binding,
      authorized scopes, grant and last-active timestamps. The
      visibleToAccountHolder field is an invariant (always true), ensuring
      the account holder can always see the agent.
    links:
      - {target: b6f0649c24cf, rel: implements}  # UX-P-005 agent-presence-explicit-and-bounded
    deprecated: false

  - number: IMPL-UX-005
    hash: a3434ed492e8
    name: agent-action-record-interface
    type: implementation
    description: >
      AgentActionRecord interface logs every agent operation with agentId,
      accountId, capabilityId, human-readable inputSummary, outcome
      (success | rejected | failed), and timestamp.
    links:
      - {target: b6f0649c24cf, rel: implements}  # UX-P-005 agent-presence-explicit-and-bounded
    deprecated: false

  - number: IMPL-UX-006
    hash: 4d981fb18e23
    name: service-flow-state-interface
    type: implementation
    description: >
      ServiceFlowState interface models a state in the service flow state
      machine with id, label, and availableTransitions. This is the
      authoritative UX specification unit from which interfaces are derived.
    links:
      - {target: 173636ad122f, rel: implements}  # UX-D-001 service-flow-mapping
      - {target: d7f85752c1b1, rel: implements}  # UX-P-001 service-delivery-precedes-surface-design
    deprecated: false

  - number: IMPL-UX-007
    hash: c5bf9dc442c8
    name: service-flow-transition-interface
    type: implementation
    description: >
      ServiceFlowTransition interface models a transition between states with
      id, trigger (user-action | system-event | agent-action), targetStateId,
      and requiredCapability mapping to Capability.id.
    links:
      - {target: 173636ad122f, rel: implements}  # UX-D-001 service-flow-mapping
    deprecated: false

  # ── Dependency Decisions ───────────────────────────────────────────────────────

  - number: IMPL-UX-008
    hash: e47230dc6081
    name: react-buy-decision
    type: implementation
    description: >
      React is a buy decision for the UI component model. No viable DIY
      alternative exists for the browser rendering layer. Used by apps/web
      and apps/admin.
    links:
      - {target: 95f2b6bff569, rel: implements}  # UX-P-004 beauty-is-functional-requirement
    deprecated: false

  - number: IMPL-UX-009
    hash: 98d7226de402
    name: tailwind-buy-decision
    type: implementation
    description: >
      Tailwind CSS is a buy decision for design tokens and utility classes.
      DIY CSS at scale is unmaintainable without a preprocessor or framework.
      Provides the token system for the shared design system.
    links:
      - {target: 95f2b6bff569, rel: implements}  # UX-P-004 beauty-is-functional-requirement
      - {target: 60c41e0c35c7, rel: implements}  # UX-D-004 unified-design-system-across-user-types
    deprecated: false

  - number: IMPL-UX-010
    hash: cfc8c6e2114d
    name: design-token-generator-diy
    type: implementation
    description: >
      Design token generator is DIY. Token definitions are a JSON file; no
      external package is needed to produce or consume them.
    links:
      - {target: 60c41e0c35c7, rel: implements}  # UX-D-004 unified-design-system-across-user-types
    deprecated: false

  - number: IMPL-UX-011
    hash: 3631e7b6a114
    name: agent-sdk-http-client-diy
    type: implementation
    description: >
      Agent SDK HTTP client is DIY. fetch is native to Bun; a thin typed
      wrapper over fetch is under 50 lines. No HTTP client library needed.
    links:
      - {target: 8de237165c47, rel: implements}  # UX-D-003 agent-native-interface
    deprecated: false

  - number: IMPL-UX-012
    hash: d86c976bee04
    name: component-docs-static-build
    type: implementation
    description: >
      Component documentation is a DIY static markdown or auto-generated HTML
      artifact produced by the build pipeline. No runtime dev server tool
      (e.g. Storybook) is warranted or permitted.
    links:
      - {target: 60c41e0c35c7, rel: implements}  # UX-D-004 unified-design-system-across-user-types
    deprecated: false

  - number: IMPL-UX-013
    hash: dadf0ad4deb6
    name: form-state-react-native
    type: implementation
    description: >
      Form state management is DIY using React useState and controlled
      inputs. No external form library is needed at Superfield scale.
    links:
      - {target: e49ebcb9644c, rel: implements}  # UX-P-006 specifications-describe-needs-not-implementations
    deprecated: false

  # ── Antipatterns (TypeScript/Superfield-Specific) ─────────────────────────────────

  - number: IMPL-UX-014
    hash: a8d946b7440e
    name: no-technology-specific-specs
    type: implementation
    description: >
      Design documents must not specify implementation details such as
      "use a React modal" or "apply a Tailwind flex container."
      Specifications describe user states and transitions; implementations
      satisfy them independently.
    links:
      - {target: e49ebcb9644c, rel: implements}  # UX-P-006 specifications-describe-needs-not-implementations
      - {target: 099bffc7e55a, rel: implements}  # UX-T-007 design-coupled-to-framework
    deprecated: false

  - number: IMPL-UX-015
    hash: 8c5904835856
    name: no-gui-dependent-tooling
    type: implementation
    description: >
      Superfield runs on hosted Linux with no display server. Any tool requiring
      a live browser window, native GUI, or local dev server (e.g. Storybook,
      Figma desktop agents, visual diff tools) is prohibited. Visual output
      is evaluated via headless Playwright screenshots. If a tool cannot run
      headlessly and produce output to stdout or a file, it does not belong
      in the toolchain.
    links:
      - {target: 95f2b6bff569, rel: implements}  # UX-P-004 beauty-is-functional-requirement
    deprecated: false

  - number: IMPL-UX-016
    hash: 9a6f2c1d7b80
    name: ux-governance-canonical-json-contracts
    type: implementation
    description: >
      UX governance canonical artifacts are stored as JSON under
      docs/technical/ux-governance/ and treated as the authoritative source.
      Required phase artifacts are intake, domain capability map,
      information architecture, screen specs, review findings, handoff
      contract, state matrix, and conformance report. Each canonical JSON
      artifact includes artifact_id, artifact_type, phase, version, status,
      owner, updated_at, source_artifacts, and derived_artifacts. Markdown,
      Mermaid, HTML, and SVG outputs are derived from those JSON files and
      may be regenerated, but never edited as the source of truth.
    links:
      - {target: 1f7f7b6a4c21, rel: implements}
      - {target: d7f85752c1b1, rel: implements}
      - {target: e49ebcb9644c, rel: implements}
    deprecated: false

  - number: IMPL-UX-017
    hash: f1d2c3b4a5e6
    name: ux-governance-gate-status
    type: implementation
    description: >
      UX governance gate status is a closed union: pass,
      pass_with_revisions, or fail. The status is attached to each gate
      result and used to drive the revision loop and approval decision.
    links:
      - {target: 1f4c2d9a7b8e, rel: implements}
      - {target: 2b7d1e9f4a6c, rel: implements}
    deprecated: false

  - number: IMPL-UX-018
    hash: cc11dd22ee33
    name: ux-governance-gate-definition
    type: implementation
    description: >
      UXGovernanceGate definition captures gate id, sequence number,
      reviewer role, explicit fail conditions, status, and evidence
      references. Each gate is deterministic enough to be evaluated without
      subjective approval language.
    links:
      - {target: 1f4c2d9a7b8e, rel: implements}
      - {target: 2b7d1e9f4a6c, rel: implements}
    deprecated: false

  - number: IMPL-UX-019
    hash: b1c2d3e4f5a6
    name: ux-governance-critique-record
    type: implementation
    description: >
      UXGovernanceCritiqueRecord captures issue, why_it_matters, evidence,
      severity, proposed_fix, gate_id, and blocking. The record format is the
      canonical output of all review agents.
    links:
      - {target: 1f4c2d9a7b8e, rel: implements}
      - {target: 7c2e1a9d5b4f, rel: implements}
    deprecated: false

  - number: IMPL-UX-020
    hash: dd22ee33ff44
    name: ux-governance-revision-loop
    type: implementation
    description: >
      UX governance revision loop re-runs the affected gates after
      synthesis. High-severity findings remain blocking until they are
      cleared. The loop terminates only when all gates are pass or
      pass_with_revisions with no remaining high-severity findings.
    links:
      - {target: 1f4c2d9a7b8e, rel: implements}
      - {target: 7c2e1a9d5b4f, rel: implements}
    deprecated: false

  - number: IMPL-UX-021
    hash: 8b0fe15f404f
    name: ts-ci-conformance-report-json
    type: implementation
    description: >
      CI emits ux-conformance-report.json for every deterministic-gate UX validation run.
      The report records run identity, commit identity, per-page hard checks,
      evidence locations, blocking issues, and the final merge decision.
    links:
      - {target: 130d0ff25610, rel: implements}
      - {target: f9b2be6bec16, rel: implements}
    deprecated: false

  - number: IMPL-UX-022
    hash: 263e6e5a93e7
    name: ts-accessibility-structure-gate
    type: implementation
    description: >
      Headless Playwright accessibility gate validates critical views against
      ARIA snapshots and axe-core checks. Critical violations or structure
      drift in the approved state are merge blockers.
    links:
      - {target: e25d3654327e, rel: implements}
    deprecated: false

  - number: IMPL-UX-023
    hash: 0ee6280f581a
    name: ts-dom-css-layout-token-gate
    type: implementation
    description: >
      DOM and CSS gate validates approved design token usage, component
      vocabulary, spacing, typography, overflow, overlap, clipped content,
      and primary-action placement in critical views.
    links:
      - {target: 46ed8e8e96d6, rel: implements}
    deprecated: false

  - number: IMPL-UX-024
    hash: c94b8e1a0367
    name: ts-flow-graph-gate
    type: implementation
    description: >
      Flow graph gate compares implemented routes and task transitions to the
      approved service-flow graph and fails on missing states, dead ends,
      unreachable critical actions, or unexpected branching.
    links:
      - {target: ab7ab23512ad, rel: implements}
    deprecated: false

  - number: IMPL-UX-025
    hash: caca24810626
    name: ts-targeted-visual-regression-gate
    type: implementation
    description: >
      Targeted visual regression gate captures headless Playwright
      screenshots for whitelisted critical screens and states, then compares
      them against approved baselines. Missing baselines or excessive drift
      block merge.
    links:
      - {target: 8b04a200f070, rel: implements}
    deprecated: false

  - number: IMPL-UX-026
    hash: 41329311a3f5
    name: ts-performance-rendering-sanity-gate
    type: implementation
    description: >
      Performance and rendering sanity gate checks that critical pages render
      without hydration failures, blank first paint, or unacceptable layout
      instability before merge.
    links:
      - {target: 24f52c5dd608, rel: implements}
    deprecated: false

  - number: IMPL-UX-027
    hash: b1c4a3d12f01
    name: ts-saliency-scoring-warning
    type: implementation
    description: >
      Saliency scoring job computes warning-only focal-point scores and
      heatmaps for critical pages and states. Output is advisory until a
      calibrated threshold promotes it to a gate.
    links:
      - {target: d14e2f6a9b01, rel: implements}
      - {target: 4bf26c1a8d31, rel: implements}
    deprecated: false

  - number: IMPL-UX-028
    hash: b1c4a3d12f02
    name: ts-screenshot-layout-parsing-warning
    type: implementation
    description: >
      Screenshot layout parsing job extracts warning-only hierarchy and
      balance signals from headless screenshots. Output is recorded for
      review, not used as a merge blocker.
    links:
      - {target: d14e2f6a9b02, rel: implements}
      - {target: 4bf26c1a8d31, rel: implements}
    deprecated: false

  - number: IMPL-UX-029
    hash: b1c4a3d12f03
    name: ts-model-assisted-ux-lint-warning
    type: implementation
    description: >
      Model-assisted UX lint job produces warning-only findings for clutter,
      ambiguous labels, and unsupported interaction patterns. Promotion to a
      blocking signal requires calibration evidence.
    links:
      - {target: d14e2f6a9b03, rel: implements}
      - {target: 4bf26c1a8d31, rel: implements}
    deprecated: false

  - number: IMPL-UX-030
    hash: b1c4a3d12f04
    name: ts-synthetic-walkthrough-quality-warning
    type: implementation
    description: >
      Synthetic walkthrough quality job scores end-to-end journeys for
      friction, detours, and state-coverage gaps. Output stays warning-only
      until calibrated and explicitly promoted.
    links:
      - {target: d14e2f6a9b04, rel: implements}
      - {target: 4bf26c1a8d31, rel: implements}
    deprecated: false

  - number: IMPL-UX-031
    hash: b1c4a3d12f05
    name: ts-soft-signal-promotion-criteria
    type: implementation
    description: >
      Soft-signal promotion criteria define the labeled baseline, threshold,
      and error-budget requirements that must exist before any threshold-scored signal
      can become merge-blocking.
    links:
      - {target: d14e2f6a9b05, rel: implements}
      - {target: 4bf26c1a8d31, rel: implements}
    deprecated: false

  - number: IMPL-UX-032
    hash: b1c4a3d12f06
    name: ts-soft-signal-report-section
    type: implementation
    description: >
      UX conformance report includes a soft_signals section with per-page
      threshold-scored signal scores, evidence pointers, warning status, and calibration
      metadata. It remains separate from blocking hard checks.
    links:
      - {target: d14e2f6a9b06, rel: implements}
      - {target: 4bf26c1a8d31, rel: implements}
    deprecated: false

  - number: IMPL-UX-033
    hash: e146ee03816b
    name: state-matrix-json-contract
    type: implementation
    description: >
      state-matrix.json is the authoritative flow/state coverage contract for
      each UX surface. In TypeScript it contains route ids, breakpoint sets,
      required state coverage, max step thresholds, and critical actions. The
      CI gate reads the contract, compares it against headless Playwright and
      ARIA evidence, and fails on missing loading, empty, error, success, or
      permission_denied coverage; dead-end screens; unreachable critical
      actions; or paths that exceed the configured step threshold.
    links:
      - {target: 8a969646ab51, rel: implements}
      - {target: 68678e6ff182, rel: verifies}
      - {target: 1cdc130608fa, rel: verifies}
      - {target: 173636ad122f, rel: implements}
    deprecated: false
