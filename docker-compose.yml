## docker-compose.yml — zero-config local development.
##
## Usage:
##   docker compose up          # start app + postgres
##   docker compose down -v     # stop and remove volumes
##
## The app service mounts the repo root as a read-only volume so changes to
## source files are reflected immediately (bun --hot handles reload).
## Only node_modules is excluded from the volume mount so the pre-built
## layer inside the image is used instead.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_rw
      POSTGRES_PASSWORD: app_rw_password
      POSTGRES_DB: calypso_app
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app_rw -d calypso_app']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: '31415'
      DATABASE_URL: 'postgres://app_rw:app_rw_password@postgres:5432/calypso_app'
      AUDIT_DATABASE_URL: 'postgres://app_rw:app_rw_password@postgres:5432/calypso_app'
      ANALYTICS_DATABASE_URL: 'postgres://app_rw:app_rw_password@postgres:5432/calypso_app'
    ports:
      - '31415:31415'
    volumes:
      # Mount repository root so source changes are visible inside the container
      - .:/app
      # Exclude node_modules so the pre-built image layer is used
      - /app/node_modules

volumes:
  postgres_data:
