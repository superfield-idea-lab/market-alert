repo_standards:
  description: >
    Concrete repository configuration standards for all Calypso projects.
    These are the machine-enforceable settings that back the principles and
    design patterns declared in the rules above.

  branch_protection:
    target: "~DEFAULT_BRANCH"
    enforcement: active
    bypass_actors: []
    required_pull_request_reviews:
      required_approving_review_count: 1
      dismiss_stale_reviews_on_push: true
      require_last_push_approval: true
    required_status_checks:
      - name: build
        verifies: Project compiles without errors
      - name: lint
        verifies: No lint warnings
      - name: format
        verifies: Code formatted per project style
      - name: unit
        verifies: All unit tests pass
      - name: integration
        verifies: Integration tests pass against real external dependencies
      - name: e2e
        verifies: End-to-end tests pass
      - name: coverage
        verifies: "Line coverage >= 99%"
      - name: checklist
        verifies: All unchecked task items in PR body are checked before merge
      - name: depends-on
        verifies: Any declared Depends-on predecessor PR is merged

  pr_checklist_enforcement: >
    The pr-checklist.yml workflow scans every PR body for unchecked - [ ]
    markdown task items. If any are found, the checklist check fails and the
    PR cannot merge. This enforces that agents and humans explicitly attest
    to every item in the PR description before landing code.

  check_name_registration: >
    GitHub only recognizes a required status check by name after the workflow
    that produces it has run at least once. The scaffold procedure (see
    init/scaffold-task.md) includes a step to pre-register all check names by
    triggering each workflow manually before enabling the ruleset. For the
    checklist check specifically, push a dummy PR or trigger via
    workflow_dispatch before configuring the ruleset.

  ruleset_template: "examples/github-workflows/ruleset.json"

  implementation_checklist:
    - "GitHub ruleset created via `gh api` using the template in examples/github-workflows/ruleset.json"
    - "bypass_actors confirmed empty in the ruleset (verified via `gh api repos/{owner}/{repo}/rulesets`)"
    - "All 9 required check names pre-registered by running each workflow at least once"
    - ".github/workflows/pr-checklist.yml present and triggering on PR open/edit/sync/reopen"
    - "First PR through the gate demonstrates all 9 checks required and passing before merge"
    - "Admin account verified unable to bypass the gate (test with a PR that has a failing check)"
    - "Coverage threshold verified: a PR that drops below 99% line coverage is blocked"
    - "Merge queue ruleset applied via ScaffoldMergeQueue init step with grouping_strategy: HEADGREEN"
    - "Merge agent submits PRs via `gh pr merge --merge` to enqueue them through the active ruleset"

development_state_machine:
  description: >
    The top-level lifecycle machine for a Calypso-managed repository. Tracks
    which phase of the development process is active and delegates setup work
    to sub-state-machines. Implemented as the DevelopmentPhase enum in
    cli/src/state.rs. See also: issues #95, #96.

  phases:
    - slug: init
      name: Init
      description: >
        Repository setup. Delegates entirely to the init state machine
        (InitStep). Entering this phase triggers `calypso init`. This is
        the default entry point for a new repository. Completion of the init
        state machine (InitStep::Complete) automatically transitions the
        development state machine to Development.
    - slug: development
      name: Development
      description: >
        Active feature development. The repository is fully set up and agents
        are running feature work.
    - slug: testing
      name: Testing
      description: >
        Testing and QA. Features are under validation before release.

  transitions:
    - from: Init
      to: Development
      trigger: InitStep reaches Complete
    - from: Development
      to: Testing
      trigger: feature work ready for validation
    - from: Development
      to: Init
      trigger: re-init requested (calypso-cli init --reinit)
    - from: Testing
      to: Development
      trigger: validation complete or correction needed
    - from: Testing
      to: Init
      trigger: re-init requested (calypso-cli init --reinit)

  nested_state_machine_pattern: >
    The Init phase demonstrates the canonical nested state machine pattern
    used throughout Calypso:
    1. The outer machine (DevelopmentPhase) enters Init.
    2. Control is delegated entirely to the inner machine (InitStep).
    3. When InitStep reaches Complete, the outer machine transitions from
       Init to Development.
    4. The outer machine can re-enter Init at any time (e.g. to update
       workflows or re-run doctor checks).
    Future phases (Deployment, Operations) follow the same structure.

  reinit: >
    The Init phase can be re-entered at any time from Development or Testing
    using `calypso-cli init --reinit`. This re-runs all init steps, refreshing
    GitHub Actions workflows and re-verifying setup. It does not destroy
    existing .calypso/ state.

  implementation_references:
    - "cli/src/state.rs — DevelopmentPhase enum"
    - "cli/src/init.rs — InitStep, InitProgress, run_init_interactive"
    - "cli/tests/state.rs — development_phase_* test suite"
    - "issues: #95, #96"

  init_state_machine:
    description: >
      The first step of the development lifecycle: initializing the environment
      and control plane. The `calypso init` command drives a strictly linear
      state machine that sets up a repository for Calypso usage. Progress is
      persisted to `.calypso/init-state.json` so an interrupted init can be
      resumed from the last completed step. Implemented in cli/src/init.rs.
      See also: issues #94, #95.

    steps:
      - slug: prompt-directory
        name: PromptDirectory
        description: >
          Choose or confirm the workspace directory. Non-interactive when run
          from CWD.
      - slug: create-git-repo
        name: CreateGitRepo
        description: >
          Initialize .git if the directory is not already a git repository.
      - slug: create-upstream
        name: CreateUpstream
        description: >
          Create or configure the GitHub upstream remote (origin). Skipped if
          a GitHub remote already exists.
      - slug: scaffold-github-actions
        name: ScaffoldGithubActions
        description: >
          Write the core GitHub Actions workflow files under
          .github/workflows/. Existing files are left unchanged.
        scaffolds:
          - file: .github/workflows/pr-checklist.yml
            purpose: Fails CI if any unchecked task items remain in a PR body
          - file: .github/workflows/pr-depends-on.yml
            purpose: Blocks merge if a Depends-on predecessor PR is unmerged
          - file: .github/workflows/ci.yml
            purpose: Generic CI placeholder; teams replace the run step with their test command
      - slug: scaffold-merge-queue
        name: ScaffoldMergeQueue
        description: >
          Apply the GitHub merge queue branch ruleset from
          examples/github-workflows/ruleset.json using the GitHub Rulesets API.
          Skipped if the ruleset already exists. Transitions to blocked with a
          clear error if the gh CLI lacks sufficient permissions.
      - slug: configure-local
        name: ConfigureLocal
        description: >
          Write .calypso/ directory with repository-state.json, template YAML
          files, and the pre-push git hook.
      - slug: verify-setup
        name: VerifySetup
        description: >
          Run doctor checks to confirm prerequisites and repository
          configuration. Validates: git installed and CWD is a repo, gh CLI
          authenticated, GitHub remote is a GitHub URL, required workflow
          files present.
      - slug: complete
        name: Complete
        description: Terminal state. Init is done.

    transitions:
      - from: PromptDirectory
        to: CreateGitRepo
      - from: CreateGitRepo
        to: CreateUpstream
      - from: CreateUpstream
        to: ScaffoldGithubActions
      - from: ScaffoldGithubActions
        to: ScaffoldMergeQueue
      - from: ScaffoldMergeQueue
        to: ConfigureLocal
      - from: ConfigureLocal
        to: VerifySetup
      - from: VerifySetup
        to: Complete

    persisted_state_file: ".calypso/init-state.json"

    cli_commands:
      - command: "calypso-cli init"
        effect: Run init from the current directory (resume if in progress)
      - command: "calypso-cli init --reinit"
        effect: Re-run all init steps even if previously completed
      - command: "calypso-cli init --state"
        effect: Show the current init state from .calypso/init-state.json

    implementation_references:
      - "cli/src/init.rs — InitStep, InitProgress, run_init_interactive, scaffold_github_actions"
      - "cli/tests/init.rs — unit and integration tests"
      - "issues: #94, #95"

  future_phases:
    - slug: deployment
      name: Deployment
      description: CI/CD pipeline management and environment targeting
    - slug: operations
      name: Operations
      description: Post-release monitoring and incident response
