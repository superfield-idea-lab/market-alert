  # ---------------------------------------------------------------------------
  # Antipatterns
  # ---------------------------------------------------------------------------
  - number: DEPLOY-X-001
    hash: "2a5c123b62fc"
    name: hybrid-environments
    type: antipattern
    description: >
      Developing with hot-reloading dev servers (vite dev) locally but
      deploying compiled containers in production. This guarantees
      environment drift and works-on-my-machine bugs. Agents do not benefit
      from hot-reloading. Build the container. Run the container.
    links:
      - {target: 9d33a458e91a, rel: contradicts}
      - {target: cebbff0e956c, rel: contradicts}
    deprecated: false

  - number: DEPLOY-X-002
    hash: "458559ea02e9"
    name: process-babysitting
    type: antipattern
    description: >
      Starting the application with bun run in a tmux pane and hoping it
      does not crash. When it does, no one notices until a user reports
      downtime. The container orchestrator eliminates this class of failure.
    links:
      - {target: 95e47760b8bd, rel: depends_on}
      - {target: f4deae0ff5d3, rel: contradicts}
      - {target: b9d1a6dddde4, rel: contradicts}
    deprecated: false

  - number: DEPLOY-X-003
    hash: "e6680f845e61"
    name: log-and-pray
    type: antipattern
    description: >
      Writing logs to a file without configuring rotation, retention, or
      aggregation. The volume fills up, the container crashes because it
      cannot write. Rely on container stdout and cluster-level log
      aggregation instead.
    links:
      - {target: 6e3e5055d803, rel: depends_on}
      - {target: 1b33ad831887, rel: contradicts}
    deprecated: false

  - number: DEPLOY-X-004
    hash: "b4adb303f4a9"
    name: dashboard-only-observability
    type: antipattern
    description: >
      Building a monitoring dashboard that a human must watch. An AI agent
      cannot watch a dashboard. Observability for agent-operated systems
      means structured logs and error summaries fetchable via CLI tools over
      the cluster namespace.
    links:
      - {target: 41353c4858b0, rel: contradicts}
      - {target: 330716dd7d97, rel: depends_on}
    deprecated: false

  - number: DEPLOY-X-005
    hash: "f5ee26f6798a"
    name: manual-deploy-rituals
    type: antipattern
    description: >
      A deployment requiring a sequence of commands run from memory.
      Scripted container builds and declarative Kubernetes applies are
      repeatable, auditable, and agent-executable.
    links:
      - {target: 123eab1a292b, rel: contradicts}
      - {target: 5a00e2a1d857, rel: depends_on}
      - {target: bd28ad6f0308, rel: contradicts}
    deprecated: false

  - number: DEPLOY-X-006
    hash: "09455ddf1dff"
    name: silent-browser-errors
    type: antipattern
    description: >
      Catching browser errors in console.error and assuming someone will see
      them. No one sees browser console output in production. Errors not
      forwarded to the server do not exist from the system's perspective.
    links:
      - {target: c4bfd726ae7b, rel: depends_on}
      - {target: aef55d669b45, rel: contradicts}
      - {target: 2a36bd9bbcb2, rel: contradicts}
    deprecated: false

  - number: DEPLOY-X-007
    hash: "b0c1d2e3f4a5"
    name: delayed-rollback
    type: antipattern
    description: >
      Waiting for a human to decide whether to roll back after a health
      check failure. Every second the system remains in a degraded state,
      users are affected. The rollback must happen automatically and
      immediately. The human investigates after availability is restored,
      not before.
    links:
      - {target: 2b3c4d5e6f1a, rel: contradicts}
      - {target: 4913a0616eea, rel: contradicts}
    deprecated: false

  - number: DEPLOY-X-008
    hash: "c1d2e3f4a5b6"
    name: single-health-check
    type: antipattern
    description: >
      Implementing one /health endpoint that checks everything — process
      alive, dependencies connected, disk space, load average. When the
      database is temporarily unreachable, the orchestrator restarts the
      process, which does not fix the database. When the process deadlocks,
      the load balancer continues routing traffic because the dependency
      check still passes from a cached connection. Separate liveness,
      readiness, and deep health checks serve different consumers and
      trigger different responses.
    links:
      - {target: 1a2b3c4d5e6f, rel: contradicts}
      - {target: 98a04633e13c, rel: contradicts}
    deprecated: false
