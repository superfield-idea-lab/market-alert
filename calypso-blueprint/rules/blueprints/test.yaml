  # ── Antipatterns ─────────────────────────────────────────────────────────

  - number: TEST-X-001
    hash: 02319b90c14c
    name: mock-everything
    type: antipattern
    description: >
      Replacing every external dependency with a mock so tests run fast and
      pass reliably. The tests validate the mock's behavior, not the system's.
      When the real dependency changes, tests still pass and production
      breaks.
    links:
      - {target: 1b3bbdf1be70, rel: contradicts}
      - {target: d32ec4d74c54, rel: contradicts}
    deprecated: false

  - number: TEST-X-002
    hash: 02bc6ae8570c
    name: fabricated-fixtures
    type: antipattern
    description: >
      Writing API response fixtures by hand based on documentation or memory
      instead of recording them from live traffic. Handwritten fixtures
      reflect incomplete understanding of the API. The golden fixture recorder
      exists to prevent this.
    links:
      - {target: 5fc6e1e1a2da, rel: contradicts}
      - {target: 135eccfbae17, rel: contradicts}
    deprecated: false

  - number: TEST-X-003
    hash: 73c69823c03a
    name: fixtures-in-env-vars
    type: antipattern
    description: >
      Encoding replay data in .env files or environment variables. Env vars
      are configuration channels, not fixture storage.
    links:
      - {target: 65d4d742b6e6, rel: contradicts}
    deprecated: false

  - number: TEST-X-004
    hash: a12043dd7788
    name: monolithic-ci-workflow
    type: antipattern
    description: >
      Running all test suites in a single workflow and scanning logs to find
      which suite failed. A failed unit test and a failed E2E test produce the
      same red check, requiring manual log inspection.
    links:
      - {target: fab7da1aaf57, rel: contradicts}
      - {target: 37d0664a0b4b, rel: contradicts}
      - {target: d69a992372b2, rel: contradicts}
    deprecated: false

  - number: TEST-X-005
    hash: 75558009a61e
    name: local-ci-divergence
    type: antipattern
    description: >
      Running one set of commands locally and another in CI. Any divergence
      breaks confidence in local results.
    links:
      - {target: 9f579d269f3e, rel: contradicts}
      - {target: 2a5242355dd5, rel: contradicts}
    deprecated: false

  - number: TEST-X-006
    hash: ff3651f8db7d
    name: duplicated-quality-checks
    type: antipattern
    description: >
      Re-running lint/format/build inside every suite workflow despite having
      a dedicated quality gate.
    links:
      - {target: e89af6c2f0d3, rel: contradicts}
      - {target: 9673d6a79b8a, rel: contradicts}
    deprecated: false

  - number: TEST-X-007
    hash: 0dc684f05dd6
    name: tests-after-features
    type: antipattern
    description: >
      Writing tests after the feature is implemented to confirm it works.
      These tests encode current behavior, not intended behavior. Bugs become
      encoded as expected behavior. Test stubs must be written first.
    links:
      - {target: 3c6ad8d36525, rel: contradicts}
      - {target: e045a36e1210, rel: contradicts}
    deprecated: false

  - number: TEST-X-008
    hash: 0fc8dd426891
    name: ignored-flakiness
    type: antipattern
    description: >
      Re-running a failed test because it is flaky instead of investigating
      the root cause. Flaky tests have hidden dependencies on timing,
      ordering, or shared state. Every flaky test is a bug.
    links:
      - {target: 0917f9171c4c, rel: contradicts}
      - {target: 15aa30217ba8, rel: contradicts}
    deprecated: false

  - number: TEST-X-009
    hash: 2485ba0453b8
    name: test-environment-shortcuts
    type: antipattern
    description: >
      Running integration tests natively on the host instead of inside the
      full Kubernetes container deployment. If production runs in Kubernetes,
      integration tests must run against containers in Kubernetes.
    links:
      - {target: db116b037c86, rel: contradicts}
      - {target: 70cc4097e39b, rel: contradicts}
    deprecated: false
