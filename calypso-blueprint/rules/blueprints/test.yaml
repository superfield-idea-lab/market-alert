meta:
  domain: TEST
  title: Testing Blueprint
  version: 1
  requires:
    - ENV
  vision: |
    Tests are the only proof that software works. Code reviews catch style issues and obvious
    logic errors; type systems catch shape mismatches; linters catch formatting. But only a test
    that executes the code on the target platform, with real inputs, and asserts real outputs can
    demonstrate that the software does what it claims to do. Everything else is inference.

    In agent-built software, testing carries an additional burden: the agent that wrote the code is
    not the agent that will maintain it. A future agent — or the same agent in a new session — has
    no memory of the original intent. The test suite is the executable specification. It encodes
    what the code must do, under what conditions, and with what results. Without it, every future
    agent must reverse-engineer intent from implementation, which is how bugs become features and
    regressions become permanent.

    The testing strategy for agent-built software rejects hand-wavy substitutes for production
    behavior. A hand-authored mock replaces a real dependency with a controlled fiction and usually
    confirms the author's assumptions rather than reality. The preferred order is real dependency
    first, recorded fixture from a real dependency second, and a narrowly-scoped fake only when the
    boundary cannot be exercised credibly in automated tests. The cost of ignoring this blueprint is
    a test suite that provides false confidence: green checkmarks that correspond to nothing in
    production.

rules:

  # ── Threats ──────────────────────────────────────────────────────────────

  - number: TEST-T-001
    hash: e9f7459b95e2
    name: environment-parity
    type: threat
    description: >
      Code passes tests on macOS but fails on Linux in production. Tests must
      run on the same OS and runtime as production to ensure environment
      parity.
    links:
      - {target: db116b037c86, rel: depends_on}
      - {target: 79e2238757ad, rel: depends_on}
    deprecated: false

  - number: TEST-T-002
    hash: d32ec4d74c54
    name: test-validity
    type: threat
    description: >
      Mock-based tests pass but real API behavior differs. Tests must exercise
      real behavior, not developer assumptions.
    links:
      - {target: 1b3bbdf1be70, rel: depends_on}
      - {target: 02319b90c14c, rel: depends_on}
    deprecated: false

  - number: TEST-T-003
    hash: 5fc6e1e1a2da
    name: fixture-accuracy
    type: threat
    description: >
      Agent generates test fixtures by guessing API response shapes. Fixtures
      must be recorded from real API calls, never fabricated.
    links:
      - {target: 135eccfbae17, rel: depends_on}
      - {target: 02bc6ae8570c, rel: depends_on}
    deprecated: false

  - number: TEST-T-004
    hash: 4276faad79f4
    name: browser-fidelity
    type: threat
    description: >
      Browser test passes in Node/JSDOM but fails in real Chromium. Component
      and E2E tests must run in a real browser engine.
    links:
      - {target: f34f055c75c5, rel: depends_on}
      - {target: db116b037c86, rel: depends_on}
    deprecated: false

  - number: TEST-T-005
    hash: 32ab573dc484
    name: coverage-completeness
    type: threat
    description: >
      Test suite passes but critical user workflow is untested. Test
      categories must cover unit, integration, component, and end-to-end.
    links:
      - {target: 0dcc3d6b670e, rel: depends_on}
      - {target: a4f8d9204053, rel: depends_on}
    deprecated: false

  - number: TEST-T-006
    hash: 3450e2a1cbdb
    name: merge-gating
    type: threat
    description: >
      CI allows merge despite failing tests. No code merges without all test
      suites passing.
    links:
      - {target: e01fc87ad565, rel: depends_on}
      - {target: fab7da1aaf57, rel: depends_on}
    deprecated: false

  - number: TEST-T-007
    hash: 0917f9171c4c
    name: test-reliability
    type: threat
    description: >
      Flaky test is ignored or disabled instead of fixed. Every test must be
      deterministic; flaky tests are bugs.
    links:
      - {target: 0fc8dd426891, rel: depends_on}
      - {target: 15aa30217ba8, rel: depends_on}
    deprecated: false

  - number: TEST-T-008
    hash: e045a36e1210
    name: test-first-discipline
    type: threat
    description: >
      Agent writes tests after implementation, confirming existing behavior
      rather than specifying intent. Test stubs must be written before
      features, encoding expected behavior.
    links:
      - {target: 3c6ad8d36525, rel: depends_on}
      - {target: 0dc684f05dd6, rel: depends_on}
    deprecated: false

  - number: TEST-T-009
    hash: d69a992372b2
    name: failure-diagnosis
    type: threat
    description: >
      A single CI workflow failure gives no information about which suite
      failed. Each test suite must run in its own workflow for precise
      identification.
    links:
      - {target: fab7da1aaf57, rel: depends_on}
      - {target: 37d0664a0b4b, rel: depends_on}
    deprecated: false

  # ── Principles ───────────────────────────────────────────────────────────

  - number: TEST-P-001
    hash: 1b3bbdf1be70
    name: prefer-real-systems
    type: principle
    description: >
      Prefer real dependencies over test doubles. Order of preference: real
      dependency, recorded fixture from a real dependency, then a
      narrowly-scoped fake only when the boundary cannot be exercised
      credibly. The burden of proof is on the fake. A fake that drifts from
      production behavior is a defect in the test architecture.
    links:
      - {target: d32ec4d74c54, rel: mitigates}
      - {target: 135eccfbae17, rel: refines}
      - {target: 02319b90c14c, rel: refines}
    deprecated: false

  - number: TEST-P-002
    hash: 65d4d742b6e6
    name: fixtures-are-files
    type: principle
    description: >
      Fixtures are serialized artifacts on disk: request/response pairs,
      payload snapshots, logs, and other replayable data captured from real
      systems. Environment variables are runtime configuration only and must
      never be used as fixture storage.
    links:
      - {target: 73c69823c03a, rel: refines}
      - {target: 135eccfbae17, rel: refines}
    deprecated: false

  - number: TEST-P-003
    hash: db116b037c86
    name: test-on-target
    type: principle
    description: >
      Code must be tested on its target platform. Code running in Kubernetes
      in production must be tested in Kubernetes. Code rendering in a browser
      must be tested in a real headless browser engine. The delta between test
      and production environments is where bugs hide; eliminate it entirely.
    links:
      - {target: e9f7459b95e2, rel: mitigates}
      - {target: 4276faad79f4, rel: mitigates}
      - {target: f34f055c75c5, rel: refines}
      - {target: 2485ba0453b8, rel: refines}
    deprecated: false

  - number: TEST-P-004
    hash: 3c6ad8d36525
    name: tests-before-code
    type: principle
    description: >
      Test stubs are created during the scaffold phase before any feature code
      exists. Each stub encodes expected behavior as a failing test. The agent
      makes the tests pass during implementation rather than writing code
      first and confirming it with tests afterward.
    links:
      - {target: e045a36e1210, rel: mitigates}
      - {target: 0dc684f05dd6, rel: refines}
      - {target: c788e858d862, rel: refines}
    deprecated: false

  - number: TEST-P-005
    hash: 217845b40c8f
    name: suite-independence
    type: principle
    description: >
      Each test suite must contain all setup, teardown, and fixture loading it
      needs. It must not depend on another suite having run first, on shared
      global state, or on manual environment preparation. Any developer or CI
      runner can execute any suite in isolation.
    links:
      - {target: fab7da1aaf57, rel: refines}
    deprecated: false

  - number: TEST-P-006
    hash: 9f579d269f3e
    name: local-ci-parity
    type: principle
    description: >
      Developer-machine test invocation must match CI invocation for each
      suite. CI must not run a different runner, setup path, or suite
      selection than local execution. The same commands and suite boundaries
      are used locally and in CI so a local pass predicts a CI pass.
    links:
      - {target: 2a5242355dd5, rel: refines}
      - {target: 75558009a61e, rel: refines}
      - {target: 6d71b8f70b27, rel: refines}
    deprecated: false

  - number: TEST-P-007
    hash: 37d0664a0b4b
    name: precise-failure
    type: principle
    description: >
      When a test fails, the failure message must identify which suite, which
      test, and which assertion failed without requiring log parsing. CI
      workflows are organized one-per-suite so a red check immediately names
      the broken category.
    links:
      - {target: d69a992372b2, rel: mitigates}
      - {target: fab7da1aaf57, rel: refines}
      - {target: a12043dd7788, rel: refines}
    deprecated: false

  - number: TEST-P-008
    hash: 7e1f4bd87e6f
    name: replay-recovery-simulation
    type: principle
    description: >
      Correctness extends beyond request/response behavior. The system must
      prove it can replay durable facts into correct state, recover from clean
      backups, and create isolated sandbox twins that do not leak mutations
      into production. These are core verification surfaces for autonomous
      enterprise software.
    links:
      - {target: a6f272bc5960, rel: refines}
      - {target: 9b05a04ba813, rel: refines}
      - {target: f8776a7fc7da, rel: refines}
      - {target: b8b90c432e76, rel: refines}
      - {target: 8ff4458283c5, rel: refines}
    deprecated: false

  - number: TEST-P-009
    hash: 13e1b783765f
    name: deterministic-gates
    type: principle
    description: >
      Testing policy is enforced through machine-checkable gates for suite
      pass/fail, local-CI command parity, fixture provenance, replay coverage,
      recovery coverage, and twin lifecycle verification. A repository that
      contains tests but cannot prove these gates is not compliant.
    links:
      - {target: 3450e2a1cbdb, rel: mitigates}
      - {target: e01fc87ad565, rel: refines}
    deprecated: false

  # ── Design Patterns ─────────────────────────────────────────────────────

  - number: TEST-D-001
    hash: 135eccfbae17
    name: golden-fixture-recording
    type: design_pattern
    description: >
      Build a fixture recording tool that makes real HTTP requests to external
      APIs and serializes full request/response pairs to disk. These golden
      fixtures are committed to the repository and replayed during tests.
      Fixtures are periodically refreshed by re-running the recorder against
      the live API. Stale fixtures are mitigated by scheduled refresh runs and
      schema drift alerts.
    problem: |
      Integration tests need realistic API responses, but calling live external APIs on every test
      run is slow, flaky, rate-limited, and may have side effects. Mocking the responses by hand
      produces fixtures that reflect the developer's imagination, not reality.
    solution: |
      Build a fixture recording tool that makes real HTTP requests to external APIs and serializes
      the full request/response pairs to disk. These "golden" fixtures are committed to the
      repository and replayed during tests. The fixtures are periodically refreshed by re-running
      the recorder against the live API. Tests that use golden fixtures compare actual behavior
      against known-real behavior.
    tradeoffs: |
      Fixtures become stale if the external API changes and the recorder is not re-run. Stale
      fixtures cause tests to pass while production fails. Mitigation: schedule periodic fixture
      refresh runs in CI and alert on schema drift.
    links:
      - {target: 1b3bbdf1be70, rel: refines}
      - {target: 65d4d742b6e6, rel: refines}
      - {target: 5fc6e1e1a2da, rel: mitigates}
      - {target: cd574357727a, rel: refines}
      - {target: 02bc6ae8570c, rel: refines}
    deprecated: false

  - number: TEST-D-002
    hash: fab7da1aaf57
    name: suite-per-workflow-ci
    type: design_pattern
    description: >
      Create one CI workflow file per test suite. Each workflow is
      self-contained with its own dependency installation, environment setup,
      suite execution, and result reporting. The merge gate requires all
      workflows to pass. A red check immediately identifies the broken suite.
      Setup duplication across workflows is acceptable to guarantee
      independence.
    problem: |
      A monolithic CI workflow that runs all tests in sequence provides a single pass/fail signal.
      When it fails, the developer must read logs to determine which suite broke. Parallelism within
      the workflow is complex and fragile.
    solution: |
      Create one CI workflow file per test suite. Each workflow is self-contained: it installs
      dependencies, sets up the environment, runs its suite, and reports results. The merge gate
      requires all workflows to pass. A red check on "Component Tests" immediately tells the
      developer where to look.
    tradeoffs: |
      More workflow files to maintain. Shared setup steps are duplicated across workflows. The
      duplication is acceptable because it guarantees independence — a change to component test
      setup cannot break the unit test workflow.
    links:
      - {target: 217845b40c8f, rel: refines}
      - {target: 37d0664a0b4b, rel: refines}
      - {target: d69a992372b2, rel: mitigates}
      - {target: a12043dd7788, rel: refines}
      - {target: 298ede0dfa7f, rel: refines}
    deprecated: false

  - number: TEST-D-003
    hash: 2a5242355dd5
    name: local-ci-command-parity
    type: design_pattern
    description: >
      Define canonical per-suite commands and run those exact commands in both
      local development and CI. CI runs each suite's canonical command in its
      own workflow. Local development can run any single suite command or an
      aggregate command that invokes all canonical suite commands unchanged.
    problem: |
      Tests pass locally but fail in CI because local and CI use different commands, runners, or
      environment setup.
    solution: |
      Define canonical per-suite commands and run those exact commands in both places. CI runs all
      suites by executing each suite's canonical command in its own workflow. Local development can
      run any single suite command or an aggregate command that invokes all canonical suite commands
      unchanged.
    tradeoffs: |
      Slight duplication between local scripts and CI workflow steps. The duplication is intentional
      because parity is the correctness guarantee.
    links:
      - {target: 9f579d269f3e, rel: refines}
      - {target: 75558009a61e, rel: refines}
      - {target: 6d71b8f70b27, rel: refines}
    deprecated: false

  - number: TEST-D-004
    hash: f34f055c75c5
    name: headless-browser-testing
    type: design_pattern
    description: >
      All browser tests run in headless mode using a browser automation
      framework that launches a real browser engine with rendering, layout,
      JavaScript execution, and network behavior identical to a visible
      browser. Visual output is captured as screenshots for inspection by
      humans or vision-capable models.
    problem: |
      Browser code must be tested in a browser, but development environments for AI agents have no
      display server, no GUI, and no way to open a visible browser window.
    solution: |
      All browser tests run in headless mode using a browser automation framework. The framework
      launches a real browser engine (not a DOM simulation) with rendering, layout, JavaScript
      execution, and network behavior identical to a visible browser — but without a display. Visual
      output is captured as screenshots for inspection by humans or vision-capable models.
    tradeoffs: |
      Headless mode cannot test certain display-dependent behaviors (scroll position on physical
      monitors, GPU-accelerated animations). These edge cases are rare and acceptable to exclude
      from automated testing.
    links:
      - {target: db116b037c86, rel: refines}
      - {target: 4276faad79f4, rel: mitigates}
      - {target: 58672304c9d2, rel: refines}
    deprecated: false

  - number: TEST-D-005
    hash: e89af6c2f0d3
    name: separate-quality-gate
    type: design_pattern
    description: >
      Use one dedicated quality-gate workflow for lint, format check, and
      build verification. Keep test workflows focused on executing test suite
      commands only. Merge gating requires both the quality-gate workflow and
      all test-suite workflows to pass.
    problem: |
      Mixing code-quality checks with every test workflow duplicates work and increases CI runtime,
      but skipping quality checks entirely lets formatting/lint/build failures leak into merge gates.
    solution: |
      Use one dedicated quality-gate workflow that runs lint, format check, and build verification.
      Keep test workflows focused on executing their test suite commands only. Merge gating requires
      both the quality-gate workflow and all test-suite workflows to pass.
    tradeoffs: |
      Adds one required workflow and enforces explicit branch-protection configuration. In return,
      CI avoids duplicated lint/format work and test workflow outcomes remain behavior-focused.
    links:
      - {target: 34c0790ac993, rel: refines}
      - {target: 9673d6a79b8a, rel: refines}
      - {target: ff3651f8db7d, rel: refines}
    deprecated: false

  - number: TEST-D-006
    hash: a6f272bc5960
    name: ledger-replay-recovery
    type: design_pattern
    description: >
      Add dedicated tests that start from durable ledger facts and prove the
      system can rebuild state deterministically. The suite must cover replay
      from genesis, replay from checkpoints, restore from backup into a clean
      environment, comparison of rebuilt state to materialized state, and
      rollback or compensation misuse scenarios. Tests run against real
      PostgreSQL and real validator logic.
    problem: |
      A ledgered system can appear correct in normal request handling while still failing the
      enterprise requirements that matter most during incidents: replay, restore, divergence
      detection, and compensating rollback.
    solution: |
      Add dedicated tests that start from durable ledger facts and prove the system can rebuild
      state deterministically. The suite covers replay from genesis, replay from checkpoints,
      restore from backup into a clean environment, comparison of rebuilt state to materialized
      state, and rollback or compensation misuse scenarios. Tests run against real PostgreSQL and
      real validator logic.
    tradeoffs: |
      Replay and recovery tests are slower than unit tests and require more setup. That cost is
      acceptable because disaster recovery guarantees cannot be established by fast tests alone.
    links:
      - {target: 7e1f4bd87e6f, rel: refines}
      - {target: f8776a7fc7da, rel: refines}
      - {target: b8b90c432e76, rel: refines}
    deprecated: false

  - number: TEST-D-007
    hash: 9b05a04ba813
    name: digital-twin-lifecycle
    type: design_pattern
    description: >
      Add a twin lifecycle suite that provisions a sandboxed twin from
      production-relevant inputs, executes a realistic transaction sequence,
      asserts on the produced diff and events, verifies production state is
      unchanged, and confirms teardown revokes access and removes mutable
      state. Tests must use the real twin orchestration path.
    problem: |
      A digital twin feature is only safe if clone creation is fast, isolation is real, and teardown
      reliably removes mutable state and credentials. Without explicit tests, a twin becomes an
      unverified production-adjacent environment.
    solution: |
      Add a twin lifecycle suite that provisions a sandboxed twin from production-relevant inputs,
      executes a realistic transaction sequence inside it, asserts on the produced diff and events,
      verifies that production state is unchanged, and confirms that teardown revokes access and
      removes mutable state. Tests must use the real twin orchestration path, not a mocked clone
      service.
    tradeoffs: |
      Twin lifecycle tests require infrastructure support and can be more operationally involved
      than ordinary integration tests. That is appropriate because the twin feature itself is
      operational infrastructure exposed as a product capability.
    links:
      - {target: 7e1f4bd87e6f, rel: refines}
      - {target: 8ff4458283c5, rel: refines}
    deprecated: false

  # ── Architectures ────────────────────────────────────────────────────────

  - number: TEST-A-001
    hash: 79e2238757ad
    name: single-cluster-sequential-gate
    type: architecture
    description: >
      All suites run sequentially on a single development host or CI runner,
      with a local Kubernetes cluster for integration tests. CI mirrors local
      execution exactly. Appropriate when total test time is under five
      minutes.
    diagram: |
      ┌───────────────────────────────────────────────────────┐
      │  Development Host                                     │
      │                                                       │
      │  ┌────────────┐  ┌───────────────┐  ┌───────────────┐ │
      │  │ Unit Tests │  │ Integration   │  │ Browser Tests │ │
      │  │ (local     │  │ Tests (K8s    │  │ (headless     │ │
      │  │  runner)   │  │  deployment)  │  │  engine)      │ │
      │  └─────┬──────┘  └───────┬───────┘  └───────┬───────┘ │
      │        │                 │                  │         │
      │        └─────────────────┼──────────────────┘         │
      │                          ▼                            │
      │                Test Runner CLI                        │
      │                (single command, all suites)           │
      └───────────────────────────────────────────────────────┘

      CI mirrors this exactly on runners, spinning up a local K8s cluster
      (e.g., kind or minikube) for integration tests.
    when_appropriate: |
      Enterprise projects whose full gate is still short enough that one runner can execute the
      complete suite sequentially without harming throughput.
    tradeoffs: |
      No parallelism. Full suite runs sequentially. Acceptable when total test time is under five
      minutes.
    links:
      - {target: 9f579d269f3e, rel: refines}
      - {target: e9f7459b95e2, rel: refines}
    deprecated: false

  - number: TEST-A-002
    hash: 298ede0dfa7f
    name: parallel-ci-suites
    type: architecture
    description: >
      Each test suite runs on its own CI runner in parallel with separate
      workflows for quality gate, unit, integration, component, and E2E tests.
      Merge gate requires all workflows to pass. Failure is immediately
      localized. Appropriate when total test time exceeds five minutes.
    diagram: |
      ┌─────────────────────────────────────────────────┐
      │  CI Platform (triggered on push/PR)             │
      │                                                 │
      │  ┌──────────────────┐  ┌────────────────────┐   │
      │  │ Workflow:        │  │ Workflow: Unit     │   │
      │  │ Quality Gate     │  │ test               │   │
      │  │ lint+format+build│  │                    │   │
      │  └────────┬─────────┘  └────────┬───────────┘   │
      │           │                     │               │
      │  ┌────────┴─────────┐  ┌───────┴────────────┐   │
      │  │ Workflow: K8s    │  │ Workflow:          │   │
      │  │ Integration test │  │ Component test     │   │
      │  └────────┬─────────┘  └────────┬───────────┘   │
      │           │                     │               │
      │           └──────────┬──────────┘               │
      │                      ▼                          │
      │            Workflow: Full-Page E2E test         │
      │                                                 │
      │  Merge gate: quality gate + all test workflows  │
      └─────────────────────────────────────────────────┘
    when_appropriate: |
      Projects with enough suite volume or enough required environments that sequential execution is
      too slow. Each suite runs on its own runner in parallel. Failure is immediately localized.
    tradeoffs: |
      Higher CI cost (four runners instead of one). Setup duplication across workflows. Worth it
      when total test time exceeds five minutes.
    links:
      - {target: fab7da1aaf57, rel: refines}
      - {target: e89af6c2f0d3, rel: refines}
      - {target: 37d0664a0b4b, rel: refines}
    deprecated: false

  - number: TEST-A-003
    hash: cd574357727a
    name: fixture-refresh-pipeline
    type: architecture
    description: >
      A scheduled CI job runs a fixture recorder against live external APIs,
      serializes request/response pairs, compares against existing fixtures,
      alerts on schema drift, and commits updated fixtures. Integration tests
      use committed fixtures and never call live APIs during test runs.
    diagram: |
      ┌──────────────────────────────────────────────────┐
      │  Scheduled CI Job (weekly or on-demand)          │
      │                                                  │
      │  ┌────────────────────────────────────────────┐  │
      │  │  Fixture Recorder                          │  │
      │  │  1. Call live external APIs                │  │
      │  │  2. Serialize request/response pairs       │  │
      │  │  3. Compare against existing fixtures      │  │
      │  │  4. Alert on schema drift                  │  │
      │  │  5. Commit updated fixtures                │  │
      │  └────────────────────────────────────────────┘  │
      │                                                  │
      │  Integration tests use committed fixtures        │
      │  (never call live APIs during test runs)         │
      └──────────────────────────────────────────────────┘
    when_appropriate: |
      Projects with external API dependencies. Fixtures are the bridge between "never mock" and
      "don't hit live APIs on every test run."
    tradeoffs: |
      Requires API credentials in CI for the recorder job. Fixtures may not cover edge cases that
      only appear under specific conditions. Supplement with manual fixture capture for known edge
      cases.
    links:
      - {target: 135eccfbae17, rel: refines}
      - {target: 05d7d8bf3011, rel: refines}
      - {target: 2e780501c8e9, rel: refines}
    deprecated: false

  # ── Checklist ────────────────────────────────────────────────────────────

  - number: TEST-C-001
    hash: e71a98fb1de2
    name: vitest-unit-tests
    type: checklist
    description: >
      Vitest configured and running for unit tests with at least one passing
      test.
    links:
      - {target: 217845b40c8f, rel: verifies}
    deprecated: false

  - number: TEST-C-002
    hash: cd9ec303e282
    name: playwright-installed
    type: checklist
    description: >
      Playwright installed with OS dependencies; headless Chromium launches.
    links:
      - {target: f34f055c75c5, rel: verifies}
    deprecated: false

  - number: TEST-C-003
    hash: a8a20e29fa32
    name: golden-fixture-recorded
    type: checklist
    description: >
      Golden fixture recorder built; at least one external API fixture
      recorded from live traffic.
    links:
      - {target: 135eccfbae17, rel: verifies}
