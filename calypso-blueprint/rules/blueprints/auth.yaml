  # ── Antipatterns ─────────────────────────────────────────────────────────────

  - number: AUTH-X-001
    hash: ad98bf6ca677
    name: password-default-passkey-optional
    type: antipattern
    description: >
      Offering passwords alongside passkeys means the system's security is bounded
      by the password path. Attackers target the weakest credential type. If
      passwords exist, phishing works. Passkey-first means passkey-only.
    links:
      - rel: contradicts
        target: 24cd299b632f
    deprecated: false

  - number: AUTH-X-002
    hash: 1b840588d7ed
    name: algorithm-negotiation-in-verification
    type: antipattern
    description: >
      Reading the alg header from the token to select the verification algorithm
      is the root cause of algorithm confusion attacks. The server must be told
      which algorithm to use at deployment time; it must never ask the token.
    links:
      - rel: contradicts
        target: 0ce2a38691c6
    deprecated: false

  - number: AUTH-X-003
    hash: af21f9cd0cc1
    name: long-lived-broad-agent-tokens
    type: antipattern
    description: >
      Issuing an agent a token that lasts weeks and grants access to multiple
      resource types eliminates the containment boundary. A leaked broad,
      long-lived token is functionally equivalent to a leaked admin credential.
    links:
      - rel: contradicts
        target: adff78a52d6d
    deprecated: false

  - number: AUTH-X-004
    hash: 178dc0b4cde5
    name: auth-saas-sole-login-path
    type: antipattern
    description: >
      Depending entirely on an external provider for login means the provider's
      outage, vulnerability, or token format change becomes yours. External
      providers are acceptable as one federated path, not the only path.
    links:
      - rel: contradicts
        target: 701fb5c194b8
    deprecated: false

  - number: AUTH-X-005
    hash: 917f546b2ccc
    name: tokens-in-localstorage
    type: antipattern
    description: >
      Storing tokens in localStorage or sessionStorage makes them exfiltrable by
      any XSS payload. HTTP-only cookies exist to solve this exact problem.
    links:
      - rel: contradicts
        target: 98659756871c
    deprecated: false

  - number: AUTH-X-006
    hash: 8c6a9f9b4552
    name: single-person-privileged-approval
    type: antipattern
    description: >
      Any system where one administrator can rotate root keys, export user data,
      or modify authentication configuration is one compromised account away from
      total breach. M-of-N is a cryptographic constraint, not bureaucracy.
    links:
      - rel: contradicts
        target: 0962b79e682e
    deprecated: false

  - number: AUTH-X-007
    hash: 4338bafe526c
    name: shared-credentials-between-agents
    type: antipattern
    description: >
      Multiple agents sharing a single token or API key means revoking one
      agent's access revokes all, and compromising one compromises all. Each agent
      receives its own credential with its own scope and lifecycle.
    links:
      - rel: contradicts
        target: adff78a52d6d
    deprecated: false

  - number: AUTH-X-008
    hash: 0738a9c607a9
    name: email-based-password-reset-fallback
    type: antipattern
    description: >
      If the recovery flow sends a magic link to an email address, security is
      bounded by email security. Email is not an authenticated channel. Recovery
      must require proof of possession plus a second factor.
    links:
      - rel: contradicts
        target: 24cd299b632f
    deprecated: false

  - number: AUTH-X-009
    hash: 4e13f71c51cd
    name: in-memory-revocation-multi-process
    type: antipattern
    description: >
      An in-memory Set of revoked token IDs is only coherent within a single
      process. In multi-instance deployments, a token revoked against one instance
      remains valid against all others. The revocation store must be shared,
      durable, and consistent.
    links:
      - rel: contradicts
        target: b38917607d24
    deprecated: false
