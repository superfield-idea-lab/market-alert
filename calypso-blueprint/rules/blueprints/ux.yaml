meta:
  domain: UX
  title: UX Blueprint
  version: 1
  requires:
    - AUTH
  vision: |
    Beauty is a gate condition, not a preference. A Calypso application that is not visually
    polished and immediately comprehensible will not survive management review — regardless of its
    technical correctness. The interface is the product to every non-technical stakeholder. UX
    quality must be established from the first screen, the first prototype, and the first demo. An
    ugly early version sets an anchor that is nearly impossible to reverse. Applications that are
    not beautiful from the start do not ship.

    Service delivery is designed before interfaces. The question "how do we deliver this capability
    to a user?" precedes "what does the screen look like?" The channel — visual browser interface,
    API, command-line, voice, structured text — is a consequence of the service design, not its
    premise. A service designed around a visual browser interface produces a service that only works
    in a visual browser. A service designed around the delivery of a capability to a user produces
    something that can be expressed in any appropriate medium.

    Every user type receives an interface appropriate to their medium. A human end-user navigates a
    visual interface. An administrator manages operations through a purpose-built interface — never
    through raw database tooling or developer consoles. An AI agent interacts through structured,
    machine-readable interfaces — not through screen scraping, browser automation, or interfaces
    designed for human perception. Designing only for the human end-user produces a system where
    administration is painful and agent integration is fragile.

    The AI agent is a first-class user with a defined presence on the end-user account. It is not a
    background process operating invisibly. Its participation in the account is declared, visible to
    the human account holder, and governed by a clearly specified scope. The end-user knows the
    agent is there. The service is designed to make that shared-account relationship explicit and
    auditable, not to obscure it.

rules:

  # ── Threats (from Problem Space) ──────────────────────────────────────────────

  - number: UX-T-001
    hash: 103dbdf604b7
    name: interface-before-service-design
    type: threat
    description: >
     Interface ships before service is designed. UX is forced to compensate for
      service design gaps; users encounter dead ends, confusing flows, and
      tasks that cannot be completed without workarounds.
    links:
      - {target: d7f85752c1b1, rel: depends_on}
      - {target: 173636ad122f, rel: depends_on}
      - {target: fe86cd8bdfff, rel: depends_on}
    deprecated: false

  - number: UX-T-002
    hash: ed3622189556
    name: multiple-paths-same-action
    type: threat
    description: >
     Multiple paths to the same action exist. Users cannot build reliable
      mental models; onboarding takes longer; support costs increase;
      automation fails when path selection is non-deterministic.
    links:
      - {target: 8d514b83d768, rel: depends_on}
      - {target: 6723c3820539, rel: depends_on}
      - {target: c2b183d34453, rel: depends_on}
    deprecated: false

  - number: UX-T-003
    hash: 5f59ffbb3def
    name: admin-ui-afterthought
    type: threat
    description: >
     Admin UI is an afterthought. Operational tasks require developer
      intervention or direct database access; configuration errors are not
      caught before execution; operations are irreversible without a safety
      net.
    links:
      - {target: e43e9ff85857, rel: depends_on}
      - {target: 60c41e0c35c7, rel: depends_on}
      - {target: e450c8a60d0d, rel: depends_on}
    deprecated: false

  - number: UX-T-004
    hash: a2a41eddd7d4
    name: agent-no-specified-ux
    type: threat
    description: >
     AI agent has no specified UX. Agents resort to browser automation or
      screen scraping, which breaks on any visual change and is undetectable
      when it fails silently.
    links:
      - {target: e43e9ff85857, rel: depends_on}
      - {target: 8de237165c47, rel: depends_on}
      - {target: 5af7abcb16da, rel: depends_on}
    deprecated: false

  - number: UX-T-005
    hash: f1508d8f738f
    name: agent-presence-invisible
    type: threat
    description: >
     AI agent's presence on the account is invisible. End-users do not know
      what the agent can see or do; trust is violated when the agent acts on
      data the user did not understand was shared.
    links:
      - {target: b6f0649c24cf, rel: depends_on}
      - {target: 39003e63eb4b, rel: depends_on}
    deprecated: false

  - number: UX-T-006
    hash: d6f18baa5d77
    name: beautiful-prototype-replaced
    type: threat
    description: >
     Beautiful prototype replaced by utilitarian production code. Management
      anchor on the prototype quality is broken; stakeholders lose confidence;
      remediation requires a design retrofit more expensive than building
      correctly from the start.
    links:
      - {target: 95f2b6bff569, rel: depends_on}
      - {target: f7986c534086, rel: depends_on}
    deprecated: false

  - number: UX-T-007
    hash: 099bffc7e55a
    name: design-coupled-to-framework
    type: threat
    description: >
     Design is coupled to a front-end framework. Redesigning or porting the UX
      requires rewriting both design and implementation; design decisions are
      constrained by framework capabilities rather than user needs.
    links:
      - {target: e49ebcb9644c, rel: depends_on}
    deprecated: false

  - number: UX-T-008
    hash: 6c3fb70bfa32
    name: complexity-exposed-by-default
    type: threat
    description: >
     Complexity is exposed by default. Users encounter features they do not
      need before they understand the ones they do; first-use abandonment
      increases; the product appears more complex than its core value warrants.
    links:
      - {target: 9b929c73ac69, rel: depends_on}
      - {target: 52bdae16f26b, rel: depends_on}
    deprecated: false

  - number: UX-T-009
    hash: c165af9c20b4
    name: agent-scope-undefined
    type: threat
    description: >
     Agent scope on the account is undefined. Agent writes, reads, or triggers
      actions beyond the user's expectation; the system has no mechanism to
      audit or limit what the agent did on the user's behalf.
    links:
      - {target: b6f0649c24cf, rel: depends_on}
      - {target: 39003e63eb4b, rel: depends_on}
    deprecated: false


  # ── Principles (from Core Principles) ─────────────────────────────────────────

  - number: UX-P-001
    hash: d7f85752c1b1
    name: service-delivery-precedes-surface-design
    type: principle
    description: >
     The UX of a capability is defined as the sequence of states a user moves
      through to accomplish a goal, not as the visual or interactive elements
      that render those states. Interfaces are outputs of service design, not
      inputs. Designing the screen before the service produces a screen that
      cannot change without breaking the service.
    links:
      - {target: 103dbdf604b7, rel: mitigates}
      - {target: 173636ad122f, rel: refines}
      - {target: fe86cd8bdfff, rel: depends_on}
    deprecated: false

  - number: UX-P-002
    hash: 8d514b83d768
    name: one-obvious-path-per-task
    type: principle
    description: >
     For every user goal, there is exactly one path through the system that is
      clearly correct and clearly available. Alternative paths either do not
      exist or are hidden behind an explicit escalation. Ambiguity about which
      path to take is a design defect. This applies equally to human and
      machine interfaces.
    links:
      - {target: ed3622189556, rel: mitigates}
      - {target: 6723c3820539, rel: refines}
      - {target: c2b183d34453, rel: depends_on}
    deprecated: false

  - number: UX-P-003
    hash: e43e9ff85857
    name: medium-appropriate-interface-per-user-type
    type: principle
    description: >
     Human end-users interact through visual, touch, or voice surfaces.
      Administrators interact through operational interfaces that surface
      system state and protect against dangerous operations. AI agents interact
      through structured, machine-readable interfaces. Exposing an agent to a
      human interface, or an administrator to a raw API, is a design failure.
    links:
      - {target: 5f59ffbb3def, rel: mitigates}
      - {target: a2a41eddd7d4, rel: mitigates}
      - {target: 8de237165c47, rel: refines}
      - {target: 60c41e0c35c7, rel: refines}
      - {target: e450c8a60d0d, rel: depends_on}
      - {target: 5af7abcb16da, rel: depends_on}
      - {target: 96e80a0c1f27, rel: depends_on}
    deprecated: false

  - number: UX-P-004
    hash: 95f2b6bff569
    name: beauty-is-functional-requirement
    type: principle
    description: >
     Visual quality determines whether a product survives stakeholder review,
      earns user trust, and sets the baseline for future development. A
      polished interface signals the product is under control. Beauty is
      evaluated at every milestone, not deferred.
    links:
      - {target: d6f18baa5d77, rel: mitigates}
      - {target: f7986c534086, rel: depends_on}
    deprecated: false

  - number: UX-P-005
    hash: b6f0649c24cf
    name: agent-presence-explicit-and-bounded
    type: principle
    description: >
     An AI agent operating on a user's account is a shared participant, not an
      invisible background process. The system declares the agent's presence,
      surfaces its scope, and logs its actions in a form the account holder can
      review. Unbounded, invisible agent access is a UX failure.
    links:
      - {target: f1508d8f738f, rel: mitigates}
      - {target: c165af9c20b4, rel: mitigates}
      - {target: 39003e63eb4b, rel: depends_on}
    deprecated: false

  - number: UX-P-006
    hash: e49ebcb9644c
    name: designers-specify-needs-not-implementations
    type: principle
    description: >
     A UX specification describes what a user needs to accomplish, the states
      they move through, and the feedback they receive — not the components,
      frameworks, or libraries used to render those states. A specification
      that references specific front-end technologies has conflated design with
      implementation.
    links:
      - {target: 099bffc7e55a, rel: mitigates}
    deprecated: false


  # ── Design Patterns ───────────────────────────────────────────────────────────

  - number: UX-D-001
    hash: 173636ad122f
    name: service-flow-mapping
    type: design_pattern
    description: >
     Before any visual design begins, map the service flow as a state machine.
      Define entry state, terminal state, every intermediate state, and every
      transition. Annotate each transition with its trigger and feedback. The
      resulting map is the authoritative UX specification from which interfaces
      in any medium are derived. Trade-off: adds time before design begins;
      wrong when the service is exploratory — prototype first, formalize once
      the happy path is stable.
    problem: |
      Teams design interfaces before understanding the sequence of states a user must traverse to
      accomplish a goal, producing interfaces that cannot be consistently navigated.
    solution: |
      Before any visual design begins, map the service flow as a state machine. Define: the entry
      state, the terminal state (goal achieved), every intermediate state, and every transition.
      Annotate each transition with what triggers it (user action, system event, agent action) and
      what feedback the system provides. The resulting map is the authoritative UX specification
      from which interfaces in any medium are derived.
    tradeoffs: |
      Service flow mapping adds time before design begins. It is the wrong pattern when the service
      is exploratory or rapidly evolving — in those cases, prototype first and formalize the flow
      once the happy path is stable.
    links:
      - {target: d7f85752c1b1, rel: refines}
      - {target: 103dbdf604b7, rel: mitigates}
      - {target: fe86cd8bdfff, rel: contradicts}
    deprecated: false

  - number: UX-D-002
    hash: 6723c3820539
    name: single-path-navigation
    type: design_pattern
    description: >
     For every user goal, design exactly one primary path. Secondary paths for
      power users are explicitly labeled as alternatives and not surfaced in
      the default flow. At every point, the next correct action is either the
      only visible action or the most visually prominent one. Applies to visual
      interfaces, CLI, and API. Trade-off: creates friction for teams wanting
      multiple options; wrong when the user population is expert and expects
      direct access to multiple routes.
    problem: |
      Multiple routes to the same destination cause users to question whether they are in the right
      place, whether the routes produce different outcomes, and which one to use next time.
    solution: |
      For every user goal, design exactly one primary path. If a secondary path exists for power
      users or edge cases, it is explicitly labeled as an alternative and is not surfaced in the
      default flow. Navigation is structured so that at every point, the next correct action is
      either the only visible action or the most visually prominent one.
    tradeoffs: |
      Single-path navigation requires deliberate choices about what is primary. This creates
      friction for teams that want to surface multiple options simultaneously. The pattern is wrong
      when the user population is expert and expects direct access to multiple routes — in those
      cases, expose alternatives explicitly rather than hiding them.
    links:
      - {target: 8d514b83d768, rel: refines}
      - {target: ed3622189556, rel: mitigates}
      - {target: c2b183d34453, rel: contradicts}
    deprecated: false

  - number: UX-D-003
    hash: 8de237165c47
    name: agent-native-interface
    type: design_pattern
    description: >
     Every capability an agent must access is exposed through a structured,
      machine-readable interface with a stable schema. This interface is a
      first-class product surface — versioned, documented, and tested to the
      same standard as the human-facing interface. The human interface is built
      on top of the same underlying capability. Trade-off: increases design and
      implementation scope; wrong when agent access is genuinely never
      required.
    problem: |
      AI agents are forced to interact with interfaces designed for human perception, producing
      integrations that are fragile, opaque, and break silently when visual layouts change.
    solution: |
      Every capability that an agent must access is exposed through a structured, machine-readable
      interface with a stable schema. This interface is a first-class product surface — versioned,
      documented, and tested to the same standard as the human-facing interface. The agent's
      interface is not a workaround for the absence of a visual interface; it is the canonical
      interface for that user type. The human-facing interface is built on top of the same
      underlying capability.
    tradeoffs: |
      Maintaining two interface surfaces (human and agent) increases design and implementation
      scope. This cost is lower than the cost of maintaining fragile browser automation against a
      changing visual interface. The pattern is wrong when agent access is genuinely never required
      — do not pre-build an agent interface for capabilities that have no agent use case.
    links:
      - {target: e43e9ff85857, rel: refines}
      - {target: a2a41eddd7d4, rel: mitigates}
      - {target: 67863239eb85, rel: depends_on}
      - {target: 300c0e349c72, rel: depends_on}
      - {target: 5af7abcb16da, rel: contradicts}
    deprecated: false

  - number: UX-D-004
    hash: 60c41e0c35c7
    name: unified-design-system-across-user-types
    type: design_pattern
    description: >
     A single design system governs all visual interfaces including admin.
      Interaction patterns, information hierarchy, form behavior, feedback, and
      error handling are specified once and applied everywhere. Role-specific
      elements are expressed within the design system, not outside it.
      Trade-off: requires more design investment upfront; allow layout and
      navigation to diverge when admin and end-user workflows are fundamentally
      different.
    problem: |
      Admin interfaces and end-user interfaces are designed independently, producing systems where
      administrators are unable to form accurate mental models of what users experience, and where
      users see inconsistency if they access admin-adjacent views.
    solution: |
      A single design system governs all visual interfaces in the application, including
      administrative interfaces. Interaction patterns, information hierarchy, form behavior,
      feedback, and error handling are specified once and applied everywhere. The admin interface
      is not exempt from visual and UX standards. Role-specific elements are expressed within the
      design system rather than outside it.
    tradeoffs: |
      Applying the design system to admin interfaces requires more design investment upfront. The
      pattern is wrong when admin and end-user workflows are so different in nature that a shared
      system produces confusing ambiguity — in those cases, maintain shared foundations (color,
      typography, component library) while allowing layout and navigation to diverge.
    links:
      - {target: e43e9ff85857, rel: refines}
      - {target: 5f59ffbb3def, rel: mitigates}
      - {target: e450c8a60d0d, rel: contradicts}
      - {target: 96e80a0c1f27, rel: contradicts}
    deprecated: false

  - number: UX-D-005
    hash: 9b929c73ac69
    name: progressive-disclosure
    type: design_pattern
    description: >
     The default state of any view shows only what is needed for the primary
      task. Secondary capabilities and advanced options are accessible but not
      immediately visible. Disclosure is triggered by explicit user intent, not
      by scrolling. Each disclosure level is stable — once revealed, the
      advanced state persists for the session or preference. Trade-off:
      deciding disclosure levels requires user research; audit levels regularly
      against actual usage.
    problem: |
      Full system complexity shown at first contact causes abandonment and slows onboarding; but
      hiding capabilities from experienced users creates frustration.
    solution: |
      The default state of any view shows only what is needed for the primary task at that moment.
      Secondary capabilities, advanced options, and edge-case controls are accessible but not
      immediately visible. Disclosure is triggered by explicit user intent (a labeled "advanced"
      toggle, a secondary navigation level) not by scrolling past primary content. Each disclosure
      level is stable — once revealed, the advanced state persists for that user session or
      preference.
    tradeoffs: |
      Deciding what belongs at each disclosure level is a judgment call that requires user research
      or iteration. The pattern can be used to hide capabilities that should be primary; audit
      disclosure levels regularly against actual usage patterns.
    links:
      - {target: 6c3fb70bfa32, rel: mitigates}
      - {target: 52bdae16f26b, rel: contradicts}
    deprecated: false


  # ── Architectures ─────────────────────────────────────────────────────────────

  - number: UX-A-001
    hash: 67863239eb85
    name: unified-service-layer-multiple-surfaces
    type: architecture
    description: >
     A single service layer encapsulates capabilities, state, business logic,
      and access control. End-user, admin, and agent interfaces are separate
      rendering surfaces derived from the same service layer. Appropriate for
      products with heterogeneous user types. Trade-off: adds abstraction that
      teams unfamiliar with service-first design find counterintuitive.
    diagram: |2
                        ┌───────────────────────────────────┐
                        │           Service Layer            │
                        │  (capabilities, state, business   │
                        │         logic, access control)     │
                        └──────┬───────────┬──────────┬─────┘
                               │           │          │
                   ┌───────────▼─┐  ┌──────▼───┐  ┌──▼──────────────┐
                   │  End-User   │  │  Admin   │  │  Agent Interface │
                   │  Web/Mobile │  │  Web UI  │  │  (Structured API │
                   │  Interface  │  │          │  │   / CLI / SDK)   │
                   └─────────────┘  └──────────┘  └─────────────────┘
    when_appropriate: |
      Products with heterogeneous user types (human end-users, human admins, AI agents) requiring
      access to the same service capabilities. Small to mid-scale teams.
    tradeoffs: |
      The service layer is a single point of design governance — all surfaces inherit the same
      capability definitions. Adds abstraction between service and surface that teams unfamiliar
      with service-first design find counterintuitive.
    links:
      - {target: d7f85752c1b1, rel: refines}
      - {target: e43e9ff85857, rel: refines}
      - {target: 8de237165c47, rel: refines}
    deprecated: false

  - number: UX-A-002
    hash: 300c0e349c72
    name: api-first-client-agnostic
    type: architecture
    description: >
     A versioned, typed-schema, access-scoped capability API is the primary
      product surface. First-party web client, admin CLI, agent SDK, and
      third-party clients all build against this API contract. Appropriate when
      the set of interface surfaces is unknown at design time or third-party
      clients are expected. Trade-off: requires disciplined API design;
      breaking changes affect all surfaces simultaneously.
    diagram: |
      ┌───────────────────────────────────────────────────────────┐
      │                    Capability API                          │
      │         (versioned, typed schema, access-scoped)          │
      └──┬──────────────┬──────────────┬──────────────────────────┘
         │              │              │
      ┌──▼──────────┐  ┌▼──────────┐  ┌▼────────────────────────┐
      │ First-Party │  │ First-Party│  │  Agent SDK / CLI Tool   │
      │  Web Client │  │ Admin CLI  │  │  (machine-readable      │
      │             │  │            │  │   output, typed schema) │
      └─────────────┘  └───────────┘  └─────────────────────────┘
                                                │
                                     ┌──────────▼──────────┐
                                     │  Third-Party Clients │
                                     │  (partner apps,      │
                                     │   integrations)      │
                                     └──────────────────────┘
    when_appropriate: |
      Products where the set of interface surfaces is unknown at design time, or where third-party
      clients are expected. Also appropriate when the agent interface is the primary interface and
      the human interface is secondary.
    tradeoffs: |
      Maximum flexibility for surface diversity. Requires disciplined API design — the API is the
      product, and breaking changes affect all surfaces simultaneously. Client teams must build
      against a contract rather than a shared codebase.
    links:
      - {target: d7f85752c1b1, rel: refines}
      - {target: e43e9ff85857, rel: refines}
      - {target: 8de237165c47, rel: refines}
    deprecated: false

  - number: UX-A-003
    hash: 63355717824e
    name: agent-mediated-administration
    type: architecture
    description: >
     Administrative operations are predominantly performed by AI agents on
      behalf of human principals. Humans review, approve, or veto via an
      approval interface. The agent executes approved actions via a structured
      capability API against the same service layer as human-facing interfaces.
      Trade-off: requires robust approval and audit surface; wrong when agents
      lack sufficient reliability to initiate actions.
    diagram: |
      Human Admin
          │  (reviews, approves, or vetoes)
          ▼
      ┌───────────────────────────────┐
      │   Approval Interface          │
      │   (human-readable action log, │
      │    approval/rejection UI)     │
      └──────────────┬────────────────┘
                     │ approved actions
                     ▼
      ┌───────────────────────────────┐
      │   Agent Execution Layer       │
      │   (agent operates via         │
      │    structured capability API) │
      └──────────────┬────────────────┘
                     │
                     ▼
      ┌───────────────────────────────┐
      │   Service Layer               │
      │   (same capabilities as       │
      │    human-facing interface)    │
      └───────────────────────────────┘
    when_appropriate: |
      Products where administrative operations are predominantly performed by AI agents on behalf
      of human principals, with humans approving rather than executing.
    tradeoffs: |
      Reduces human operational burden at the cost of requiring a robust approval and audit surface.
      Wrong when agents do not yet have sufficient reliability to be trusted with initiating actions
      — in those cases, agents should propose, and humans should execute.
    links:
      - {target: b6f0649c24cf, rel: refines}
      - {target: 8de237165c47, rel: refines}
    deprecated: false


  # ── Checklist ─────────────────────────────────────────────────────────────────

  - number: UX-C-001
    hash: f3f42fba19c6
    name: service-flow-maps-before-implementation
    type: checklist
    description: >
     Service flow maps are written and reviewed for all primary user goals
      before any interface implementation begins.
    links:
      - {target: d7f85752c1b1, rel: verifies}
      - {target: 173636ad122f, rel: verifies}
    deprecated: false

  - number: UX-C-002
    hash: 0ed222dbe4b0
    name: design-system-initialized
    type: checklist
    description: >
     Design system initialized with color tokens, typography scale, spacing
      scale, and at least one primitive component (button) defined.
    links:
      - {target: 95f2b6bff569, rel: verifies}
      - {target: 60c41e0c35c7, rel: verifies}
    deprecated: false

  - number: UX-C-003
    hash: 48d70253181f
    name: end-user-primary-paths-complete
    type: checklist
    description: >
     End-user interface implements all primary-path flows without dead ends.
    links:
      - {target: 8d514b83d768, rel: verifies}
      - {target: 6723c3820539, rel: verifies}
    deprecated: false

  - number: UX-C-004
    hash: 276120e155fd
    name: admin-interface-uses-shared-design-system
    type: checklist
    description: >
     Admin interface exists as a distinct surface and uses the shared design
      system; no raw database UI in use.
    links:
      - {target: e43e9ff85857, rel: verifies}
      - {target: 60c41e0c35c7, rel: verifies}
      - {target: e450c8a60d0d, rel: depends_on}
    deprecated: false

  - number: UX-C-005
    hash: 3ef7a09c5c2d
    name: agent-api-routes-typed-json
    type: checklist
    description: >
     Agent API routes exist for every capability declared as allowedActors
      agent; routes return typed JSON, not HTML.
    links:
      - {target: e43e9ff85857, rel: verifies}
      - {target: 8de237165c47, rel: verifies}
      - {target: 5af7abcb16da, rel: depends_on}
    deprecated: false

  - number: UX-C-006
    hash: 623ea5f1b84c
    name: agent-presence-record-readable
    type: checklist
    description: >
     AgentPresence record created and readable by the account holder for every
      agent granted account access.
    links:
      - {target: b6f0649c24cf, rel: verifies}
      - {target: 39003e63eb4b, rel: depends_on}
    deprecated: false

  - number: UX-C-007
    hash: e8272f3dd267
    name: agent-action-record-written
    type: checklist
    description: >
     AgentActionRecord written for every agent operation against the account;
      records are accessible from the account holder's interface.
    links:
      - {target: b6f0649c24cf, rel: verifies}
      - {target: 39003e63eb4b, rel: depends_on}
