  # ── Antipatterns ─────────────────────────────────────────────────────────

  - number: DATA-X-001
    hash: ab2f526af532
    name: privacy-policy-as-technical-control
    type: antipattern
    description: >
      Promising users their data is safe in a privacy policy while storing it
      in plaintext behind a single firewall. A policy is a legal obligation,
      not an enforcement mechanism. The gap between the promise and the
      implementation is the breach surface.
    links:
      - {target: 3be027de3daf, rel: contradicts}
    deprecated: false

  - number: DATA-X-002
    hash: a2708f81463a
    name: disk-encryption-as-data-privacy
    type: antipattern
    description: >
      Enabling transparent disk encryption and treating the data layer as
      "encrypted." Disk encryption protects against physical theft only. It
      does nothing against a compromised database user, leaked connection
      string, or exfiltrated backup.
    links:
      - {target: 3be027de3daf, rel: contradicts}
    deprecated: false

  - number: DATA-X-003
    hash: f2c4aa2f6dee
    name: analytics-on-transactional-store
    type: antipattern
    description: >
      Running analytics queries directly against the production customer
      database. Every analytics query becomes a potential privacy violation,
      and every analyst becomes a potential threat actor. Structural separation
      makes this impossible, not merely forbidden.
    links:
      - {target: d7eca61da7e1, rel: contradicts}
      - {target: f8dc70f7a4ff, rel: contradicts}
    deprecated: false

  - number: DATA-X-004
    hash: 74b0d37b402a
    name: frontier-crypto-as-default
    type: antipattern
    description: >
      Reaching for fully homomorphic encryption, zero-knowledge proofs, or
      secure multi-party computation before implementing aggregation-tier
      separation, differential privacy, or basic field-level encryption.
      Simpler, well-understood patterns solve the same problems with lower
      operational risk. Adopt frontier techniques deliberately with a specific
      threat model row they address.
    links:
      - {target: f8dc70f7a4ff, rel: contradicts}
      - {target: eb6fb098108a, rel: contradicts}
      - {target: 8b531a730c7d, rel: contradicts}
    deprecated: false

  - number: DATA-X-005
    hash: 338f28f21935
    name: collecting-data-just-in-case
    type: antipattern
    description: >
      Storing fields that no current product function requires on the theory
      they might be useful later. Every field increases breach exposure,
      complicates compliance, and creates retention obligations. Collect what
      you need, delete what you no longer need.
    links:
      - {target: 24b0de7f78fe, rel: contradicts}
    deprecated: false

  - number: DATA-X-006
    hash: 3f2840ae0508
    name: keys-alongside-data
    type: antipattern
    description: >
      Storing encryption keys in environment variables on the database host, in
      the application config file, or in the same backup archive as the
      encrypted database. A single host compromise yields both ciphertext and
      keys.
    links:
      - {target: ed6163ae0eaf, rel: contradicts}
      - {target: 8bf9d7f0acd0, rel: depends_on}
    deprecated: false

  - number: DATA-X-007
    hash: 3b4888fcb503
    name: single-flat-key-for-all-tables
    type: antipattern
    description: >
      Using one encryption key for the entire database. One key compromise
      exposes every table. Key-per-table limits the blast radius to one data
      domain and enables independent rotation schedules.
    links:
      - {target: 60ed722d31f6, rel: contradicts}
      - {target: 79671d91bc6e, rel: depends_on}
    deprecated: false

  - number: DATA-X-008
    hash: 845a26aaeb89
    name: pii-in-error-logs
    type: antipattern
    description: >
      Catching exceptions and logging the full request object, database row, or
      decrypted field value in the error handler. Under error conditions logs
      become a secondary copy of protected data. Log pipelines must redact
      before writing.
    links:
      - {target: ca5f8232e396, rel: contradicts}
      - {target: 80a03d11a7eb, rel: depends_on}
    deprecated: false

  - number: DATA-X-009
    hash: eaf52669c958
    name: pseudonymization-without-rotation
    type: antipattern
    description: >
      Assigning each user a permanent pseudonym in the analytics store and
      treating it as anonymization. A permanent pseudonym is a second
      identifier that can be correlated across sessions and re-identified.
      Session-scoped, rotating pseudonyms resist longitudinal re-identification.
    links:
      - {target: 41bebcc94544, rel: contradicts}
      - {target: e929ac34c20d, rel: depends_on}
    deprecated: false
