meta:
  domain: DATA
  title: Data Blueprint
  version: 1
  requires:
    - AUTH
  vision: |
    Every application that handles customer data faces a fundamental tension: the business needs
    analytics to make decisions, and the customer needs assurance that their records are not
    exposed, aggregated without consent, or weaponized by a breach. Most systems resolve this
    tension with policy — a privacy notice, an internal access-control list, a promise. Policy is
    necessary but insufficient. The resolution is architectural: separate the data the business
    analyzes from the data the customer owns, and make the separation structural rather than
    procedural.

    A well-designed data layer treats encryption not as a checkbox but as a series of concentric
    barriers. Disk encryption protects against physical theft. Database-level encryption protects
    against file exfiltration. Field-level encryption protects against compromised database
    credentials. User-held keys protect against compromised application servers. A breach at any
    single layer yields ciphertext, not plaintext. The alternative — plaintext behind a perimeter
    — means that a single misconfigured firewall rule or leaked credential exposes everything.

    Data minimization is not a policy aspiration; it is a technical control. Every field collected
    is a field that can be breached, subpoenaed, or misused. Data that does not exist cannot leak.
    A system that collects "just in case" accumulates liability with no corresponding value. The
    discipline of justifying every stored field — and deleting what is no longer needed — reduces
    the blast radius of every other failure mode.

    Agents — automated processes that act on behalf of the system — are constrained to aggregated,
    anonymized views of data. An agent that can read individual customer records is an agent that
    can exfiltrate individual customer records. The architectural boundary between raw transactional
    data and the analytics tier is not a convenience; it is the enforcement mechanism for this
    constraint.

    Workers (AI task daemons, as defined in the Worker Blueprint) are a constrained exception to
    this principle. A worker's database role grants SELECT on task queue views only — rows are
    filtered to tasks assigned to that worker type. A worker does not have access to arbitrary
    customer records, analytics tables, or any transactional table other than the task queue. This
    exception is narrow, enforced at the PostgreSQL role layer, and not self-selected by the worker
    at runtime.

    The persistence layer is PostgreSQL from the first commit. Starting with an embedded database
    and planning to migrate later is a false economy — the migration cost is paid in full in
    downtime, schema rewrites, and bugs introduced during data transfer, and the security properties
    of the early-stage architecture are weaker in ways that matter before any customer data arrives.
    The three-database structure that the policy requires (transactional, analytics, audit) is
    available locally via Docker Compose from day one and on any managed PostgreSQL service in
    production. There is no architecture to migrate away from.

rules:
  # ── Threats ──────────────────────────────────────────────────────────────

  - number: DATA-T-001
    hash: 2dc96e2c134e
    name: backup-exfiltration
    type: threat
    description: >
      Database backup exfiltrated from storage. Customer PII (names, emails,
      addresses, payment tokens) must be protected. Backups must contain
      ciphertext, not plaintext.
    links:
      - {target: 3be027de3daf, rel: depends_on}
      - {target: 8b531a730c7d, rel: depends_on}
    deprecated: false

  - number: DATA-T-002
    hash: 69dc1d627be5
    name: compromised-db-credentials
    type: threat
    description: >
      Compromised database user account. Sensitive fields (PII, financial data)
      must be protected by application-layer encryption so DB credentials alone
      do not yield readable data.
    links:
      - {target: 3be027de3daf, rel: depends_on}
      - {target: 8b531a730c7d, rel: depends_on}
      - {target: 60ed722d31f6, rel: depends_on}
    deprecated: false

  - number: DATA-T-003
    hash: 8bf9d7f0acd0
    name: server-root-access-key-exposure
    type: threat
    description: >
      Server root access obtained by attacker. Encryption keys must not reside
      in environment variables or on the same host as the encrypted data.
    links:
      - {target: ed6163ae0eaf, rel: depends_on}
    deprecated: false

  - number: DATA-T-004
    hash: e35f0e3a69ab
    name: rogue-admin-raw-access
    type: threat
    description: >
      Rogue administrator queries raw customer records. Access to the
      transactional store must be audit-logged, and agents must be restricted
      to aggregated views.
    links:
      - {target: c9d640683d0c, rel: depends_on}
      - {target: 20f68dd7d339, rel: depends_on}
      - {target: 44465342d178, rel: depends_on}
    deprecated: false

  - number: DATA-T-005
    hash: e929ac34c20d
    name: analytics-reidentification
    type: threat
    description: >
      Analytics query re-identifies individuals from pseudonymized data.
      Session-based pseudonyms must rotate, and aggregation must apply
      differential privacy before export.
    links:
      - {target: 41bebcc94544, rel: depends_on}
      - {target: eb6fb098108a, rel: depends_on}
    deprecated: false

  - number: DATA-T-006
    hash: 7bf0c58e9812
    name: agent-raw-data-access
    type: threat
    description: >
      Agent process accesses raw transactional data. Agents operate on the
      analytics tier only; no code path connects an agent to the transactional
      store.
    links:
      - {target: 20f68dd7d339, rel: depends_on}
      - {target: f8dc70f7a4ff, rel: depends_on}
    deprecated: false

  - number: DATA-T-007
    hash: 79671d91bc6e
    name: single-key-compromise-blast-radius
    type: threat
    description: >
      Single encryption key compromised. Per-table or per-domain key separation
      limits exposure to one data category, not the entire database.
    links:
      - {target: 60ed722d31f6, rel: depends_on}
      - {target: 3b4888fcb503, rel: depends_on}
    deprecated: false

  - number: DATA-T-008
    hash: 943721d22c4f
    name: key-compromise-no-rotation
    type: threat
    description: >
      Key compromise with no rotation capability. Key rotation must be a
      tested, automated procedure, not a theoretical plan.
    links:
      - {target: 6539ad97bbcb, rel: depends_on}
      - {target: d27ba8a19e8a, rel: depends_on}
    deprecated: false

  - number: DATA-T-009
    hash: 1d7c346efcf4
    name: ransomware-backup-recovery
    type: threat
    description: >
      Ransomware encrypts production database. Encrypted, immutable backups
      stored off-host enable recovery without paying ransom.
    links:
      - {target: 37bcb53d30b5, rel: depends_on}
      - {target: 90a125682538, rel: depends_on}
    deprecated: false

  - number: DATA-T-010
    hash: 80a03d11a7eb
    name: pii-in-application-logs
    type: threat
    description: >
      Application logs contain decrypted PII as a secondary data leak. Log
      pipelines must strip or redact sensitive fields before persistence.
    links:
      - {target: ca5f8232e396, rel: depends_on}
      - {target: 845a26aaeb89, rel: depends_on}
    deprecated: false

  - number: DATA-T-011
    hash: 5841f3d1f349
    name: schema-migration-data-loss
    type: threat
    description: >
      Schema migration drops or corrupts existing data. Migrations must be
      tested for rollback, and destructive operations must require explicit
      confirmation.
    links:
      - {target: 3b73081ac738, rel: depends_on}
    deprecated: false

  # ── Principles ───────────────────────────────────────────────────────────

  - number: DATA-P-001
    hash: d7eca61da7e1
    name: separate-analytics-from-transactional
    type: principle
    description: >
      The analytics tier and the transactional tier are distinct stores with
      distinct access controls, encryption keys, and data models. Analytics
      operates on pseudonymous, aggregated events, never on raw customer
      records. This separation is structural, enforced at the infrastructure
      level, not by application-layer access checks.
    links:
      - {target: f8dc70f7a4ff, rel: depends_on}
      - {target: 41bebcc94544, rel: depends_on}
      - {target: 7bf0c58e9812, rel: mitigates}
      - {target: f2c4aa2f6dee, rel: depends_on}
    deprecated: false

  - number: DATA-P-002
    hash: 3be027de3daf
    name: layered-encryption
    type: principle
    description: >
      Four layers protect data at rest: disk encryption, database-level
      encryption, application-layer field encryption, and user-held keys. Each
      layer has a different threat model and a different key. Compromise of any
      single layer must not yield plaintext at any other layer.
    links:
      - {target: 8b531a730c7d, rel: depends_on}
      - {target: 60ed722d31f6, rel: depends_on}
      - {target: 2dc96e2c134e, rel: mitigates}
      - {target: 69dc1d627be5, rel: mitigates}
      - {target: a2708f81463a, rel: depends_on}
    deprecated: false

  - number: DATA-P-003
    hash: c1a58c5b6248
    name: schema-as-data
    type: principle
    description: >
      The domain model uses a Property Graph on PostgreSQL: a fixed three-table
      schema that treats the data model itself as data. Adding a new entity type
      or property is an INSERT or UPDATE to the type registry, not a structural
      DDL alteration. Type schema versioning replaces migrations. Dedicated
      relational tables are permitted for integrity-critical infrastructure
      (ledgers, replay checkpoints, nonce stores).
    links:
      - {target: ad20dbdec789, rel: depends_on}
      - {target: 522c78fa3ceb, rel: depends_on}
      - {target: 0d599f9046de, rel: depends_on}
    deprecated: false

  - number: DATA-P-004
    hash: 2148c73bfc28
    name: postgresql-with-graph-patterns
    type: principle
    description: >
      PostgreSQL is the database across all stores. The system implements
      property graph patterns (entities, relations, type registries) directly
      on PostgreSQL using JSONB for flexible properties and recursive CTEs for
      traversal, combining graph flexibility with relational reliability.
    links:
      - {target: ad20dbdec789, rel: depends_on}
      - {target: e58dde384025, rel: depends_on}
    deprecated: false

  - number: DATA-P-005
    hash: 24b0de7f78fe
    name: data-minimization
    type: principle
    description: >
      Every field persisted requires justification: what product function
      depends on it, how long it must be retained, and what the deletion plan
      is. Fields collected for future use are liabilities with no offsetting
      value. Retention policies are enforced by automated deletion, not by
      human discipline.
    links:
      - {target: 338f28f21935, rel: depends_on}
      - {target: 4ebd50e170cb, rel: depends_on}
    deprecated: false

  - number: DATA-P-006
    hash: 20f68dd7d339
    name: agents-on-bounded-data
    type: principle
    description: >
      No agent process has arbitrary read access to the transactional customer
      store. The default path is the analytics tier with pseudonymous,
      aggregated, differentially private data. Narrow exceptions exist for
      worker task queues, task-scoped operational context, and sandboxed
      digital twins, structurally constrained by role, scope, and environment
      isolation.
    links:
      - {target: 7bf0c58e9812, rel: mitigates}
      - {target: f8dc70f7a4ff, rel: depends_on}
      - {target: 2c8d69220e89, rel: depends_on}
      - {target: aaeb7ed6a065, rel: depends_on}
    deprecated: false

  - number: DATA-P-007
    hash: ed6163ae0eaf
    name: keys-separate-from-data
    type: principle
    description: >
      Encryption keys are managed by a dedicated key management service, not
      stored in environment variables, configuration files, or the same host
      as the encrypted data. The KMS is a hard dependency; if unavailable, the
      application cannot serve requests requiring sensitive data. A short-lived
      in-memory DEK cache (TTL <=5 min, never persisted) is acceptable for
      high-throughput paths. KEKs are never cached in the application.
    links:
      - {target: 8bf9d7f0acd0, rel: mitigates}
      - {target: 3f2840ae0508, rel: depends_on}
      - {target: e1be2f2f1847, rel: depends_on}
    deprecated: false

  - number: DATA-P-008
    hash: c9d640683d0c
    name: audit-precedes-access
    type: principle
    description: >
      Every read of sensitive data is logged before the read is executed. The
      audit log uses a separate encryption key and storage path. If the audit
      write fails, the data read is denied. This ordering guarantee transforms
      the audit log from a forensic afterthought into an active control.
    links:
      - {target: 44465342d178, rel: depends_on}
      - {target: e35f0e3a69ab, rel: mitigates}
      - {target: 601e0d14ee88, rel: depends_on}
    deprecated: false

  - number: DATA-P-009
    hash: d4f39216240f
    name: journal-and-audit-are-distinct
    type: principle
    description: >
      An append-only business journal answers "what accepted business facts
      changed state." An audit log answers "who read, attempted, denied,
      approved, failed, recovered, or administered the system." These are
      different questions with different consumers and different retention and
      access requirements. Neither substitutes for the other.
    links:
      - {target: 0d599f9046de, rel: depends_on}
      - {target: 44465342d178, rel: depends_on}
      - {target: 64cb90c4d154, rel: depends_on}
    deprecated: false

  - number: DATA-P-010
    hash: f37fd58f94b8
    name: deterministic-gate-enforcement
    type: principle
    description: >
      Data policy guarantees must be machine-checkable. The workflow defines
      deterministic gates for journal append-only behavior, audit-before-access
      enforcement, encryption boundary checks, analytics isolation, privacy
      budget handling, and twin isolation. If the system cannot deterministically
      prove a property, the blueprint is not met.
    links:
      - {target: c9d640683d0c, rel: depends_on}
      - {target: d7eca61da7e1, rel: depends_on}
      - {target: eb6fb098108a, rel: depends_on}
      - {target: 2c8d69220e89, rel: depends_on}
    deprecated: false

  - number: DATA-P-011
    hash: 266d60e3f2a6
    name: digital-twins-for-simulation
    type: principle
    description: >
      Consequential workflow experiments must not happen on production databases.
      Sandboxed digital twins provide isolated, short-lived clones of
      production-relevant state for testing transaction sequences, previewing
      downstream events, and inspecting rollback behavior. Twin creation and
      teardown speed are product requirements.
    links:
      - {target: 2c8d69220e89, rel: depends_on}
      - {target: d2ceda07176c, rel: depends_on}
      - {target: 531c95e0ab34, rel: depends_on}
    deprecated: false

  # ── Design Patterns ─────────────────────────────────────────────────────

  - number: DATA-D-001
    hash: 8b531a730c7d
    name: encrypt-before-insert
    type: design_pattern
    description: >
      The application layer encrypts sensitive fields before passing them to
      the database. The database stores ciphertext. Decryption occurs in the
      application layer on read using keys from the KMS. Encrypted fields
      cannot be indexed, searched, or sorted by the database engine; queries
      on encrypted fields require application-layer decryption or a separate
      non-sensitive derived index.
    problem: |
      Data written to the database in plaintext is exposed to anyone with database credentials,
      backup access, or file-system access to the storage volume.
    solution: |
      The application layer encrypts sensitive fields before passing them to the database. The
      database stores ciphertext. Decryption occurs in the application layer on read, using keys
      retrieved from the key management service. The database engine never sees plaintext for
      sensitive columns.
    tradeoffs: |
      Encrypted fields cannot be indexed, searched, or sorted by the database engine. Queries that
      filter on encrypted fields require application-layer decryption of candidate rows or a
      separate plaintext index of non-sensitive derived values (e.g., a hash for lookup). This
      pattern adds latency to reads and writes proportional to the number of encrypted fields.
    links:
      - {target: 3be027de3daf, rel: refines}
      - {target: ed6163ae0eaf, rel: refines}
      - {target: 2dc96e2c134e, rel: mitigates}
      - {target: 69dc1d627be5, rel: mitigates}
    deprecated: false

  - number: DATA-D-002
    hash: ad20dbdec789
    name: property-graph-on-postgresql
    type: design_pattern
    description: >
      Store all domain data in three tables: entities (nodes with type and
      JSONB properties), relations (typed edges between entities with JSONB
      properties), and entity_types (schema registry with JSON Schema,
      sensitivity metadata, and KMS key IDs). Native column constraints are
      replaced by JSON Schema validation and partial unique indexes on JSONB
      fields. Recursive CTEs handle graph traversal.
    problem: |
      Static schemas (DDL) are rigid and make business velocity dependent on database migrations.
    solution: |
      Store all domain data in three tables: `entities` (nodes), `relations` (edges), and
      `entity_types` (the registry). `entities` stores all objects with a `type` and a `properties`
      JSONB column. `relations` stores typed edges between entities. `entity_types` stores the
      schema (JSON Schema), sensitivity metadata, and KMS key IDs for each type.
    tradeoffs: |
      Losing some native column constraints (NOT NULL, CHECK). These are replaced by JSON Schema
      validation and partial unique indexes on JSONB fields. Recursive CTEs for graph traversal can
      be slower than simple JOINs at extreme depths, but more than sufficient for business data
      graphs (org structures, task trees).
    links:
      - {target: c1a58c5b6248, rel: refines}
      - {target: 2148c73bfc28, rel: refines}
      - {target: 522c78fa3ceb, rel: depends_on}
    deprecated: false

  - number: DATA-D-003
    hash: 522c78fa3ceb
    name: type-registry-validation
    type: design_pattern
    description: >
      The application layer validates every write against the schema defined in
      entity_types. This registry is live metadata used by the validation layer
      and the FieldEncryptor to decide how to handle each property. Validation
      logic moves from the database engine to the application tier, enabling
      more expressive validation and versioned schema evolution without DDL.
    problem: |
      Moving to a schema-less JSONB model can lead to data corruption if not enforced.
    solution: |
      The application layer validates every write against the schema defined in `entity_types`.
      This registry is live metadata that the validation layer and the `FieldEncryptor` use to
      decide how to handle each property.
    tradeoffs: |
      Validation logic moves from the database engine to the application tier. This increases
      application complexity but allows for more expressive validation and versioned schema
      evolution without DDL.
    links:
      - {target: ad20dbdec789, rel: depends_on}
      - {target: 60ed722d31f6, rel: depends_on}
      - {target: c1a58c5b6248, rel: refines}
    deprecated: false

  - number: DATA-D-004
    hash: 0d599f9046de
    name: append-only-business-journal
    type: design_pattern
    description: >
      A dedicated append-only journal for consequential business operations.
      Stores accepted transaction facts, links compensations to reversed
      transactions, and supports deterministic reconstruction of materialized
      state. The graph model remains the default for business-domain
      flexibility; the journal is the integrity layer for operations requiring
      attributability, replayability, and recoverability.
    problem: |
      Flexible graph storage is well-suited to evolving business entities, but it is not sufficient
      on its own for consequential state transitions that require total order, compensating rollback,
      deterministic replay, and cryptographic verification.
    solution: |
      Use a dedicated append-only journal for consequential business operations. The journal stores
      accepted transaction facts, links compensations to the transactions they reverse, and supports
      deterministic reconstruction of materialized state. The graph model remains the default for
      business-domain flexibility; the journal is the integrity layer for operations that must be
      attributable, replayable, and recoverable.
    tradeoffs: |
      This introduces a second modeling style inside the transactional tier. The cost is justified
      because the journal is not modeling arbitrary business entities — it is modeling
      integrity-critical state transitions. The system gains replay, compensation, and provable
      ordering at the cost of some additional schema and validator complexity.
    links:
      - {target: c1a58c5b6248, rel: refines}
      - {target: d4f39216240f, rel: refines}
      - {target: 37502d8eb399, rel: depends_on}
    deprecated: false

  - number: DATA-D-005
    hash: 60ed722d31f6
    name: key-per-type-encryption
    type: design_pattern
    description: >
      The entity_types registry declares which properties are sensitive and
      which kms_key_id protects them. The FieldEncryptor reads this registry
      to encrypt specific keys within the JSONB blob before storage. One key
      compromise exposes only one entity type. Rotation is handled per entity
      type.
    problem: |
      A single encryption key for all data means that compromise of one key exposes everything.
    solution: |
      The `entity_types` registry declares which properties are `sensitive` and which `kms_key_id`
      protects them. The `FieldEncryptor` reads this registry to encrypt specific keys within the
      JSONB blob before storage.
    tradeoffs: |
      Requires the registry to be consistent across all application instances. Rotation is handled
      per entity type.
    links:
      - {target: 3be027de3daf, rel: refines}
      - {target: 522c78fa3ceb, rel: depends_on}
      - {target: 79671d91bc6e, rel: mitigates}
      - {target: 3b4888fcb503, rel: depends_on}
    deprecated: false

  - number: DATA-D-006
    hash: f8dc70f7a4ff
    name: aggregation-tier-separation
    type: design_pattern
    description: >
      Analytics operates on a separate data store populated by pseudonymous,
      aggregated events. The transactional store emits events stripped of direct
      identifiers and attributed to rotating session pseudonyms. The analytics
      store has no foreign keys to the transactional store and no mechanism to
      reverse pseudonymization. The event pipeline must provide at-least-once
      delivery with idempotent writes. Events failing pseudonymization are
      dropped with a structured log entry, never written with raw identifiers.
    problem: |
      Running analytics queries against the transactional customer database creates a direct path
      from the analytics layer to raw customer records. A single query mistake, a permissive access
      grant, or a compromised analytics tool exposes individual customer data.
    solution: |
      Analytics operates on a separate data store populated by pseudonymous, aggregated events. The
      transactional store emits events (not row copies) that are stripped of direct identifiers and
      attributed to rotating session pseudonyms. The analytics store has no foreign keys to the
      transactional store and no mechanism to reverse the pseudonymization.
    tradeoffs: |
      Two stores means two schemas, two backup strategies, and an event pipeline that must be
      monitored for lag and data loss. Debugging analytics anomalies is harder when you cannot
      trace an event back to a specific customer record — this is the intended behavior, but it
      frustrates ad-hoc investigation.
    links:
      - {target: d7eca61da7e1, rel: refines}
      - {target: 41bebcc94544, rel: depends_on}
      - {target: 7bf0c58e9812, rel: mitigates}
      - {target: f2c4aa2f6dee, rel: depends_on}
    deprecated: false

  - number: DATA-D-007
    hash: 41bebcc94544
    name: session-pseudonymization
    type: design_pattern
    description: >
      Analytics events are attributed to session-scoped pseudonyms that rotate
      on a defined schedule. The mapping between permanent identifiers and
      session pseudonyms is held only in the transactional tier and never
      exported to the analytics store. Longitudinal analysis uses cohort-level
      aggregation, not individual tracking across sessions.
    problem: |
      Attributing analytics events to permanent user identifiers (user IDs, emails) enables
      re-identification even when events are stored in a separate analytics tier.
    solution: |
      Analytics events are attributed to session-scoped pseudonyms that rotate on a defined
      schedule (e.g., per session, per day). The mapping between permanent identifiers and session
      pseudonyms is held only in the transactional tier and is never exported to the analytics
      store. Longitudinal analysis uses cohort-level aggregation, not individual tracking across
      sessions.
    tradeoffs: |
      Rotating pseudonyms make it impossible to build per-user behavioral timelines in the analytics
      tier — this limits certain product analytics use cases (e.g., funnel analysis per user).
      Teams that need user-level analytics must access the transactional tier through the
      audit-controlled, access-restricted path, not the analytics tier.
    links:
      - {target: f8dc70f7a4ff, rel: depends_on}
      - {target: e929ac34c20d, rel: mitigates}
      - {target: eaf52669c958, rel: depends_on}
      - {target: 0ee540d1f066, rel: depends_on}
    deprecated: false

  - number: DATA-D-008
    hash: eb6fb098108a
    name: differential-privacy-on-export
    type: design_pattern
    description: >
      Aggregated data exported from the analytics tier has calibrated noise
      added via a differential privacy mechanism. The privacy budget (epsilon)
      is configured per query class, tracked persistently per dataset, and
      decremented atomically before query execution. Queries exceeding the
      remaining budget are rejected with an explicit error. For agent-initiated
      queries, budget exhaustion returns a structured error; agents must not
      retry with broader queries to circumvent the limit.
    problem: |
      Aggregated query results can leak information about individuals, especially in small groups.
      A query that returns "average salary for the 3-person engineering team" reveals meaningful
      information about each individual.
    solution: |
      Aggregated data exported from the analytics tier has calibrated noise added according to a
      differential privacy mechanism. The privacy budget (epsilon) is configured per query class and
      enforced by the analytics export layer. Queries that would exceed the privacy budget for a
      given dataset are rejected.
    tradeoffs: |
      Noise reduces the precision of analytics results. Low-cardinality groups (small teams, rare
      events) produce noisy results that may not be actionable. The privacy budget must be managed
      — too generous and privacy degrades; too restrictive and analytics becomes useless.
      Differential privacy is a mathematical guarantee, not an approximation, but it requires
      careful calibration.
    links:
      - {target: e929ac34c20d, rel: mitigates}
      - {target: 20f68dd7d339, rel: refines}
      - {target: b79051bf62a8, rel: depends_on}
      - {target: 2c2d4f0598d6, rel: depends_on}
    deprecated: false

  - number: DATA-D-009
    hash: b6e2c422c2db
    name: signed-analytics-at-edge
    type: design_pattern
    description: >
      The client signs each analytics event with a session-scoped key before
      transmission. The server validates the signature, checks for replay via
      nonce or timestamp window, and rejects events failing validation. Signed
      events are stored with their signatures for downstream audit. This
      protects against network-level tampering, not against a malicious client.
    problem: |
      Analytics events generated client-side can be tampered with in transit — injecting false
      events, modifying values, or replaying old events to skew analytics.
    solution: |
      The client signs each analytics event with a session-scoped key before transmission. The
      server validates the signature, checks for replay (via nonce or timestamp window), and rejects
      events that fail validation. Signed events are stored with their signatures for downstream
      audit.
    tradeoffs: |
      Client-side signing requires key distribution and increases event payload size. A compromised
      client can still generate valid but misleading events (the signature proves origin, not
      truthfulness). This pattern protects against network-level tampering, not against a malicious
      client.
    links:
      - {target: f8dc70f7a4ff, rel: depends_on}
    deprecated: false

  - number: DATA-D-010
    hash: 44465342d178
    name: audit-log-first
    type: design_pattern
    description: >
      The access path writes the audit entry to an append-only log before
      executing the data read. If the audit write fails, the data read is
      denied. The audit log uses a separate encryption key and storage backend.
      Entries include accessor identity, timestamp, data accessed, and access
      justification. Batching is not permitted because it breaks the
      log-before-read guarantee.
    problem: |
      Audit logs written after data access are vulnerable to suppression — an attacker who can read
      data can also prevent the log entry from being written. Asynchronous logging has the same
      failure mode under load shedding or crash.
    solution: |
      The access path writes the audit entry to an append-only log before executing the data read.
      If the audit write fails, the data read is denied. The audit log uses a separate encryption
      key and a separate storage backend from the data it covers. Log entries include the identity
      of the accessor, the timestamp, the data accessed, and the access justification (where
      applicable).
    tradeoffs: |
      Synchronous audit logging adds latency to every sensitive read — typically one additional
      write operation. The append-only log grows without bound and requires a retention and archival
      strategy. The separate storage backend is an additional infrastructure dependency. For
      high-throughput systems, the audit write can become a bottleneck; batching is not permitted
      because it breaks the "log before read" guarantee.
    links:
      - {target: c9d640683d0c, rel: refines}
      - {target: e35f0e3a69ab, rel: mitigates}
      - {target: 601e0d14ee88, rel: depends_on}
      - {target: 83c607c6aff9, rel: depends_on}
    deprecated: false

  - number: DATA-D-011
    hash: 2c8d69220e89
    name: sandboxed-digital-twins
    type: design_pattern
    description: >
      Sandboxed digital twins are isolated, short-lived clones of
      production-relevant state. A twin runs the same validator, policy, and
      event logic as production but with separate credentials, separate mutable
      storage, and hard write isolation. All twin actions are audit-marked as
      sandbox actions. Clone the smallest production-relevant state that yields
      credible workflow simulation, not the entire database.
    problem: |
      Humans and agents need to test consequential transaction sequences, workflow transitions, and
      downstream effects against realistic state. Running these experiments against production is
      unsafe; reasoning about them without realistic state is unreliable.
    solution: |
      Create sandboxed digital twins of production-relevant state. A twin is an isolated,
      short-lived clone produced from a recent snapshot, a replay checkpoint, or a minimal domain
      slice with referential integrity preserved. The twin runs the same validator, policy, and
      event logic as production but with separate credentials, separate mutable storage, and hard
      write isolation. All twin actions are audit-marked as sandbox actions.
    tradeoffs: |
      Twin creation requires snapshot management, state slicing, and teardown logic. Full-fidelity
      clones are more expensive than narrow domain slices. The correct trade is to clone the
      smallest production-relevant state that still yields credible workflow simulation, not to copy
      the entire database by default.
    links:
      - {target: 266d60e3f2a6, rel: refines}
      - {target: d2ceda07176c, rel: depends_on}
      - {target: 531c95e0ab34, rel: depends_on}
    deprecated: false

  - number: DATA-D-012
    hash: ca5f8232e396
    name: pii-scrubbing-log-pipeline
    type: design_pattern
    description: >
      All log output passes through a scrubbing layer before persistence. The
      scrubber maintains a deny-list of field names and a pattern list for
      sensitive data formats. Fields matching the deny-list are replaced with a
      redaction marker. Error handlers log IDs and error codes only, never raw
      objects or database rows. The scrubber is applied at the log sink. Before
      each gate, the pipeline is verified under adversarial conditions with
      automated tests asserting absence of PII patterns.
    problem: |
      Application logs record errors, request traces, and system events. Under error conditions —
      exceptions, serialization failures, validation errors — the full object that caused the error
      is frequently logged, and that object may contain decrypted PII, database rows, or request
      payloads with sensitive fields.
    solution: |
      All log output passes through a scrubbing layer before persistence. The scrubber maintains a
      deny-list of field names (e.g., `email`, `name`, `address`, `token`, `password`) and a
      pattern list (e.g., email address regex, credit card number pattern). Fields matching the
      deny-list are replaced with a fixed redaction marker. Error handlers are explicitly prohibited
      from logging raw objects, database rows, or request bodies — they log IDs and error codes
      only. The scrubber is applied at the log sink, not at each call site.
    tradeoffs: |
      A deny-list scrubber is not a perfect control — novel field names and deeply nested structures
      can escape it. It is a defense-in-depth measure that catches the most common accidental leaks.
      The definitive control is the discipline of never logging structured objects in error paths,
      which the scrubber reinforces but does not replace.
    links:
      - {target: 80a03d11a7eb, rel: mitigates}
      - {target: 845a26aaeb89, rel: depends_on}
      - {target: 056d2de15d37, rel: depends_on}
      - {target: 8069bf079897, rel: depends_on}
    deprecated: false

  # ── Architectures ────────────────────────────────────────────────────────

  - number: DATA-A-001
    hash: e58dde384025
    name: three-database-single-instance
    type: architecture
    description: >
      Baseline architecture: a single PostgreSQL instance hosts three databases
      (calypso_app, calypso_analytics, calypso_audit) with three separate
      connection pools and roles (app_rw, analytics_w, audit_w). KMS runs as a
      separate process. Analytics events flow through an in-process pipeline
      that pseudonymizes before writing. Local development uses Kubernetes or
      Docker Compose to deploy the application container alongside PostgreSQL.
      Acceptable for pre-production; replaced by independent managed
      databases when availability SLAs require it.
    diagram: |
      ┌──────────────────────────────────────────────────┐
      │                Application Server                │
      │                                                  │
      │  ┌─────────────┐   ┌──────────────────────────┐  │
      │  │  Business   │   │    Encryption Layer       │  │
      │  │  Logic      │──►│ (per-type, registry-sync)  │  │
      │  └──────┬──────┘   └────────────┬─────────────┘  │
      │         │                       │                │
      │  ┌──────▼──────┐   ┌────────────▼─────────────┐  │
      │  │  Event      │   │    KMS Client             │  │
      │  │  Pipeline   │   │    (k8s Secrets / KMS)    │  │
      │  │  (pseudonym)│   └──────────────────────────┘  │
      │  └──────┬──────┘                                 │
      └─────────┼────────────────────────────────────────┘
                │
                │  app_rw          analytics_w     audit_w
                ▼                  ▼               ▼
      ┌──────────────────┐  ┌──────────────┐  ┌──────────────┐
      │  calypso_app     │  │calypso_      │  │calypso_audit │
      │ (entities,       │  │analytics     │  │(INSERT-only  │
      │  relations,      │  │(pseudonymous │  │ role,        │
      │  entity_types)   │  │ events,      │  │ append-only  │
      └──────────────────┘  │ DP export)   │  │ table)       │
                │           └──────────────┘  └──────────────┘
                ▼
      ┌──────────────────┐
      │  KMS             │
      │  (k3s KMS —      │
      │   k8s Secrets)   │
      └──────────────────┘
    when_appropriate: |
      The baseline architecture from the first commit. A single PostgreSQL instance hosts three
      databases: calypso_app (transactional), calypso_analytics (analytics events), calypso_audit
      (audit log). The application server holds three separate connection pools with three separate
      database roles. Secrets are managed via k8s Secrets encrypted at rest by the KMS root key. Analytics events flow from the application through an
      in-process event pipeline that pseudonymizes before writing to calypso_analytics.
    tradeoffs: |
      All three databases share one PostgreSQL instance — an instance-level failure takes down all
      three simultaneously. This is acceptable for pre-production and early production; the single
      instance is replaced by independent managed databases when availability SLAs require it. The
      event pipeline is in-process, so analytics event delivery is synchronous with request
      handling — lag is zero but pipeline failures surface as request errors. An async pipeline
      (separate worker, queue) is a production upgrade, not a day-one requirement.
    links:
      - {target: d7eca61da7e1, rel: implements}
      - {target: 2148c73bfc28, rel: implements}
      - {target: 38d305fb7362, rel: depends_on}
      - {target: 127078d82e9d, rel: depends_on}
      - {target: 6452802894f9, rel: depends_on}
      - {target: c9b045a4c37e, rel: depends_on}
    deprecated: false

  - number: DATA-A-002
    hash: c9b045a4c37e
    name: multi-tenant-encrypted-platform
    type: architecture
    description: >
      Production regulated-industry architecture: per-tenant key hierarchies
      isolate encryption. KMS is HSM-backed. Analytics tier applies
      differential privacy on all exports. Audit log is replicated to immutable
      cold storage. Transition from Architecture A replaces the shared
      PostgreSQL instance with independent managed databases, adds per-tenant
      key hierarchies, moves the event pipeline to an async worker with durable
      queue, and adds HSM backing. Schema and encryption envelope format are
      unchanged.
    diagram: |
      ┌─────────────────────────────────────────────────────┐
      │                  Application Tier                   │
      │  ┌─────────┐  ┌─────────┐  ┌─────────────────────┐ │
      │  │Tenant A │  │Tenant B │  │  Encryption Layer    │ │
      │  │ Context │  │ Context │  │  (per-tenant keys)   │ │
      │  └────┬────┘  └────┬────┘  └──────────┬──────────┘ │
      │       └─────┬──────┘               │               │
      └─────────────┼──────────────────────┼───────────────┘
                    │                      │
                    ▼                      ▼
      ┌──────────────────┐    ┌──────────────────────────┐
      │   Relational     │    │   Key Management Service │
      │   Database       │    │   (HSM-backed)           │
      │   (row-level     │    │                          │
      │    security,     │    │   ┌────────┐ ┌────────┐  │
      │    encrypted     │    │   │Tenant A│ │Tenant B│  │
      │    fields)       │    │   │ Keys   │ │ Keys   │  │
      │                  │    │   └────────┘ └────────┘  │
      └──────────────────┘    └──────────────────────────┘
                    │
                    ▼
      ┌──────────────────┐    ┌──────────────────────────┐
      │  Event Pipeline  │───►│  Analytics Event Store    │
      │  (pseudonymize,  │    │  (tenant-partitioned,     │
      │   strip PII)     │    │   DP on export)           │
      └──────────────────┘    └──────────┬───────────────┘
                                         │
                    ┌────────────────────┼──────────────┐
                    ▼                    ▼              ▼
      ┌──────────────────┐  ┌────────────────┐  ┌────────────┐
      │  Agent Consumer  │  │  Admin Report  │  │  Audit Log │
      │  (aggregated,    │  │  Dashboard     │  │  (immutable│
      │   DP-filtered)   │  │  (DP-filtered) │  │   cold     │
      └──────────────────┘  └────────────────┘  │   storage) │
                                                └────────────┘
    when_appropriate: |
      Per-tenant key hierarchies isolate encryption so that compromise of one tenant's keys does
      not expose another tenant's data. The key management service is backed by a hardware security
      module. The analytics tier applies differential privacy on all exports. The audit log is
      replicated to immutable cold storage. Use this architecture when regulatory requirements
      (SOC 2, GDPR, HIPAA) demand provable tenant isolation and mathematical privacy guarantees.
    tradeoffs: |
      Significant operational complexity. Per-tenant key hierarchies require tenant lifecycle
      management (onboarding creates keys, offboarding destroys them). HSM-backed key management
      adds latency and cost. Differential privacy on every export requires privacy budget tracking
      and may render small-tenant analytics unusable. Row-level security adds query planning
      overhead.
    links:
