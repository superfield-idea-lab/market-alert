  # ── Antipatterns ─────────────────────────────────────────────────────────────

  - number: ARCH-X-001
    hash: 1f938a5d6f34
    name: shared-utils-junk-drawer
    type: antipattern
    description: >
      A /packages/utils or /lib/helpers directory with no cohesive
      responsibility. It starts with one date formatter, accumulates string
      helpers, grows a random API wrapper, and eventually contains code that
      belongs in five different packages. Every agent adds to it because it is
      the path of least resistance.
    links:
      - {target: b5c27e8e1ed7, rel: contradicts}
