meta:
  domain: ARCH
  title: Architecture Blueprint
  version: 1
  requires: []
  vision: |
    A web application's architecture is the set of constraints that make the easy path and the
    correct path the same path. When architecture is absent or implicit, every developer — human or
    AI — makes local decisions that are individually reasonable and collectively incoherent. The
    server leaks into the client. The client calls the database. Utility functions appear in four
    different directories. Dependencies accumulate until no one can explain what half of them do.

    Architecture for agent-built software carries an additional requirement: the structure must be
    legible to an agent encountering the codebase for the first time, in any session, without verbal
    explanation. An agent cannot ask a colleague where things go. It reads the directory tree,
    infers the rules, and acts. If the directory tree does not encode the rules, the agent will
    invent its own — and they will be wrong.

    A well-architected codebase has a small number of top-level directories with clear,
    non-overlapping responsibilities. Server code and client code never share a runtime. Shared
    types live in an explicit shared location, not duplicated across boundaries. Dependencies are
    deliberate, justified, and minimal — because every dependency an agent installs is a dependency
    every future agent must understand, update, and debug. The cost of ignoring this blueprint is a
    codebase that grows in complexity faster than it grows in capability, until the agent spends
    more tokens navigating the mess than building the product.

rules:
  # ── Threats ──────────────────────────────────────────────────────────────────

  - number: ARCH-T-001
    hash: 8a4c23247926
    name: server-code-in-browser-bundle
    type: threat
    description: >
      Server-side code imported into the browser bundle exposes server secrets,
      Node APIs, and database access to the client. Runtime separation must
      prevent any server module from being reachable by client import paths.
    links: []
    deprecated: false

  - number: ARCH-T-002
    hash: 13b949d1669d
    name: browser-code-on-server
    type: threat
    description: >
      Browser-side code executed on the server violates the security boundary.
      Untrusted client logic must not run in a trusted server context.
    links: []
    deprecated: false

  - number: ARCH-T-003
    hash: d49c89a98177
    name: agent-places-code-wrong-directory
    type: threat
    description: >
      An agent places new code in the wrong directory, breaking structural
      consistency. The directory tree must unambiguously encode where each type
      of code belongs.
    links: []
    deprecated: false

  - number: ARCH-T-004
    hash: 481ad83fd69d
    name: shared-types-drift
    type: threat
    description: >
      Shared types drift between client and server, breaking contract integrity.
      A single source of truth for data shapes must exist and be enforced.
    links: []
    deprecated: false

  - number: ARCH-T-005
    hash: 587abbfe8e88
    name: trivial-dependency-addition
    type: threat
    description: >
      An agent adds a dependency for a trivial function. Each dependency is an
      ongoing maintenance and security liability; dependency minimalism must be
      enforced.
    links: []
    deprecated: false

  - number: ARCH-T-006
    hash: 4f302fe9927a
    name: deep-transitive-dependency-tree
    type: threat
    description: >
      A dependency has a deep transitive tree that introduces vulnerabilities.
      The total dependency surface must be auditable and minimal to preserve
      supply chain integrity.
    links: []
    deprecated: false

  - number: ARCH-T-007
    hash: 5c3cce139dcc
    name: unbounded-package-creation
    type: threat
    description: >
      An agent generates a new package or service without clear boundaries.
      New packages must have explicit responsibilities that do not overlap with
      existing ones.
    links: []
    deprecated: false

  - number: ARCH-T-008
    hash: e4fead4a4d1b
    name: api-contract-change-without-consumer-update
    type: threat
    description: >
      API contracts change without updating consumers. API inputs and outputs
      must be validated against actual production schemas to maintain type safety.
    links: []
    deprecated: false

  - number: ARCH-T-009
    hash: f84854beddd9
    name: unnavigable-monorepo-structure
    type: threat
    description: >
      Monorepo structure becomes too deep or too flat to navigate. An agent must
      be able to locate any component within seconds by reading the directory tree.
    links: []
    deprecated: false

  # ── Principles ───────────────────────────────────────────────────────────────

  - number: ARCH-P-001
    hash: 0fa329015368
    name: boundaries-are-physical-not-conceptual
    type: principle
    description: >
      Code that runs in different runtimes lives in different directories with
      different build pipelines. The separation is enforced by the build system,
      not by developer discipline. A browser import that reaches for a server
      module fails at build time, not at runtime in production.
    links:
      - {target: 8a4c23247926, rel: mitigates}
      - {target: 13b949d1669d, rel: mitigates}
    deprecated: false

  - number: ARCH-P-002
    hash: 5aa848649c8f
    name: directory-tree-is-architecture-diagram
    type: principle
    description: >
      An agent reading the top-level directory listing must be able to answer
      what the deployable units are, where shared contracts live, where business
      logic lives, and where tests live. If the tree does not answer these
      questions at a glance, the architecture has failed its primary audience.
    links:
      - {target: d49c89a98177, rel: mitigates}
      - {target: f84854beddd9, rel: mitigates}
    deprecated: false

  - number: ARCH-P-003
    hash: 9be37f247b72
    name: dependencies-are-liabilities
    type: principle
    description: >
      Every external package is a commitment to track its releases, audit its
      security, understand its behavior, and handle its deprecation. The
      threshold for adding a dependency is not whether it saves time now but
      whether the functionality is infeasible to build and maintain internally.
      AI agents shift the buy-vs-build calculus heavily toward build.
    links:
      - {target: 587abbfe8e88, rel: mitigates}
      - {target: 4f302fe9927a, rel: mitigates}
    deprecated: false

  - number: ARCH-P-004
    hash: ccd33c7dd2c2
    name: types-shared-logic-not
    type: principle
    description: >
      Data shapes that cross boundaries (API request/response types, domain
      types, shared enums) live in a single canonical location imported by both
      sides. Business logic, rendering logic, and data access logic are never
      shared across the client-server boundary. Sharing logic creates coupling;
      sharing types creates contracts.
    links:
      - {target: 481ad83fd69d, rel: mitigates}
    deprecated: false

  - number: ARCH-P-005
    hash: c4b55c6bb7a0
    name: simplicity-scales-cleverness-does-not
    type: principle
    description: >
      A monorepo with five top-level directories and obvious naming survives
      scale. A monorepo with clever abstractions, auto-generated barrels, and
      dynamic module resolution breaks the moment an agent tries to understand
      it. Choose boring, obvious structure over sophisticated, implicit structure
      every time.
    links:
      - {target: f84854beddd9, rel: mitigates}
    deprecated: false

  # ── Design Patterns ─────────────────────────────────────────────────────────

  - number: ARCH-D-001
    hash: 39e42948f441
    name: strict-runtime-separation
    type: design_pattern
    description: >
      Server code and client code live in separate top-level directories with
      separate entry points and separate build configurations. No import path
      from the client directory can resolve to a file in the server directory.
      Shared types are extracted into a third location containing only type
      definitions with no runtime code. Accept duplication of utility functions
      across boundaries rather than creating a shared runtime utils package that
      becomes a coupling magnet.
    problem: |
      In a full-stack TypeScript codebase, server and client code use the same language, making it
      trivially easy to import server code into the client or vice versa.
    solution: |
      Server code and client code live in separate top-level directories with separate entry points
      and separate build configurations. No import path from the client directory can resolve to a
      file in the server directory. Shared types are extracted into a third location that both sides
      import from, but that location contains only type definitions — no runtime code.
    tradeoffs: |
      Duplicating a utility function across client and server feels wasteful. But the alternative
      — a shared runtime utils package — becomes a magnet for coupling. Accept the duplication; it
      is cheaper than the debugging when shared logic behaves differently in two runtimes.
    links:
      - {target: 8a4c23247926, rel: mitigates}
      - {target: 13b949d1669d, rel: mitigates}
      - {target: 0fa329015368, rel: refines}
    deprecated: false

  - number: ARCH-D-002
    hash: 19ba825434e1
    name: buy-vs-diy-decision-framework
    type: design_pattern
    description: >
      Before adding any dependency, apply a two-question test. (1) Is this
      functionality infeasible to build internally within reasonable effort?
      (2) Is the package mature, minimal in footprint, and well-maintained?
      Both must be yes. Utility functions, simple data transformations, and thin
      wrappers are built internally with tests. Cryptographic primitives,
      payment gateway SDKs, and browser automation engines are bought. The
      decision must be documented and revisitable.
    problem: |
      AI agents, like human developers, default to installing packages for solved problems. But in
      an agent-built codebase, each dependency is a black box the agent must re-learn in every
      session, and a supply chain node the agent cannot audit.
    solution: |
      Apply a two-question test before adding any dependency: (1) Is this functionality infeasible
      to build internally within reasonable effort? (2) Is the package mature, minimal in footprint,
      and well-maintained? Both must be yes. If the functionality is a utility function, a simple
      data transformation, or a thin wrapper — the agent builds it internally with tests. If it is
      a cryptographic primitive, a payment gateway SDK, or a browser automation engine — buy it.
    tradeoffs: |
      Building internally means owning maintenance of that code. For trivial utilities this is
      cheap. For complex functionality (e.g., a JWT library) the line is blurry — the decision must
      be documented and revisitable.
    links:
      - {target: 587abbfe8e88, rel: mitigates}
      - {target: 4f302fe9927a, rel: mitigates}
      - {target: 9be37f247b72, rel: refines}
    deprecated: false

  - number: ARCH-D-003
    hash: b5c27e8e1ed7
    name: monorepo-explicit-package-boundaries
    type: design_pattern
    description: >
      The repository has a fixed set of top-level directories, each with a clear
      responsibility. Applications (deployable units) live in one area, packages
      (shared libraries) in another, tests in a third. New packages are added
      only when their responsibility does not overlap with any existing package.
      The package list is documented and enforced. Expand the structure
      deliberately rather than bending existing packages to hold unrelated code.
    problem: |
      As a codebase grows, code organization becomes ambiguous. Where does a new service go? Where
      does shared UI live? Agents resolve ambiguity by guessing, and guesses accumulate into
      inconsistency.
    solution: |
      The repository has a fixed set of top-level directories, each with a clear responsibility.
      Applications (deployable units) live in one area. Packages (shared libraries) live in another.
      Tests live in a third. New packages are added only when their responsibility does not overlap
      with any existing package. The package list is documented and enforced.
    tradeoffs: |
      A fixed structure resists organic growth. Some code will not fit neatly into the predefined
      buckets. The answer is to expand the structure deliberately (add a new package with documented
      responsibility), not to bend existing packages to hold unrelated code.
    links:
      - {target: 5c3cce139dcc, rel: mitigates}
      - {target: d49c89a98177, rel: mitigates}
      - {target: 5aa848649c8f, rel: refines}
    deprecated: false

  - number: ARCH-D-004
    hash: 4211a13461f0
    name: type-safe-api-contracts
    type: design_pattern
    description: >
      API contracts are defined as TypeScript types in the shared types package.
      Both client and server import from this canonical source. Integration tests
      validate that actual API responses match these types. The types are
      versioned alongside the API so that a breaking change requires a type
      change, which forces a type error in all consumers. Requires discipline to
      update types before or simultaneously with API changes.
    problem: |
      When client and server are developed independently (possibly by different agents or in
      different sessions), API contracts drift. The client expects one shape; the server returns
      another. The mismatch surfaces at runtime.
    solution: |
      API contracts are defined as TypeScript types in the shared types package. Both client and
      server import from this canonical source. Integration tests validate that actual API responses
      match these types. The types are versioned alongside the API — a breaking change in the API
      requires a type change, which forces a type error in all consumers.
    tradeoffs: |
      Requires discipline to update types before (or simultaneously with) API changes. An agent that
      modifies the server response without updating the shared type will break the build — which is
      the desired behavior, but requires that CI catches it before merge.
    links:
      - {target: e4fead4a4d1b, rel: mitigates}
      - {target: 481ad83fd69d, rel: mitigates}
      - {target: ccd33c7dd2c2, rel: refines}
    deprecated: false

  # ── Architectures ────────────────────────────────────────────────────────────

  - number: ARCH-A-001
    hash: ebad74d6a752
    name: monorepo-collocated-packages
    type: architecture
    description: >
      Monorepo with collocated packages for a single product with one to three
      agents. Structure includes /apps/web (browser bundle), /apps/server (API
      server), /packages/core (business logic and domain types), /packages/ui
      (shared UI components), /packages/services (API clients and external
      adapters), /packages/integrations (third-party SDK wrappers), /tests
      (unit, integration, e2e), and /docs. All code shares a single version
      with no independent package versioning. Simpler to navigate but harder to
      extract a package for reuse later.
    diagram: |
      ┌────────────────────────────────────────────────────┐
      │  Repository Root                                   │
      │                                                    │
      │  /apps                                             │
      │    /web        ← Browser bundle (UI framework +    │
      │    │              styles, client-only)              │
      │    /server     ← API server (runtime, ESM)         │
      │                                                    │
      │  /packages                                         │
      │    /core       ← Business logic, domain types      │
      │    /ui         ← Shared UI components              │
      │    /services   ← API clients, external adapters    │
      │    /integrations ← Third-party SDK wrappers        │
      │                                                    │
      │  /tests                                            │
      │    /unit       ← Pure logic tests                  │
      │    /integration ← API contract tests               │
      │    /e2e        ← Full-page browser tests           │
      │                                                    │
      │  /docs         ← Architecture, product, roadmap    │
      └────────────────────────────────────────────────────┘
    when_appropriate: |
      Single product, one to three agents, early through mid-stage development. The entire codebase
      fits in one repository with no need for independent deployment of packages.
    tradeoffs: |
      All code shares a single version. No independent package versioning. Simpler to navigate but
      harder to extract a package for reuse later.
    links:
      - {target: 5aa848649c8f, rel: refines}
      - {target: 0fa329015368, rel: refines}
    deprecated: false

  - number: ARCH-A-002
    hash: 85f102d48938
    name: multi-app-monorepo
    type: architecture
    description: >
      Multi-app monorepo for multiple products sharing a common backend and type
      system. Suitable for three or more agents, mid-stage through production.
      Structure includes multiple apps (web-admin, web-public, server-api,
      server-jobs) and shared packages (shared-types, ui-kit, core, db). Each
      app can be built and deployed independently. More directories to navigate
      and package boundaries must be carefully maintained, but shared packages
      prevent drift between apps.
    diagram: |
      ┌────────────────────────────────────────────────────┐
      │  Repository Root                                   │
      │                                                    │
      │  /apps                                             │
      │    /web-admin   ← Admin dashboard                  │
      │    /web-public  ← Public-facing application        │
      │    /server-api  ← Core API server                  │
      │    /server-jobs ← Background job runner             │
      │                                                    │
      │  /packages                                         │
      │    /shared-types ← API contracts, domain types     │
      │    /ui-kit       ← Design system components        │
      │    /core         ← Business logic                  │
      │    /db           ← Database access layer           │
      │                                                    │
      │  /tests          ← Organized by app and suite      │
      │  /docs                                             │
      └────────────────────────────────────────────────────┘
    when_appropriate: |
      Multiple user-facing applications sharing a common backend and type system. Team of three or
      more agents. Mid-stage through production.
    tradeoffs: |
      More directories to navigate. Package boundaries must be more carefully maintained. But each
      app can be built and deployed independently, and shared packages prevent drift between apps.
    links:
      - {target: 5aa848649c8f, rel: refines}
      - {target: b5c27e8e1ed7, rel: refines}
    deprecated: false

  - number: ARCH-A-003
    hash: aee6949d8880
    name: polyrepo-shared-types
    type: architecture
    description: >
      Polyrepo with a shared types package for independent teams requiring
      strict boundaries. Separate repositories for Web, API, and Types with the
      types package as the only coupling point. Provides maximum isolation but
      maximum coordination cost. Type changes require publishing, versioning,
      and updating in all consuming repos. Agent context is limited to one repo
      at a time, making cross-repo reasoning expensive.
    diagram: |
      ┌──────────────┐   ┌──────────────┐   ┌──────────────┐
      │  Repo: Web   │   │  Repo: API   │   │  Repo: Types │
      │  /src        │   │  /src        │   │  /src        │
      │  /tests      │   │  /tests      │   │  /tests      │
      │              │   │              │   │              │
      │  imports ────┼───┼──────────────┼───┤  Published   │
      │  @org/types  │   │  imports ────┼───┤  @org/types  │
      └──────────────┘   │  @org/types  │   └──────────────┘
                         └──────────────┘
    when_appropriate: |
      Independent teams or organizations that cannot share a single repository. Regulatory contexts
      requiring separate access controls per codebase. The types package is the only coupling point.
    tradeoffs: |
      Maximum isolation but maximum coordination cost. Type changes require publishing, versioning,
      and updating in all consuming repos. Agent context is limited to one repo at a time —
      cross-repo reasoning is expensive.
    links:
      - {target: ccd33c7dd2c2, rel: refines}
    deprecated: false

