meta:
  domain: ENV
  title: Environment Blueprint
  version: 1
  requires: []
  vision: |
    The promise of AI-led development is that the agent does not just write code — it designs and
    operates the full system from the first commit. This promise breaks immediately if the
    environment the agent develops in differs from the environment the software runs in. A staging
    server with hand-installed packages, a production cluster configured differently by a human
    operator: each gap is a place where the software will silently stop working. Agents are worse
    at detecting these gaps than experienced human engineers, because agents cannot see the physical
    machine, cannot smell that something is wrong, and will confidently produce work that passes
    every test in the wrong environment.

    Calypso eliminates the gap by collapsing development and production into the same container
    topology from the first day. The frontend container, the worker container, and the database
    container that run during a prototype session are the same containers — same base images, same
    constraints, same network rules — that run in production. When the agent builds a UI for a
    business process, it is not creating a throwaway demo. It is designing the full production
    system for free. The prototype and the production artifact are the same build, tagged and
    released through the same pipeline.

    The development environment is the cloud host itself. The agent and developer work directly on
    the host OS — the same machine that runs the K8s cluster. There is no developer container
    inside the cluster. The IDE connects to the host via SSH (or a remote development extension).
    This simplifies the environment without sacrificing parity: the app containers the agent builds
    and tests against are the same containers that run in production.

rules:
  # ── Threats ──

  - number: ENV-T-001
    hash: fc311abf938b
    name: frontend-runtime-build-compromise
    type: threat
    description: >
      Frontend container is used to build or compile code at runtime, compromising release integrity.
      Every artifact served in production must have been vetted, tested, and released before the server sees it.
    links:
      - {target: 9f19e91acc4f, rel: depends_on}
      - {target: 743a3efd893b, rel: depends_on}
      - {target: 5cc4b57ba946, rel: depends_on}
    deprecated: false

  - number: ENV-T-002
    hash: 23a00d26214d
    name: direct-database-access-by-agent
    type: threat
    description: >
      Database container is modified or queried by the agent directly, compromising data integrity
      and audit trail. Agents must not have direct access to the database process or its host.
    links:
      - {target: 4c845236bd82, rel: depends_on}
      - {target: 301a5d057b05, rel: depends_on}
    deprecated: false

  - number: ENV-T-003
    hash: 4fcb14f4d38e
    name: container-immutability-violation
    type: threat
    description: >
      Agent installs packages or modifies global state on the frontend or database container.
      Non-developer containers must be immutable; unexpected mutations indicate a compromised
      or misconfigured system.
    links:
      - {target: 4c845236bd82, rel: depends_on}
      - {target: 4117a6c1f4d3, rel: depends_on}
      - {target: 5cc4b57ba946, rel: depends_on}
    deprecated: false

  - number: ENV-T-004
    hash: 666f88d39137
    name: topology-parity-divergence
    type: threat
    description: >
      Cluster is provisioned with environment-specific configuration differences between demo
      and production. A cluster that behaves differently in demo mode versus production mode
      is two different systems pretending to be one.
    links:
      - {target: d5d3aebb21fe, rel: depends_on}
      - {target: b612fb97619b, rel: depends_on}
    deprecated: false

  - number: ENV-T-005
    hash: 7bbd3fbc842e
    name: agent-on-local-laptop
    type: threat
    description: >
      Agent runs on the developer's local laptop instead of the cloud host. Local environments
      reintroduce all the divergence that a shared cloud host eliminates. Agents belong on the
      cloud host.
    links:
      - {target: f619dc6453a3, rel: depends_on}
      - {target: d832dee1f2b4, rel: depends_on}
      - {target: 992c3496d647, rel: depends_on}
    deprecated: false

  - number: ENV-T-006
    hash: 0848dbeae670
    name: state-durability-loss
    type: threat
    description: >
      Cluster is destroyed and must be reprovisioned. All non-ephemeral state must live in
      version control or the database volume, never on the host filesystem.
    links:
      - {target: 61e2c56c8451, rel: depends_on}
      - {target: 7a892f780299, rel: depends_on}
      - {target: 5e0b509a4774, rel: depends_on}
    deprecated: false

  - number: ENV-T-007
    hash: a377a12b736b
    name: release-gate-bypass
    type: threat
    description: >
      A release is deployed to the frontend without passing CI and the release pipeline.
      The frontend must not be configurable to pull untagged, untested, or unreleased artifacts.
    links:
      - {target: 743a3efd893b, rel: depends_on}
      - {target: c30972e8b0d1, rel: depends_on}
      - {target: 6cca16f36d10, rel: depends_on}
      - {target: 33ab5e24de77, rel: depends_on}
    deprecated: false

  - number: ENV-T-008
    hash: 3930e86daa53
    name: session-continuity-loss
    type: threat
    description: >
      Agent session drops mid-task due to SSH timeout or network interruption. In-flight
      agent context and partially applied changes must survive disconnection via tmux on the host.
    links:
      - {target: 1d0d5a6c0fde, rel: depends_on}
    deprecated: false

  - number: ENV-T-009
    hash: 1f8b88715abb
    name: test-hits-live-database
    type: threat
    description: >
      Integration or end-to-end test connects to the live database instead of an ephemeral
      test instance. Test runs must never read from or write to the production or demo database.
    links:
      - {target: b3216ae857c1, rel: depends_on}
      - {target: 0442588e8a04, rel: depends_on}
      - {target: 9a82b0efb1bd, rel: depends_on}
    deprecated: false

  - number: ENV-T-010
    hash: fc8f1f0e7f41
    name: leaked-ephemeral-test-containers
    type: threat
    description: >
      Ephemeral test container is left running after a test suite completes. Leaked containers
      exhaust disk, memory, and port space on the host.
    links:
      - {target: 0442588e8a04, rel: depends_on}
      - {target: ba8e375964c6, rel: depends_on}
    deprecated: false

  # ── Principles ──

  - number: ENV-P-001
    hash: d5d3aebb21fe
    name: prototype-is-production
    type: principle
    description: >
      The container topology that runs during the first demo session is the same topology
      that runs in production. No placeholder components, no shortcuts, no environment-specific
      configurations. Every prototype decision is a production decision. When the prototype
      is done, the production system is done.
    links:
      - {target: 666f88d39137, rel: mitigates}
      - {target: b612fb97619b, rel: depends_on}
    deprecated: false

  - number: ENV-P-002
    hash: 4c845236bd82
    name: role-specialized-capability-constrained-containers
    type: principle
    description: >
      Each container type exists for exactly one role and has only the capabilities required
      for that role. No container has capabilities that belong to another role. A container
      that can do more than its role requires is a container that can fail in more ways than
      its role implies.
    links:
      - {target: 4117a6c1f4d3, rel: refines}
      - {target: 23a00d26214d, rel: mitigates}
      - {target: 4fcb14f4d38e, rel: mitigates}
    deprecated: false

  - number: ENV-P-003
    hash: 9f19e91acc4f
    name: building-from-source-host-only
    type: principle
    description: >
      Compilation, bundling, transpilation, dependency installation, and any other source-to-artifact
      transformation happens exclusively on the development host. The frontend container receives
      only tagged, tested, released artifacts. It cannot and must not have build tools.
    links:
      - {target: fc311abf938b, rel: mitigates}
      - {target: 743a3efd893b, rel: refines}
      - {target: 5cc4b57ba946, rel: depends_on}
    deprecated: false

  - number: ENV-P-004
    hash: f619dc6453a3
    name: coding-assistants-on-host-workers-in-container
    type: principle
    description: >
      AI coding assistants (Claude Code, Gemini CLI, Codex) run directly on the cloud host.
      AI workers (long-running task daemons) run in the worker container. These two categories
      must not be conflated. Placing a worker on the host or a coding assistant in a container
      violates capability constraints.
    links:
      - {target: 7bbd3fbc842e, rel: mitigates}
      - {target: 4117a6c1f4d3, rel: refines}
      - {target: 992c3496d647, rel: depends_on}
    deprecated: false

  - number: ENV-P-005
    hash: b3216ae857c1
    name: ephemeral-isolated-test-databases
    type: principle
    description: >
      Every test requiring a database runs against a fresh, disposable database container
      spun up by the test runner and torn down when the suite completes. This container has
      no connection to the cluster database. The cluster database is never a valid test target.
    links:
      - {target: 1f8b88715abb, rel: mitigates}
      - {target: 0442588e8a04, rel: refines}
      - {target: 9a82b0efb1bd, rel: depends_on}
    deprecated: false

  - number: ENV-P-006
    hash: 61e2c56c8451
    name: agent-provisioned-environment
    type: principle
    description: >
      The developer does not manually configure servers. The agent runs provision-cluster.sh
      to install k3s, apply manifests, and produce a running cluster. The provisioning process
      is versioned, testable, and re-runnable. A system that cannot be reprovisioned from
      scratch in one command has undocumented state.
    links:
      - {target: 0848dbeae670, rel: mitigates}
      - {target: 7a892f780299, rel: refines}
      - {target: d3ffe65751b3, rel: depends_on}
    deprecated: false

  # ── Design Patterns ──

  - number: ENV-D-001
    hash: 743a3efd893b
    name: immutable-release-artifact
    type: design_pattern
    description: >
      The host builds a release artifact, pushes it through CI, passes all tests, and tags
      a version. The frontend container downloads the artifact from the release registry by
      tag. The frontend has no VCS credentials and no build tooling. Its only capability is
      fetching a named version and serving it.
    problem: |
      Software deployed to the frontend must be known-good before it arrives. A frontend that can
      pull arbitrary code — from the main branch, from a development server, from a local machine
      — is a frontend that can serve untested code.
    solution: |
      The host builds a release artifact (a compiled bundle), pushes it through the standard CI
      pipeline, passes all automated tests, and tags a version on the version control host. The
      frontend container is notified of the new release tag via CI and downloads the artifact from
      the release registry. The frontend has no credentials to the version control system and no
      build tooling. Its only capability is fetching a named version and serving it.
    tradeoffs: |
      Adds a mandatory release step between "code compiles" and "code is visible in the browser."
      For rapid iteration this feels slow, but the pipeline is fast by design (pre-built artifact,
      not build-on-deploy). The overhead is the correct feedback mechanism: if the release pipeline
      is too slow to support iteration, the pipeline needs to be optimized, not bypassed.
    links:
      - {target: 9f19e91acc4f, rel: refines}
      - {target: fc311abf938b, rel: mitigates}
      - {target: a377a12b736b, rel: mitigates}
    deprecated: false

  - number: ENV-D-002
    hash: 4117a6c1f4d3
    name: three-container-separation
    type: design_pattern
    description: >
      Three purpose-built container types with minimal images and single responsibilities.
      Frontend serves pre-built release bundles (no build tools, no persistent writes).
      Worker runs AI task daemons (no shell, read-only task queue, writes via API only).
      Database runs the database binary only (distroless, volume-mounted, no shell, no direct
      agent access). The development environment is the cloud host OS, not a fourth container.
    problem: |
      Combining serving capabilities, AI work, and data storage in a single runtime or
      undifferentiated containers makes it impossible to enforce capability constraints and
      impossible to scale or replace components independently.
    solution: |
      Three purpose-built container types, each with a minimal image, minimal capability set, and
      a single responsibility. Frontend Container: serves pre-built release bundles on a designated
      port; cannot install packages, execute build steps, or write to persistent volumes. Worker
      Container: runs AI task daemons; no shell access; read-only access to task queue views;
      writes go through the API. Database Container: distroless; database binary and dependencies
      only; volume-mounted for persistence; no shell, no package manager, no direct agent access.
    tradeoffs: |
      Three containers require a container orchestrator. This is not a cost — it is an explicit
      design choice that brings network policy enforcement, restart behavior, health checking, and
      scaling as standard features.
    links:
      - {target: 4c845236bd82, rel: refines}
      - {target: f619dc6453a3, rel: refines}
      - {target: 15da78c2727e, rel: refines}
      - {target: e5ca72d78ff8, rel: refines}
    deprecated: false

  - number: ENV-D-003
    hash: 0442588e8a04
    name: ephemeral-test-containers
    type: design_pattern
    description: >
      The host runs Docker directly. The test runner starts a fresh database container on a
      randomized port, runs all tests, and stops and removes the container unconditionally
      (in a finally block). The cluster database is unreachable from the host at the network
      level, enforced by Kubernetes network policy. The ephemeral container uses the same
      image as the cluster database; migrations are applied from scratch, validating them.
    problem: |
      Integration tests and end-to-end tests require real infrastructure — a running database, a
      seeded schema, realistic data volumes — but must not touch the cluster database, which holds
      real or demo data.
    solution: |
      The host runs Docker directly. The test runner starts a fresh database container before the
      suite, exposes it on a randomized local port, runs all tests against it, and stops and removes
      the container when the suite exits — whether it passes or fails. The cluster database is
      unreachable from the host at the network level: no hostname, no credentials, no route. This is
      enforced by Kubernetes network policy, not by convention. The ephemeral test container uses
      the same image as the cluster database container. Schema migrations are applied from scratch
      at test startup.
    tradeoffs: |
      The host must have Docker installed and running. Teardown must happen in a finally block —
      unconditionally — regardless of test outcome.
    links:
      - {target: b3216ae857c1, rel: refines}
      - {target: 1f8b88715abb, rel: mitigates}
      - {target: fc8f1f0e7f41, rel: mitigates}
      - {target: 9a82b0efb1bd, rel: mitigates}
      - {target: ba8e375964c6, rel: mitigates}
    deprecated: false

  - number: ENV-D-004
    hash: 7a892f780299
    name: agent-provisioned-cluster
    type: design_pattern
    description: >
      The agent runs provision-cluster.sh which optionally creates a compute instance,
      bootstraps k3s, deploys all three container types, configures networking and ingress,
      and outputs the cluster endpoint. The script is version-controlled. Running it again
      produces an identical cluster. The developer's only manual action is providing the
      API key for remote provisioning (which should be revocable after the cluster is running).
    problem: |
      Manual infrastructure provisioning is undocumented, non-reproducible, and not auditable.
      Every manually provisioned server is a unique artifact with undocumented state.
    solution: |
      The agent runs scripts/provision-cluster.sh which: optionally creates a compute instance (or
      runs locally if already on the host), bootstraps k3s, deploys all three container types from
      their template images, configures networking and ingress, and outputs the cluster endpoint.
      The provisioning script is checked into version control. Running it again produces an
      identical cluster. The developer's only manual action is providing the API key (if
      provisioning a new host remotely).
    tradeoffs: |
      When provisioning a new remote host, the agent must have write access to the cloud account.
      This is a privileged operation and should be time-bounded: the API key used for provisioning
      should be revocable after the cluster is running.
    links:
      - {target: 61e2c56c8451, rel: refines}
      - {target: 0848dbeae670, rel: mitigates}
      - {target: d3ffe65751b3, rel: mitigates}
    deprecated: false

  - number: ENV-D-005
    hash: d832dee1f2b4
    name: remote-first-ide-attachment
    type: design_pattern
    description: >
      The developer's local IDE connects to the cloud host over SSH and mounts the host's
      filesystem as its workspace. Language server, linter, and formatter run on the host.
      Agent CLIs run on the host. The local device is a viewport (keyboard, mouse, display),
      not a development environment. VS Code Remote SSH, Cursor Remote SSH, and JetBrains
      Gateway are supported.
    problem: |
      Running a code editor or IDE locally against remote files introduces platform-specific
      behavior (line endings, symlinks, file watcher semantics) and bypasses the host's toolchain
      entirely.
    solution: |
      The developer's local IDE connects to the cloud host over SSH and mounts the host's
      filesystem as its workspace. The IDE runs its language server, linter, and formatter on the
      host, not on the local device. Agent CLIs (LLM tools) run on the host, not in a local
      terminal. The local device is a viewport — keyboard, mouse, and display — not a development
      environment.
    tradeoffs: |
      Requires the IDE to support remote development over SSH (most modern editors do). Network
      latency affects editor responsiveness; this is an argument for locating the host in the
      nearest cloud region, not an argument for local development.
    links:
      - {target: 7bbd3fbc842e, rel: mitigates}
      - {target: 992c3496d647, rel: mitigates}
      - {target: 7a506c81d384, rel: mitigates}
    deprecated: false

  - number: ENV-D-006
    hash: c30972e8b0d1
    name: orchestrator-driven-rolling-release
    type: design_pattern
    description: >
      The container orchestrator owns the entire release lifecycle. CI builds a new image,
      pushes it to the registry with an immutable digest, and patches the target Deployment
      or StatefulSet via a narrow-scoped service account. The orchestrator performs a rolling
      update with readiness probes. If any new pod fails its readiness probe before the
      rollout deadline, the orchestrator halts and CI triggers a rollback.
    problem: |
      Deploying a new version of any container must be zero-downtime, automatically verified
      against health checks, and automatically rolled back on failure.
    solution: |
      The container orchestrator owns the entire release lifecycle. CI builds a new image, pushes
      it to the registry, and receives an immutable digest. CI then patches the target Deployment
      or StatefulSet with that digest via a narrow-scoped service account. The orchestrator performs
      a rolling update: it starts a new pod, waits for its readiness probe to pass, then terminates
      an old pod. If any new pod fails its readiness probe before the rollout deadline, the
      orchestrator halts the rollout and CI triggers a rollback to the previous revision.
    tradeoffs: |
      Requires a running Kubernetes cluster and a kubeconfig for the CI service account. The
      rollout deadline must be tuned per container type.
    links:
      - {target: a377a12b736b, rel: mitigates}
      - {target: 1dd18f5de28f, rel: depends_on}
      - {target: 54e6a50363de, rel: depends_on}
      - {target: 23ca21b165ab, rel: depends_on}
    deprecated: false

  # ── Architectures ──

  - number: ENV-A-001
    hash: 15da78c2727e
    name: single-node-kubernetes-cluster
    type: architecture
    description: >
      Single cloud host running k3s with all three container types. Agent and developer work
      directly on the host OS over SSH. Topology is identical to multi-node production; only
      physical distribution differs. No redundancy — acceptable because all durable state is
      in version control and database volume backup. Appropriate for solo projects.
    diagram: |
      ┌─────────────────────────────────────────────────────────────────┐
      │  Cloud Host (Ubuntu 24.04 LTS)                                  │
      │                                                                 │
      │  Host OS — agent CLIs, build tools, git, gh, bun, tmux, docker │
      │  ← Agent/developer works here directly over SSH                 │
      │                                                                 │
      │  ┌─────────────────────────────────────────────────────────┐    │
      │  │  Container Orchestrator (k3s, single-node)              │    │
      │  │                                                         │    │
      │  │  ┌───────────────────────┐                              │    │
      │  │  │  Frontend Container   │  ← Serves tagged releases   │    │
      │  │  │  (minimal image)      │    K8s rolling update only   │    │
      │  │  │  Port: 443 / 80       │    No build tooling          │    │
      │  │  └───────────────────────┘                              │    │
      │  │                                                         │    │
      │  │  ┌───────────────────────┐                              │    │
      │  │  │  Worker Container     │  ← AI task daemon           │    │
      │  │  │  (minimal+bun+CLIs)   │    Reads task queue (RO)    │    │
      │  │  │  No shell             │    Writes via API only       │    │
      │  │  └───────────────────────┘                              │    │
      │  │                                                         │    │
      │  │  ┌───────────────────────┐                              │    │
      │  │  │  Database Container   │  ← Distroless, no shell     │    │
      │  │  │  (distroless image)   │    Volume-mounted data       │    │
      │  │  │  Internal network only│    Scheduled volume backup   │    │
      │  │  └───────────────────────┘                              │    │
      │  │                                                         │    │
      │  │  Internal network: containers communicate by service    │    │
      │  │  External exposure: frontend port only                  │    │
      │  └─────────────────────────────────────────────────────────┘    │
      └─────────────────────────────────────────────────────────────────┘

        Local Device (developer)
        ┌────────────────────┐
        │  IDE (SSH remote)  │──── SSH ──→  Cloud Host OS
        │  Browser           │──── HTTPS ─→ Frontend Container
        └────────────────────┘
    when_appropriate: |
      Single developer or single agent working on a project. Cost-minimal — one instance. The
      topology is identical to multi-node production; only the physical distribution differs.
    tradeoffs: |
      No redundancy — if the node fails, everything fails. Acceptable for a single-node deployment
      because all durable state is in version control and the database volume backup. Not
      appropriate once the application serves real end users.
    links:
      - {target: 4117a6c1f4d3, rel: refines}
      - {target: e5ca72d78ff8, rel: refines}
    deprecated: false

  - number: ENV-A-002
    hash: e5ca72d78ff8
    name: multi-node-kubernetes-cluster
    type: architecture
    description: >
      Multi-node cluster with replicated frontend tier, multiple worker deployments (one per
      worker type), and database primary plus replica. Each developer gets their own host.
      Appropriate when multiple agents work in parallel, the web tier handles real traffic,
      or the database requires read scaling or failover. Moving from single-node to multi-node
      is a scaling exercise, not a redesign.
    diagram: |
      ┌──────────────────────────────────────────────────────────────────┐
      │  Container Orchestrator (multi-node)                             │
      │                                                                  │
      │  ┌──────────────────┐   ┌──────────────────┐                     │
      │  │  Dev Host A      │   │  Dev Host B      │                     │
      │  │  (cloud host OS) │   │  (cloud host OS) │  ← Multiple agents  │
      │  │  SSH endpoint    │   │  SSH endpoint    │    one per host     │
      │  └──────────────────┘   └──────────────────┘                     │
      │                                                                  │
      │  ┌─────────────────────────────────────────┐                     │
      │  │  Frontend Tier (replicated)             │                     │
      │  │  ┌─────────────┐   ┌─────────────┐      │                     │
      │  │  │  Frontend   │   │  Frontend   │  ← Load-balanced          │
      │  │  │  Container  │   │  Container  │    release serving         │
      │  │  └─────────────┘   └─────────────┘      │                     │
      │  └─────────────────────────────────────────┘                     │
      │                                                                  │
      │  ┌─────────────────────────────────────────┐                     │
      │  │  Worker Tier (replicated per type)      │                     │
      │  │  ┌─────────────┐   ┌─────────────┐      │                     │
      │  │  │  Worker     │   │  Worker     │  ← One deployment         │
      │  │  │  (coding)   │   │  (analysis) │    per worker type         │
      │  │  └─────────────┘   └─────────────┘      │                     │
      │  └─────────────────────────────────────────┘                     │
      │                                                                  │
      │  ┌─────────────────────────────────────────┐                     │
      │  │  Database Node                          │                     │
      │  │  ┌─────────────────────────┐            │                     │
      │  │  │  Database Container     │            │  ← Primary + replica│
      │  │  │  Primary + Replica      │            │    Volume to tape   │
      │  │  └─────────────────────────┘            │                     │
      │  └─────────────────────────────────────────┘                     │
      └──────────────────────────────────────────────────────────────────┘
    when_appropriate: |
      Multiple agents working on the same project in parallel. Web tier must handle real traffic.
      Database requires a replica for read scaling or failover. Each developer gets their own host
      to eliminate toolchain interference.
    tradeoffs: |
      Higher cost. Requires networking between nodes. Database replication and consensus must be
      configured correctly. But these are production requirements, not engineering overhead — this
      architecture is what production looks like, so moving from Architecture A to Architecture B
      is a scaling exercise, not a redesign.
    links:
      - {target: 4117a6c1f4d3, rel: refines}
      - {target: 15da78c2727e, rel: refines}
    deprecated: false

