  # ── Antipatterns ──

  - number: ENV-X-001
    hash: 992c3496d647
    name: agent-running-locally
    type: antipattern
    description: >
      Agent running on the developer's local laptop. The agent inherits the local OS,
      filesystem, and toolchain. Every output may silently encode local assumptions.
      The agent belongs on the cloud host.
    links:
      - {target: 7bbd3fbc842e, rel: depends_on}
      - {target: f619dc6453a3, rel: contradicts}
    deprecated: false

  - number: ENV-X-002
    hash: 7a506c81d384
    name: ide-against-local-files
    type: antipattern
    description: >
      IDE running against local files. Local mode bypasses the host's toolchain. Files
      edited locally may have different line endings, symlink behavior, or import resolution.
      The IDE must connect to the cloud host via SSH remote.
    links:
      - {target: d832dee1f2b4, rel: contradicts}
      - {target: 7bbd3fbc842e, rel: depends_on}
    deprecated: false

  - number: ENV-X-003
    hash: 5cc4b57ba946
    name: frontend-with-build-tools
    type: antipattern
    description: >
      Frontend container with build tools installed (npm, bun install, tsc). Turns the
      frontend into a shadow development environment with no CI gate. Code built inside
      the frontend has not been tested.
    links:
      - {target: fc311abf938b, rel: depends_on}
      - {target: 9f19e91acc4f, rel: contradicts}
      - {target: 4b34ef4dc4d7, rel: contradicts}
    deprecated: false

  - number: ENV-X-004
    hash: 301a5d057b05
    name: agent-direct-database-access
    type: antipattern
    description: >
      Agents accessing the database container directly via shell, admin client, or root
      credential. Schema changes, data mutations, and configuration changes with no audit
      trail and no review gate. Agents interact with the database through the application's
      data layer only.
    links:
      - {target: 23a00d26214d, rel: depends_on}
      - {target: b3d25296b6b3, rel: contradicts}
    deprecated: false

  - number: ENV-X-005
    hash: b612fb97619b
    name: environment-specific-config-branches
    type: antipattern
    description: >
      Environment-specific configuration branches. Configuration files, environment variables,
      or code paths that behave differently in development versus production reintroduce the
      environment delta. There is one mode. Code that needs a flag to determine its environment
      does not know where it is running.
    links:
      - {target: 666f88d39137, rel: depends_on}
      - {target: d5d3aebb21fe, rel: contradicts}
    deprecated: false

  - number: ENV-X-006
    hash: d3ffe65751b3
    name: manual-cluster-provisioning
    type: antipattern
    description: >
      Manual cluster provisioning via cloud console, ad-hoc CLI commands, or written runbooks.
      Creates undocumented state. The next provisioning will produce a different result.
      Provisioning is code.
    links:
      - {target: 61e2c56c8451, rel: contradicts}
      - {target: 7a892f780299, rel: contradicts}
    deprecated: false

  - number: ENV-X-007
    hash: 6cca16f36d10
    name: serving-from-main-branch
    type: antipattern
    description: >
      Serving from the main branch. Configuring the frontend to pull and serve the latest
      commit eliminates the release gate entirely. The frontend serves tagged releases only.
    links:
      - {target: a377a12b736b, rel: depends_on}
      - {target: 743a3efd893b, rel: contradicts}
    deprecated: false

  - number: ENV-X-008
    hash: 33ab5e24de77
    name: skipping-pipeline-for-demo
    type: antipattern
    description: >
      Skipping the release pipeline for "just a demo." A demo is a production event. Code
      served at a demo that has not passed CI is code that might fail during the demo. The
      pipeline makes demos reliable.
    links:
      - {target: a377a12b736b, rel: depends_on}
      - {target: d5d3aebb21fe, rel: contradicts}
    deprecated: false

  - number: ENV-X-009
    hash: 9a82b0efb1bd
    name: tests-against-cluster-database
    type: antipattern
    description: >
      Tests running against the cluster database. Pointing tests at the cluster database
      eliminates the guarantee that test runs are non-destructive. Ephemeral test containers
      exist precisely so this choice never has to be made.
    links:
      - {target: 1f8b88715abb, rel: depends_on}
      - {target: b3216ae857c1, rel: contradicts}
      - {target: 0442588e8a04, rel: contradicts}
    deprecated: false

  - number: ENV-X-010
    hash: ba8e375964c6
    name: ephemeral-containers-not-torn-down
    type: antipattern
    description: >
      Ephemeral test containers not torn down on failure. A test runner that only tears down
      on success accumulates zombie containers, exhausting ports, disk, and memory. Teardown
      must happen in a finally block unconditionally.
    links:
      - {target: fc8f1f0e7f41, rel: depends_on}
      - {target: 0442588e8a04, rel: contradicts}
      - {target: 7add10d6242f, rel: contradicts}
    deprecated: false

  - number: ENV-X-011
    hash: f205bcd79559
    name: local-port-forwarding-as-frontend
    type: antipattern
    description: >
      Local port-forwarding as a substitute for the frontend container. Forwarding a local
      dev server port via SSH tunnel or ngrok is not a preview environment. It has no release
      gate, no deployment artifact, and no parity with the actual frontend container.
    links:
      - {target: 743a3efd893b, rel: contradicts}
      - {target: 5cc4b57ba946, rel: depends_on}
    deprecated: false
