meta:
  domain: IMPL-AUTH
  title: Auth - TypeScript Implementation
  implements: AUTH
  version: 1

rules:
  # ── Database ────────────────────────────────────────────────────────────────

  - number: IMPL-AUTH-001
    hash: 8d2485865d4c
    name: auth-data-in-graph-model
    type: implementation
    description: >
      All auth data (user, passkey_credential, agent, recovery_shard) lives in
      calypso_app as distinct entity types in the graph model with their own
      schemas and sensitivity settings.
    links:
      - {target: f45cd0927a41, rel: implements}  # AUTH-A-001 single-application-passkey-auth
    deprecated: false

  # ── Authentication ──────────────────────────────────────────────────────────

  - number: IMPL-AUTH-002
    hash: 76571bbcbb73
    name: passkey-webauthn-fido2
    type: implementation
    description: >
      Passkey-first authentication via WebAuthn (FIDO2). Server stores the
      public key and credential ID only; no password hash exists.
    links:
      - {target: 91782768755f, rel: implements}  # AUTH-D-001 passkey-authentication
      - {target: 24cd299b632f, rel: implements}  # AUTH-P-001 passkey-first-password-never
    deprecated: false

  - number: IMPL-AUTH-003
    hash: e96040a93578
    name: challenge-response-flow
    type: implementation
    description: >
      Server generates a random challenge, client signs with the passkey,
      server verifies the signature against the stored public key.
    links:
      - {target: 91782768755f, rel: implements}  # AUTH-D-001 passkey-authentication
    deprecated: false

  - number: IMPL-AUTH-004
    hash: 5061428da624
    name: bip39-recovery-shard
    type: implementation
    description: >
      Key recovery uses a BIP-39 mnemonic to encrypt a recovery shard stored
      server-side. Recovery requires the mnemonic plus a second factor
      (backup-code via Argon2id hash or hardware-key via credential ID lookup).
    links:
      - {target: 583a1a04f43b, rel: implements}  # AUTH-D-007 key-recovery-without-passwords
    deprecated: false

  # ── Token Management ────────────────────────────────────────────────────────

  - number: IMPL-AUTH-005
    hash: 2e0931895dda
    name: es256-web-crypto-signing
    type: implementation
    description: >
      Token signing uses ES256 (ECDSA P-256) via Web Crypto API
      (crypto.subtle.sign / crypto.subtle.verify). DIY ~50 lines; no JWT
      library dependency.
    links:
      - {target: 7a27eb77385c, rel: implements}  # AUTH-D-002 pinned-algorithm-token-verification
      - {target: 0ce2a38691c6, rel: implements}  # AUTH-P-009 algorithm-pinned-not-negotiated
    deprecated: false

  - number: IMPL-AUTH-006
    hash: ca5445ce447c
    name: algorithm-pinning-es256
    type: implementation
    description: >
      JWT header alg is verified to be ES256 before validation; any other
      value is rejected outright.
    links:
      - {target: 7a27eb77385c, rel: implements}  # AUTH-D-002 pinned-algorithm-token-verification
      - {target: 0ce2a38691c6, rel: implements}  # AUTH-P-009 algorithm-pinned-not-negotiated
    deprecated: false

  - number: IMPL-AUTH-007
    hash: 34849c43ce58
    name: token-httponly-cookie
    type: implementation
    description: >
      Tokens stored in HTTP-only, Secure, SameSite=Strict cookies. Never
      exposed in response bodies, URLs, or client-accessible storage.
    links:
      - {target: e6c8393de085, rel: implements}  # AUTH-D-008 http-only-session-cookies
      - {target: 98659756871c, rel: implements}  # AUTH-P-002 tokens-opaque-to-browsers
    deprecated: false

  - number: IMPL-AUTH-008
    hash: 22322c95731c
    name: token-expiry-1h-rotation
    type: implementation
    description: >
      Default token expiry is 1 hour. Refresh uses rotation: new token issued
      on each refresh, old token invalidated immediately.
    links:
      - {target: fb3677b0b045, rel: implements}  # AUTH-C-018 token-refresh-rotation
      - {target: b38917607d24, rel: implements}  # AUTH-P-005 auth-policy-enforced-through-deterministic-gates
    deprecated: false

  - number: IMPL-AUTH-009
    hash: 05234aac4486
    name: jti-revocation-table
    type: implementation
    description: >
      Every token carries a jti claim. Revocation list is a table in
      calypso_app queried on every authenticated request.
    links:
      - {target: 61846075d02a, rel: implements}  # AUTH-D-009 token-revocation-store
    deprecated: false

  - number: IMPL-AUTH-010
    hash: 6f891a5ce5d8
    name: revocation-cache-ttl-60s
    type: implementation
    description: >
      In-memory caching of revoked jti values is permitted with a TTL of 60
      seconds maximum for standard revocations (e.g., logout).
    links:
      - {target: 61846075d02a, rel: implements}  # AUTH-D-009 token-revocation-store
    deprecated: false

  - number: IMPL-AUTH-011
    hash: b5444b692b2c
    name: security-revocation-cache-bypass
    type: implementation
    description: >
      Security-critical revocations (account compromise, passkey change)
      bypass the in-memory cache; middleware performs a direct DB read on the
      next request after revocation.
    links:
      - {target: 61846075d02a, rel: implements}  # AUTH-D-009 token-revocation-store
    deprecated: false

  - number: IMPL-AUTH-012
    hash: af715f03fa7a
    name: revocation-entry-expiry-cleanup
    type: implementation
    description: >
      Revocation entries expire from the table after the token's own exp
      timestamp. Expired entries are cleaned up by a scheduled job.
    links:
      - {target: 61846075d02a, rel: implements}  # AUTH-D-009 token-revocation-store
    deprecated: false

  # ── Agent Authentication ────────────────────────────────────────────────────

  - number: IMPL-AUTH-013
    hash: 253e45c38287
    name: agent-scoped-tokens
    type: implementation
    description: >
      Agents receive scoped tokens with an explicit scopes claim
      (e.g., ['analytics:read', 'schema:read']).
    links:
      - {target: 47fb0e2f6869, rel: implements}  # AUTH-D-003 scoped-agent-tokens
      - {target: adff78a52d6d, rel: implements}  # AUTH-P-003 agent-credentials-scoped-and-short-lived
    deprecated: false

  - number: IMPL-AUTH-014
    hash: 8fa4ec40d830
    name: agent-max-ttl-24h
    type: implementation
    description: >
      Agent token maximum TTL is 24 hours; agents must re-authenticate daily.
    links:
      - {target: 47fb0e2f6869, rel: implements}  # AUTH-D-003 scoped-agent-tokens
      - {target: da787ad20e22, rel: implements}  # AUTH-C-010 agent-token-ttl-24h-max
    deprecated: false

  - number: IMPL-AUTH-015
    hash: fbad578a234d
    name: agent-dedicated-endpoint
    type: implementation
    description: >
      Agent tokens are issued by a dedicated endpoint, not the user login flow.
    links:
      - {target: 47fb0e2f6869, rel: implements}  # AUTH-D-003 scoped-agent-tokens
    deprecated: false

  - number: IMPL-AUTH-016
    hash: 9d01564c70c5
    name: agent-kms-scoped-keys
    type: implementation
    description: >
      Agents receive KMS-scoped keys that can only decrypt data within their
      authorized scope.
    links:
      - {target: 47fb0e2f6869, rel: implements}  # AUTH-D-003 scoped-agent-tokens
    deprecated: false

  # ── Session Management ──────────────────────────────────────────────────────

  - number: IMPL-AUTH-017
    hash: 97ef4a8e8779
    name: auth-middleware-single-function
    type: implementation
    description: >
      Single auth middleware function extracts the cookie, verifies the JWT
      (pinned algorithm + expiry + jti revocation check), and attaches the
      user or agent to the request context. Applied to all protected routes.
    links:
      - {target: ea0b6ab72f87, rel: implements}  # AUTH-C-007 auth-middleware-all-protected-routes
      - {target: b38917607d24, rel: implements}  # AUTH-P-005 auth-policy-enforced-through-deterministic-gates
    deprecated: false

  - number: IMPL-AUTH-018
    hash: daac182543ec
    name: rate-limiting-auth-endpoints
    type: implementation
    description: >
      Login and register endpoints are rate-limited (default 10 req/min per
      IP; production values require deliberate review). IP-based limiting
      degrades behind shared NAT.
    links:
      - {target: be4504ccae63, rel: implements}  # AUTH-C-014 rate-limiting-auth-endpoints
    deprecated: false

  - number: IMPL-AUTH-035
    hash: 44737d6d3feb
    name: per-username-rate-limiting
    type: implementation
    description: >
      Per-username rate limiting applied in addition to per-IP to mitigate
      shared-NAT blind spots in IP-only limiting.
    links:
      - {target: be4504ccae63, rel: implements}  # AUTH-C-014 rate-limiting-auth-endpoints
      - {target: e2110b5f1e53, rel: implements}  # AUTH-C-024 progressive-delays-lockout
    deprecated: false

  - number: IMPL-AUTH-036
    hash: 1696ed6e91ab
    name: progressive-delay-backoff
    type: implementation
    description: >
      Progressive delay (exponential backoff) used instead of hard cutoff for
      rate limiting on auth endpoints.
    links:
      - {target: e2110b5f1e53, rel: implements}  # AUTH-C-024 progressive-delays-lockout
    deprecated: false

  # ── Agent Scope Enforcement ─────────────────────────────────────────────────

  - number: IMPL-AUTH-019
    hash: d71b499d209f
    name: scope-enforcement-middleware
    type: implementation
    description: >
      Scope enforcement via requireScope middleware at route registration.
      Route handlers never contain scope logic; the check runs before the
      handler.
    links:
      - {target: 47fb0e2f6869, rel: implements}  # AUTH-D-003 scoped-agent-tokens
      - {target: 4a27dd2618ac, rel: implements}  # AUTH-C-009 agent-scope-validated-every-request
    deprecated: false

  - number: IMPL-AUTH-020
    hash: 2f13f0d00486
    name: missing-scope-is-misconfiguration
    type: implementation
    description: >
      A route without requireScope is a misconfiguration, not a valid open
      route. Intentionally unauthenticated routes use an explicit public()
      decorator.
    links:
      - {target: ea0b6ab72f87, rel: implements}  # AUTH-C-007 auth-middleware-all-protected-routes
      - {target: b38917607d24, rel: implements}  # AUTH-P-005 auth-policy-enforced-through-deterministic-gates
    deprecated: false

  # ── Package Structure ───────────────────────────────────────────────────────

  - number: IMPL-AUTH-021
    hash: f69076838bd4
    name: package-structure-auth
    type: implementation
    description: >
      Auth code split into packages/auth (passkey, jwt, agent-auth,
      middleware), apps/server/routes/auth.ts (endpoints), and packages/core/
      types (auth.ts, user.ts). Server-side auth primitives never resolve in
      browser bundles.
    links:
      - {target: f45cd0927a41, rel: implements}  # AUTH-A-001 single-application-passkey-auth
    deprecated: false

  # ── Core Interfaces ─────────────────────────────────────────────────────────

  - number: IMPL-AUTH-022
    hash: 0c49435a3db1
    name: passkey-credential-interface
    type: implementation
    description: >
      PasskeyCredential interface: credentialId (string), publicKey
      (Uint8Array), userId (string), createdAt (number). Stored server-side;
      no private key material.
    links:
      - {target: 91782768755f, rel: implements}  # AUTH-D-001 passkey-authentication
    deprecated: false

  - number: IMPL-AUTH-023
    hash: d1f5508ffea5
    name: token-payload-interface
    type: implementation
    description: >
      TokenPayload interface: sub, jti, scopes (string[]), exp, iat, kind
      ('user' | 'agent'). Unified format for both user and agent tokens.
    links:
      - {target: 7a27eb77385c, rel: implements}  # AUTH-D-002 pinned-algorithm-token-verification
      - {target: 47fb0e2f6869, rel: implements}  # AUTH-D-003 scoped-agent-tokens
    deprecated: false

  - number: IMPL-AUTH-024
    hash: 113462bd6496
    name: recovery-shard-interface
    type: implementation
    description: >
      RecoveryShard interface: userId, encryptedShard (AES-256-GCM via HKDF
      from BIP-39 mnemonic), secondFactorKind ('backup-code' | 'hardware-key'),
      secondFactorVerifier (Argon2id hash or SHA-256 of credential ID).
    links:
      - {target: 583a1a04f43b, rel: implements}  # AUTH-D-007 key-recovery-without-passwords
    deprecated: false

  # ── Dependency Decisions ────────────────────────────────────────────────────

  - number: IMPL-AUTH-025
    hash: dcc64ce58ff5
    name: dep-simplewebauthn-server
    type: implementation
    description: >
      Buy @simplewebauthn/server for FIDO2 protocol handling. Security-critical,
      full FIDO2 conformance, no native dependencies, actively maintained.
    links:
      - {target: 91782768755f, rel: implements}  # AUTH-D-001 passkey-authentication
    deprecated: false

  - number: IMPL-AUTH-026
    hash: 52b1e055f093
    name: dep-jwt-diy-web-crypto
    type: implementation
    description: >
      DIY JWT sign/verify (~50 lines) using Web Crypto crypto.subtle.sign
      with ECDSA. No JWT library dependency.
    links:
      - {target: 7a27eb77385c, rel: implements}  # AUTH-D-002 pinned-algorithm-token-verification
    deprecated: false

  - number: IMPL-AUTH-027
    hash: a083530d398a
    name: dep-scure-bip39
    type: implementation
    description: >
      Buy @scure/bip39 for BIP-39 mnemonic generation. Standardized 2048-word
      list, well-specified entropy encoding, audited implementation.
    links:
      - {target: 583a1a04f43b, rel: implements}  # AUTH-D-007 key-recovery-without-passwords
    deprecated: false

  - number: IMPL-AUTH-028
    hash: a7c8013d66b2
    name: dep-no-auth-saas
    type: implementation
    description: >
      Do not buy Auth SaaS (Auth0, Clerk) unless mandated. Adds latency,
      cost, and vendor lock-in to the critical login path.
    links:
      - {target: 701fb5c194b8, rel: implements}  # AUTH-P-008 authentication-is-self-hosted
    deprecated: false

  - number: IMPL-AUTH-029
    hash: 4cea66a8d0cd
    name: dep-rate-limit-diy
    type: implementation
    description: >
      DIY rate limiting via simple token bucket (~30 lines). No library
      dependency.
    links:
      - {target: be4504ccae63, rel: implements}  # AUTH-C-014 rate-limiting-auth-endpoints
    deprecated: false

  # ── Antipatterns (TypeScript/Web-Specific) ──────────────────────────────────

  - number: IMPL-AUTH-030
    hash: ef8ab7fb2827
    name: anti-tokens-in-localstorage
    type: implementation
    description: >
      Never store tokens in localStorage. Every script on the page (including
      XSS payloads) can read localStorage. HTTP-only cookies are invisible to
      JavaScript by browser specification.
    links:
      - {target: 917f546b2ccc, rel: implements}  # AUTH-X-005 tokens-in-localstorage
      - {target: 98659756871c, rel: implements}  # AUTH-P-002 tokens-opaque-to-browsers
    deprecated: false

  - number: IMPL-AUTH-031
    hash: 5b9457c95e7c
    name: anti-auth-saas-default
    type: implementation
    description: >
      Do not default to Auth SaaS. Standard passkey + JWT flow is ~300 lines
      with Web Crypto. SaaS charges per user, adds external dependency to the
      login path, and moves debugging to a third-party dashboard.
    links:
      - {target: 178dc0b4cde5, rel: implements}  # AUTH-X-004 auth-saas-sole-login-path
      - {target: 701fb5c194b8, rel: implements}  # AUTH-P-008 authentication-is-self-hosted
    deprecated: false

  - number: IMPL-AUTH-032
    hash: 58778ebd1324
    name: anti-auth-imports-in-browser
    type: implementation
    description: >
      Never import server-side auth modules in browser code. Even type-only
      imports create import paths that lead to runtime auth calls client-side.
    links:
      - {target: fe40f06bf5c2, rel: implements}  # AUTH-P-004 credential-domains-stay-separate
    deprecated: false

  - number: IMPL-AUTH-033
    hash: 9132f5980919
    name: anti-symmetric-signing-hs256
    type: implementation
    description: >
      Never use symmetric signing (HS256) for production tokens. HMAC requires
      sharing the secret with every verifier. ES256 asymmetric signing keeps
      the private key with the issuer only.
    links:
      - {target: 1b840588d7ed, rel: implements}  # AUTH-X-002 algorithm-negotiation-in-verification
      - {target: 0ce2a38691c6, rel: implements}  # AUTH-P-009 algorithm-pinned-not-negotiated
    deprecated: false

  - number: IMPL-AUTH-034
    hash: 50b3a9cc7b80
    name: anti-in-memory-only-revocation
    type: implementation
    description: >
      Never use in-memory-only revocation. An in-memory Set is not durable
      across restarts and not shared across processes. The revocation table in
      calypso_app is the source of truth; in-memory caching is a read
      optimization, not a replacement.
    links:
      - {target: 4e13f71c51cd, rel: implements}  # AUTH-X-009 in-memory-revocation-multi-process
      - {target: 61846075d02a, rel: implements}  # AUTH-D-009 token-revocation-store
    deprecated: false
