meta:
  domain: IMPL-DATA
  title: Data - TypeScript Implementation
  implements: DATA
  version: 1

rules:
  # ── Database ──────────────────────────────────────────────────────────────

  - number: IMPL-DATA-001
    hash: 75f68e7dbbaf
    name: postgresql-from-first-commit
    type: implementation
    description: >
      PostgreSQL is the database from the first commit. Three core tables in
      calypso_app provide a flexible property graph model.
    links:
      - {target: 2148c73bfc28, rel: implements}  # DATA-P-004 postgresql-with-graph-patterns
      - {target: 38d305fb7362, rel: implements}  # DATA-C-001 three-databases-provisioned
    deprecated: false

  - number: IMPL-DATA-002
    hash: e9d07a228285
    name: three-table-property-graph
    type: implementation
    description: >
      Three tables: entities (id, type, properties JSONB, tenant_id, version),
      relations (id, source_id, target_id, type, properties JSONB), and
      entity_types (type PK, schema JSONB, sensitive text[], kms_key_id).
    links:
      - {target: ad20dbdec789, rel: implements}  # DATA-D-002 property-graph-on-postgresql
      - {target: 90cf3db02e62, rel: implements}  # DATA-C-003 property-graph-tables-initialized
    deprecated: false

  - number: IMPL-DATA-003
    hash: 501960c7fd06
    name: roles-and-privileges
    type: implementation
    description: >
      Three database roles: app_rw (read/write on calypso_app), analytics_w
      (INSERT only on calypso_analytics), audit_w (INSERT only on
      calypso_audit). No role crosses database boundaries.
    links:
      - {target: 127078d82e9d, rel: implements}  # DATA-C-002 three-roles-created
      - {target: e58dde384025, rel: implements}  # DATA-A-001 three-database-single-instance
    deprecated: false

  - number: IMPL-DATA-004
    hash: 1055e3a18344
    name: three-connection-pools
    type: implementation
    description: >
      The application server holds three separate connection pools: app_rw for
      the transactional graph, analytics_w for the analytics tier, audit_w for
      the append-only audit log.
    links:
      - {target: e58dde384025, rel: implements}  # DATA-A-001 three-database-single-instance
      - {target: d7eca61da7e1, rel: implements}  # DATA-P-001 separate-analytics-from-transactional
    deprecated: false

  - number: IMPL-DATA-005
    hash: 822fb0870489
    name: dev-environment-docker-compose
    type: implementation
    description: >
      Docker Compose starts PostgreSQL (distroless image). An init.sql script
      creates the three databases and three roles on first container start.
      Secrets passed as environment variables via Docker Compose.
    links:
      - {target: 6452802894f9, rel: implements}  # DATA-C-004 local-dev-containerized
    deprecated: false

  - number: IMPL-DATA-006
    hash: f4be78eb3a2d
    name: initial-migration
    type: implementation
    description: >
      Core graph tables established in 0001_initial_graph.sql. The flexible
      JSONB schema means business evolution rarely requires further DDL
      migrations.
    links:
      - {target: f87c3c6aa92e, rel: implements}  # DATA-C-013 core-migration-applied
      - {target: ad20dbdec789, rel: implements}  # DATA-D-002 property-graph-on-postgresql
    deprecated: false

  - number: IMPL-DATA-007
    hash: c76b41a20010
    name: schema-evolution-via-registry
    type: implementation
    description: >
      Adding a new entity type is INSERT INTO entity_types. Adding a property
      is UPDATE entity_types SET schema. Registry changes are audited and
      revertible. No DDL migrations for business model changes.
    links:
      - {target: 522c78fa3ceb, rel: implements}  # DATA-D-003 type-registry-validation
      - {target: c1a58c5b6248, rel: implements}  # DATA-P-003 schema-as-data
    deprecated: false

  - number: IMPL-DATA-008
    hash: 0a465dda1ce7
    name: application-layer-validation
    type: implementation
    description: >
      Validation performed in the application layer against the JSON Schema in
      the entity_types registry before SQL execution.
    links:
      - {target: 522c78fa3ceb, rel: implements}  # DATA-D-003 type-registry-validation
    deprecated: false

  - number: IMPL-DATA-009
    hash: 4536892cd5bd
    name: parameterized-sql-no-orm
    type: implementation
    description: >
      Parameterized SQL via the postgres client tagged template literal API
      (sql`SELECT ... WHERE id = ${id}`). No ORM. No string concatenation in
      query construction.
    links:
      - {target: 03eb3c217c19, rel: implements}  # DATA-C-005 parameterized-queries-only
    deprecated: false

  # ── Encryption ────────────────────────────────────────────────────────────

  - number: IMPL-DATA-010
    hash: 818f1c5e0cdc
    name: aes-256-gcm-web-crypto
    type: implementation
    description: >
      Application-layer field encryption uses AES-256-GCM via the Web Crypto
      API (crypto.subtle).
    links:
      - {target: 8b531a730c7d, rel: implements}  # DATA-D-001 encrypt-before-insert
      - {target: d3654bc07931, rel: implements}  # DATA-C-006 application-layer-encryption-active
    deprecated: false

  - number: IMPL-DATA-011
    hash: 3a93734bb830
    name: key-per-type-from-registry
    type: implementation
    description: >
      The entity_types registry declares which properties are sensitive and
      which kms_key_id protects them. One key compromise exposes only one
      entity type.
    links:
      - {target: 60ed722d31f6, rel: implements}  # DATA-D-005 key-per-type-encryption
    deprecated: false

  - number: IMPL-DATA-012
    hash: b9b828a09b3b
    name: field-encryptor-intercept
    type: implementation
    description: >
      The FieldEncryptor intercepts writes, checks the registry, and encrypts
      sensitive keys within the JSONB property blob before storage. Decryption
      occurs after read.
    links:
      - {target: 8b531a730c7d, rel: implements}  # DATA-D-001 encrypt-before-insert
      - {target: 60ed722d31f6, rel: implements}  # DATA-D-005 key-per-type-encryption
    deprecated: false

  - number: IMPL-DATA-013
    hash: a1136c8cac96
    name: ciphertext-envelope-format
    type: implementation
    description: >
      Encrypted fields store base64url(keyVersion 4B || iv 12B || ciphertext +
      auth tag n+16B). keyVersion enables rotation without cutover. IV is
      random per call via crypto.getRandomValues. Auth tag is 16 bytes
      appended by Web Crypto.
    links:
      - {target: 8b531a730c7d, rel: implements}  # DATA-D-001 encrypt-before-insert
      - {target: 60ed722d31f6, rel: implements}  # DATA-D-005 key-per-type-encryption
    deprecated: false

  - number: IMPL-DATA-014
    hash: 3e30198d7a50
    name: key-rotation-background-job
    type: implementation
    description: >
      KMS issues a new key version. New writes use the new version immediately.
      A background job re-encrypts old rows by parsing keyVersion from the
      envelope, decrypting with the old key, re-encrypting with the new key.
      Old key retained read-only until zero rows remain. No downtime, no
      single large transaction.
    links:
      - {target: 6539ad97bbcb, rel: implements}  # DATA-C-016 key-rotation-tested
      - {target: d27ba8a19e8a, rel: implements}  # DATA-C-024 automated-key-rotation
    deprecated: false

  # ── Analytics Tier ────────────────────────────────────────────────────────

  - number: IMPL-DATA-015
    hash: 17aa564b808c
    name: analytics-write-only-role
    type: implementation
    description: >
      Events written to calypso_analytics via analytics_w role. This role has
      no read path back to calypso_app.
    links:
      - {target: f8dc70f7a4ff, rel: implements}  # DATA-D-006 aggregation-tier-separation
      - {target: 5e9dfa261da1, rel: implements}  # DATA-C-010 analytics-store-separated (via D-006 link)
    deprecated: false

  - number: IMPL-DATA-016
    hash: 6fc566676e7a
    name: session-pseudonym-attribution
    type: implementation
    description: >
      Events attributed to a rotating session pseudonym, not a user ID.
    links:
      - {target: 41bebcc94544, rel: implements}  # DATA-D-007 session-pseudonymization
      - {target: 5e9dfa261da1, rel: implements}  # DATA-C-011 analytics-pseudonymized (via hash)
    deprecated: false

  - number: IMPL-DATA-017
    hash: 13d22e0b28b3
    name: pseudonym-mapping-not-exported
    type: implementation
    description: >
      The mapping between session pseudonym and user identity exists only in
      calypso_app and is never exported to the analytics store.
    links:
      - {target: 41bebcc94544, rel: implements}  # DATA-D-007 session-pseudonymization
    deprecated: false

  - number: IMPL-DATA-018
    hash: dd7326ac05cd
    name: differential-privacy-laplace
    type: implementation
    description: >
      Laplace noise applied on all aggregation exports. Privacy budget
      (epsilon) tracked per dataset in calypso_app. The analytics export layer
      checks and decrements atomically before executing the query. Budget
      exhaustion returns a structured error, does not silently reduce noise.
    links:
      - {target: eb6fb098108a, rel: implements}  # DATA-D-008 differential-privacy-on-export
      - {target: b79051bf62a8, rel: implements}  # DATA-C-015 differential-privacy-active
    deprecated: false

  - number: IMPL-DATA-019
    hash: 74e14c5d94be
    name: analytics-event-hmac-signature
    type: implementation
    description: >
      Events signed using a session-derived HMAC key
      (HKDF(salt=serverHmacSecret, ikm=jti, info="analytics-signing",
      length=32)). Validated server-side before storage.
    links:
      - {target: b6e2c422c2db, rel: implements}  # DATA-D-009 signed-analytics-at-edge
    deprecated: false

  - number: IMPL-DATA-020
    hash: 3109a51b976c
    name: idempotent-analytics-writes
    type: implementation
    description: >
      Analytics store uses INSERT ... ON CONFLICT (event_id) DO NOTHING for
      idempotent writes. The event pipeline is at-least-once; duplicates are
      discarded at the store.
    links:
      - {target: f8dc70f7a4ff, rel: implements}  # DATA-D-006 aggregation-tier-separation
    deprecated: false

  # ── Audit Logging ─────────────────────────────────────────────────────────

  - number: IMPL-DATA-021
    hash: 83aa9ceffb97
    name: audit-log-before-access
    type: implementation
    description: >
      Every sensitive data access logged before the access executes. If the
      audit write fails, the data read is denied.
    links:
      - {target: 44465342d178, rel: implements}  # DATA-D-010 audit-log-first
      - {target: c9d640683d0c, rel: implements}  # DATA-P-008 audit-precedes-access
      - {target: 601e0d14ee88, rel: implements}  # DATA-C-009 audit-log-first-ordering
    deprecated: false

  - number: IMPL-DATA-022
    hash: 5d6c4f0edee8
    name: audit-insert-only-role
    type: implementation
    description: >
      Written via audit_w role: INSERT-only, no UPDATE, no DELETE, no
      TRUNCATE.
    links:
      - {target: 44465342d178, rel: implements}  # DATA-D-010 audit-log-first
      - {target: 83c607c6aff9, rel: implements}  # DATA-C-022 audit-log-tamper-resistance
    deprecated: false

  - number: IMPL-DATA-023
    hash: 50cdede0d6ff
    name: audit-separate-encryption-key
    type: implementation
    description: >
      Audit log uses a separate encryption key from the data it audits.
    links:
      - {target: 44465342d178, rel: implements}  # DATA-D-010 audit-log-first
      - {target: c9d640683d0c, rel: implements}  # DATA-P-008 audit-precedes-access
    deprecated: false

  - number: IMPL-DATA-024
    hash: d82ed22aed67
    name: audit-writer-credential-isolation
    type: implementation
    description: >
      audit_w credentials are held only by the audit writer module. No other
      code path in the application can obtain them.
    links:
      - {target: 44465342d178, rel: implements}  # DATA-D-010 audit-log-first
    deprecated: false

  - number: IMPL-DATA-025
    hash: a9f2bc15c9d5
    name: audit-entry-fields
    type: implementation
    description: >
      Log entries include: action, actorId, actorKind, resourceType,
      resourceId, timestamp, result.
    links:
      - {target: 44465342d178, rel: implements}  # DATA-D-010 audit-log-first
      - {target: a49a8c360813, rel: implements}  # DATA-C-008 audit-logging-operational
    deprecated: false

  - number: IMPL-DATA-026
    hash: 7b8bd8550fe0
    name: audit-backup-independent
    type: implementation
    description: >
      Audit log backed up independently from calypso_app. A backup of
      calypso_app must never include the audit log (separate databases). Audit
      log replication to append-only cold storage is required.
    links:
      - {target: 11386dd10236, rel: implements}  # DATA-C-025 immutable-audit-cold-storage
      - {target: c9d640683d0c, rel: implements}  # DATA-P-008 audit-precedes-access
    deprecated: false

  # ── Package Structure ─────────────────────────────────────────────────────

  - number: IMPL-DATA-027
    hash: 5d564d95bf8c
    name: package-structure
    type: implementation
    description: >
      packages/data contains db (three connection pools, migration runner),
      crypto (AES-GCM, HKDF), kms (client abstraction), analytics (event
      writer, pseudonymization, DP), audit (append-only writer). apps/server
      contains migrations/ and db.ts. infra contains docker-compose.yml and
      init.sql. packages/core/types/data.ts holds record and event types.
    links:
      - {target: e58dde384025, rel: implements}  # DATA-A-001 three-database-single-instance
    deprecated: false

  # ── Core Interfaces ───────────────────────────────────────────────────────

  - number: IMPL-DATA-028
    hash: 7caec671a71f
    name: kms-client-interface
    type: implementation
    description: >
      KMSClient interface with encrypt(plaintext, keyId), decrypt(ciphertext,
      keyId), and rotateKey(keyId) methods. Reads encryption keys from
      environment variables injected by scoped k8s Secrets.
    links:
      - {target: ed6163ae0eaf, rel: implements}  # DATA-P-007 keys-separate-from-data
      - {target: e1be2f2f1847, rel: implements}  # DATA-C-007 kms-integrated-no-config-keys
    deprecated: false

  - number: IMPL-DATA-029
    hash: 09c30b49a0fc
    name: field-encryptor-interface
    type: implementation
    description: >
      FieldEncryptor interface with encryptField(value, table) and
      decryptField(ciphertext, table). Generates fresh random IV, fetches
      current key version from KMS. Supports both current-key and old-key
      ciphertext for rotation.
    links:
      - {target: 8b531a730c7d, rel: implements}  # DATA-D-001 encrypt-before-insert
      - {target: 60ed722d31f6, rel: implements}  # DATA-D-005 key-per-type-encryption
    deprecated: false

  - number: IMPL-DATA-030
    hash: 181eecf62da6
    name: analytics-event-interface
    type: implementation
    description: >
      AnalyticsEvent interface with type, payload, sessionPseudonym (rotating,
      never a user ID), eventId (UUIDv4 for idempotent inserts), timestamp,
      and signature (HMAC-SHA256 with session-derived key via HKDF).
    links:
      - {target: f8dc70f7a4ff, rel: implements}  # DATA-D-006 aggregation-tier-separation
      - {target: 41bebcc94544, rel: implements}  # DATA-D-007 session-pseudonymization
      - {target: b6e2c422c2db, rel: implements}  # DATA-D-009 signed-analytics-at-edge
    deprecated: false

  - number: IMPL-DATA-031
    hash: b8f756c818e0
    name: audit-entry-interface
    type: implementation
    description: >
      AuditEntry interface with action, actorId, actorKind (user | agent |
      system), entityType, entityId, timestamp, and result (allowed | denied).
    links:
      - {target: 44465342d178, rel: implements}  # DATA-D-010 audit-log-first
      - {target: a49a8c360813, rel: implements}  # DATA-C-008 audit-logging-operational
    deprecated: false

  - number: IMPL-DATA-032
    hash: e4c3a2823528
    name: typed-query-function-pattern
    type: implementation
    description: >
      QueryFn<TParams, TResult> type alias for typed parameterized query
      functions returning Promise<TResult[]>.
    links:
      - {target: 03eb3c217c19, rel: implements}  # DATA-C-005 parameterized-queries-only
    deprecated: false

  # ── Dependency Decisions ──────────────────────────────────────────────────

  - number: IMPL-DATA-033
    hash: 6494681ddf36
    name: postgres-npm-client
    type: implementation
    description: >
      Use the postgres npm package. Tagged template literal API produces
      parameterized queries by default, making string-concatenation injection
      structurally difficult. Buy decision.
    links:
      - {target: 03eb3c217c19, rel: implements}  # DATA-C-005 parameterized-queries-only
    deprecated: false

  - number: IMPL-DATA-034
    hash: c746512fba5b
    name: web-crypto-aes-hkdf
    type: implementation
    description: >
      AES-256-GCM encryption and HKDF key derivation implemented via the Web
      Crypto API (crypto.subtle). No external crypto library. DIY decision.
    links:
      - {target: 8b531a730c7d, rel: implements}  # DATA-D-001 encrypt-before-insert
      - {target: 3be027de3daf, rel: implements}  # DATA-P-002 layered-encryption
    deprecated: false

  - number: IMPL-DATA-035
    hash: 374ff7089310
    name: no-orm
    type: implementation
    description: >
      No ORM (Prisma, TypeORM, Drizzle). Adds schema file, generation step,
      runtime abstraction. Agents write SQL directly. Do-not-buy decision.
    links:
      - {target: 03eb3c217c19, rel: implements}  # DATA-C-005 parameterized-queries-only
    deprecated: false

  - number: IMPL-DATA-036
    hash: 394bd485115d
    name: dp-diy-implementation
    type: implementation
    description: >
      Laplace noise addition is ~20 lines DIY. Privacy budget tracking
      (epsilon accounting per dataset, atomic decrement, exhaustion
      enforcement) is ~100 lines of DB-backed state in calypso_app. Not a
      library concern.
    links:
      - {target: eb6fb098108a, rel: implements}  # DATA-D-008 differential-privacy-on-export
    deprecated: false

  - number: IMPL-DATA-037
    hash: 4c4d344f30f8
    name: kms-sdk-buy-when-needed
    type: implementation
    description: >
      KMS SDK not needed — k3s encrypts Secrets at rest via
      EncryptionConfiguration; application reads secrets from environment
      variables injected by k8s.
    links:
      - {target: ed6163ae0eaf, rel: implements}  # DATA-P-007 keys-separate-from-data
    deprecated: false

  - number: IMPL-DATA-038
    hash: 81e770a58adb
    name: no-bun-sqlite
    type: implementation
    description: >
      bun:sqlite is no longer used. Do-not-use decision.
    links:
      - {target: 2148c73bfc28, rel: implements}  # DATA-P-004 postgresql-with-graph-patterns
    deprecated: false

  # ── Antipatterns (TypeScript/PostgreSQL-Specific) ─────────────────────────

  - number: IMPL-DATA-039
    hash: f1137722ff22
    name: antipattern-orm-safety-blanket
    type: implementation
    description: >
      Do not use an ORM as a safety blanket. Parameterized queries via the
      postgres client tagged template syntax enforce parameterization at the
      call site. The ORM adds a generation step and runtime abstraction.
    links:
      - {target: 03eb3c217c19, rel: implements}  # DATA-C-005 parameterized-queries-only
    deprecated: false

  - number: IMPL-DATA-040
    hash: 18bf2e97b06f
    name: antipattern-shared-db-browser
    type: implementation
    description: >
      Do not import a DB utility into the browser bundle for types. Creates an
      import path to runtime database calls that bundlers may not tree-shake.
    links:
      - {target: f8dc70f7a4ff, rel: implements}  # DATA-D-006 aggregation-tier-separation
    deprecated: false

  - number: IMPL-DATA-041
    hash: 6d0d9795328d
    name: antipattern-logging-decrypted
    type: implementation
    description: >
      Do not log decrypted objects in error handlers. catch(e) { log(user) }
      dumps decrypted PII. Log IDs and error codes only.
    links:
      - {target: ca5f8232e396, rel: implements}  # DATA-D-012 pii-scrubbing-log-pipeline
      - {target: 845a26aaeb89, rel: implements}  # DATA-X-008 pii-in-error-logs
    deprecated: false

  - number: IMPL-DATA-042
    hash: 9757431cf040
    name: antipattern-env-var-keys
    type: implementation
    description: >
      Encryption keys must only exist inside the containers that need them,
      injected via scoped k8s Secrets. The ENCRYPTION_MASTER_KEY is mounted
      only on database pods — never on API or worker pods.
    links:
      - {target: ed6163ae0eaf, rel: implements}  # DATA-P-007 keys-separate-from-data
      - {target: 3f2840ae0508, rel: implements}  # DATA-X-006 keys-alongside-data
    deprecated: false

  - number: IMPL-DATA-043
    hash: 61fddb5e36cc
    name: antipattern-single-role-app-audit
    type: implementation
    description: >
      Do not use a single database role for app and audit. If app_rw can write
      to the audit table, a compromised application can cover its tracks. The
      audit_w role exists to prevent this.
    links:
      - {target: 44465342d178, rel: implements}  # DATA-D-010 audit-log-first
      - {target: 127078d82e9d, rel: implements}  # DATA-C-002 three-roles-created
    deprecated: false

  - number: IMPL-DATA-044
    hash: 75374235f658
    name: antipattern-analytics-same-db
    type: implementation
    description: >
      Do not put analytics and transactional tables in the same database. Even
      in separate schemas, a single compromised role or missing REVOKE can
      bridge the boundary. Separation is enforced at the database level.
    links:
      - {target: d7eca61da7e1, rel: implements}  # DATA-P-001 separate-analytics-from-transactional
      - {target: f2c4aa2f6dee, rel: implements}  # DATA-X-003 analytics-on-transactional-store
    deprecated: false

  - number: IMPL-DATA-045
    hash: 1ae6562a8ad6
    name: antipattern-static-iv
    type: implementation
    description: >
      Do not use a static or deterministic IV with AES-GCM. Always generate
      crypto.getRandomValues(new Uint8Array(12)) per encryption call. A
      reused IV breaks GCM authentication entirely.
    links:
      - {target: 8b531a730c7d, rel: implements}  # DATA-D-001 encrypt-before-insert
    deprecated: false

  - number: IMPL-DATA-046
    hash: 3e058f79586d
    name: antipattern-no-key-version
    type: implementation
    description: >
      Do not store raw ciphertext without a key version. Without keyVersion
      in the envelope, rotation requires a full table re-encryption cutover.
      The keyVersion prefix makes rotation a background migration.
    links:
      - {target: 60ed722d31f6, rel: implements}  # DATA-D-005 key-per-type-encryption
      - {target: 6539ad97bbcb, rel: implements}  # DATA-C-016 key-rotation-tested
    deprecated: false
