version: 1
name: calypso-orchestrator-startup
initial_state: scan-work-queue
schedule:
  cron: "0 */5 * * * *"
  description: Poll for pending work every 5 minutes.

states:
  scan-work-queue:
    kind: agent
    role: orchestrator
    cost: cheap
    description: Evaluate all active work and select the highest-priority task to dispatch next.
    prompt: |
      Scan pending work in priority order: (1) planning — unspecified features or incomplete specs, (2) merge — implementation-complete branches waiting to land, (3) development — active or unstarted feature branches. Report the full queue, select the highest-priority item, declare its category.
    completion:
      any_of:
        - planning-task-identified
        - merge-task-identified
        - development-task-identified
        - no-pending-tasks
    next:
      on:
        planning-task-identified: dispatch-planning
        merge-task-identified: dispatch-merge
        development-task-identified: assign-phase-issues
        no-pending-tasks: idle

  dispatch-planning:
    kind: workflow
    workflow: calypso-planning
    description: >
      Run the full planning workflow — fetch open issues, reconcile the plan, reprioritize,
      validate, and commit — starting from fetch-open-issues.
    next:
      on:
        done: scan-work-queue
        aborted: blocked

  dispatch-merge:
    kind: workflow
    workflow: calypso-pr-review-merge
    description: >
      Run the full PR review and merge workflow — check feature completeness, CI, dependencies,
      approval, queue position, and execute merge — starting from check-feature-completeness.
    next:
      on:
        done: scan-work-queue
        aborted: blocked

  assign-phase-issues:
    kind: agent
    role: orchestrator
    cost: cheap
    description: >
      Read docs/plan.md to identify the current active phase, then assign each
      unstarted issue in that phase to a worker.
    prompt: |
      Read docs/plan.md. Find the earliest phase with open, unstarted issues. Assign one issue per available worker via `gh issue edit --add-assignee`, respecting dependency order (no issue assigned before its dependencies merge). One worker available → assign single highest-priority issue.
    completion:
      all_of:
        - active-phase-identified
        - phase-issues-assigned-to-workers
    next:
      on_success: dispatch-development
      on_failure: blocked

  dispatch-development:
    kind: workflow
    workflow: calypso-default-feature-workflow
    description: >
      Run the feature development workflow — create or verify the worktree, then
      progress through documentation, stubs, TDD, implementation, and save —
      starting from create-worktree.
    next:
      on:
        done: scan-work-queue
        aborted: blocked

  idle:
    kind: human
    role: operator
    description: No pending work was found. Waiting for new tasks or an external trigger.
    prompt: |
      No pending work. Wait for a new feature to be queued or an external trigger.
    next:
      on:
        new-task-queued: scan-work-queue
        shutdown-requested: done

  blocked:
    kind: human
    role: operator-or-orchestrator
    description: A dispatch encountered a blocking condition that requires human resolution.
    prompt: |
      A task dispatch hit a blocking condition. Resolve or redirect to a different task.
    next:
      on:
        issue-cleared: scan-work-queue
        abort: done

  done:
    kind: terminal

checks:
  planning-task-identified:
    kind: agent
    role: orchestrator
  merge-task-identified:
    kind: agent
    role: orchestrator
  development-task-identified:
    kind: agent
    role: orchestrator
  no-pending-tasks:
    kind: agent
    role: orchestrator
  active-phase-identified:
    kind: agent
    role: orchestrator
    description: The current active phase in docs/plan.md has been identified — the earliest phase with open, unstarted issues.
  phase-issues-assigned-to-workers:
    kind: agent
    role: orchestrator
    description: Each unstarted issue in the active phase has been assigned to a worker, respecting dependency order.

agent_prompts:
  orchestrator: |
    Scan for pending work across all active features. Dispatch in priority order: planning first, merging second, development third. Maintain process health.
  planner: |
    Refine the project plan. Ensure features are well-specified with current GitHub issues before engineering begins.
  merge-queue: |
    Manage the merge queue. Determine landing order, verify all gates, execute merges for queue-head features.
  engineer: |
    Execute development tasks. Start or resume feature branches from their current state. Leave each feature committed and pushed.
