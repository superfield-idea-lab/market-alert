name: Release v3

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format:check
      - name: Build verification
        run: bun run build

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Run unit tests
        run: bun --bun vitest run tests/unit apps/*/tests/unit

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Run API integration tests
        run: bun run test:api

  component-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run component tests
        run: bun --bun vitest run --config apps/web/vitest.browser.config.ts

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: bun --bun vitest run --config tests/e2e/vitest.config.ts

  build-frontend:
    needs: [quality, unit-tests, api-tests, component-tests, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts
      - name: Build frontend bundle
        run: cd apps/web && bun --bun vite build
      - name: Create release tarball
        run: tar -czf web-dist.tar.gz -C apps/web/dist .
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" web-dist.tar.gz --title "${{ github.ref_name }}" --generate-notes
