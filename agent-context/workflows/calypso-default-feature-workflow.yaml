version: 1
name: calypso-default-feature-workflow
initial_state: feature-definition

feature_unit:
  invariant: feature-equals-branch-equals-worktree-equals-pr
  branch_from: main
  branch_required: true
  worktree_required: true
  push_to_origin_required: true
  pull_request_required: true

prd_requirements:
  read_before_feature_definition: true
  source_documents:
    - docs/prd.md

pull_request_template:
  required_sections:
    - id: motivation
      label: Motivation
      type: prose
    - id: features
      label: Features
      type: checklist
    - id: test-plan
      label: Test Plan
      type: checklist
  completion_checks:
    - pull-request-open
    - pull-request-description-has-required-sections
    - pull-request-features-is-checklist
    - pull-request-test-plan-is-checklist

states:
  feature-definition:
    kind: agent
    role: feature-definer
    prompt: |
      Read the project PRD, define the feature unit, create a new worktree on a new branch forked from main, push the branch to origin, open the pull request, and write the PR description using the required template.
    completion:
      all_of:
        - prd-read
        - worktree-created-from-main
        - branch-created-from-main
        - branch-pushed-to-origin
        - pull-request-open
        - pull-request-description-has-required-sections
        - pull-request-features-is-checklist
        - pull-request-test-plan-is-checklist
    next:
      on_success: pr-template-review
      on_failure: blocked

  pr-template-review:
    kind: agent
    role: pr-template-reviewer
    prompt: |
      Review the pull request for correctness against the required template. Confirm that motivation is present, and that features and test plan are both checklist sections matching the intended scope.
    completion:
      all_of:
        - pr-template-correct
    next:
      on_success: architecture-plan
      on_failure: feature-definition

  architecture-plan:
    kind: agent
    role: architect
    prompt: |
      Read the PRD and the current pull request, then produce the implementation and architecture plan needed for the feature unit. Commit the planning changes, push the branch, and update the pull request description before completing the state.
    completion:
      all_of:
        - implementation-plan-ready
        - prd-impl-plan-reconciled
        - branch-has-new-commit
        - branch-pushed-to-origin
        - pr-description-current
    next:
      on_success: scaffold-tdd
      on_failure: blocked

  scaffold-tdd:
    kind: agent
    role: engineer
    prompt: |
      Prepare or extend the scaffold and test-first structure required for the feature before broad implementation continues. Commit the scaffold changes, push the branch, and update the pull request description before completing the state.
    completion:
      all_of:
        - scaffold-ready
        - tests-added-first
        - branch-has-new-commit
        - branch-pushed-to-origin
        - pr-description-current
    next:
      on_success: implementation
      on_failure: blocked

  implementation:
    kind: agent
    role: engineer
    prompt: |
      Implement the feature in small, reviewable increments while keeping the pull request description, plan, and blueprint alignment current.
    completion:
      any_of:
        - implementation-complete
        - clarification-required
    next:
      on:
        implementation-complete: deterministic-validation
        clarification-required: waiting-for-human
        gate-failed: blocked

  waiting-for-human:
    kind: human
    role: operator
    prompt: |
      Answer the blocking clarification so implementation can continue.
    completion:
      all_of:
        - clarification-answered
    next:
      on_success: implementation

  deterministic-validation:
    kind: deterministic
    checks:
      - pre-commit-hard-gates-passing
      - commit-message-metadata-valid
      - pre-push-blueprint-audit-passing
      - pre-push-quality-passing
      - ci-quality-gate-green
      - ci-unit-tests-green
      - ci-api-tests-green
      - ci-component-tests-green
      - ci-e2e-tests-green
      - ci-pg-container-tests-green
      - blueprint-policy-clean
    next:
      on_pass: ready-for-review
      on_fail: blocked

  ready-for-review:
    kind: agent
    role: release-reviewer
    prompt: |
      Review the feature branch, confirm the PR feature checklist and test plan checklist are complete, and verify the PR description still matches the implemented scope.
    completion:
      all_of:
        - pr-features-checkboxes-complete
        - pr-test-plan-checkboxes-complete
        - pr-description-current
    next:
      on_success: merge-readiness
      on_failure: implementation

  merge-readiness:
    kind: deterministic
    checks:
      - main-clean-mergeable
      - review-approved
      - ci-quality-gate-green
      - ci-unit-tests-green
      - ci-api-tests-green
      - ci-component-tests-green
      - ci-e2e-tests-green
      - ci-pg-container-tests-green
    next:
      on:
        pass: merge-queue
        main-clean-mergeable-failed: merge-reconciliation
        fail: blocked

  merge-queue:
    kind: agent
    role: merge-queue
    prompt: |
      Evaluate the current feature against the active merge queue and decide landing order. Record which features are ahead of this one, which are behind it, why this ordering is correct, and whether this feature is currently the queue head eligible to merge. The merge-queue agent, not a human, is responsible for executing the merge when the feature reaches queue head.
    completion:
      all_of:
        - merge-queue-position-assigned
        - merge-order-explained
      any_of:
        - current-feature-at-queue-head
        - waiting-for-earlier-feature
    next:
      on:
        current-feature-at-queue-head: awaiting-merge
        waiting-for-earlier-feature: blocked
        fail: blocked

  awaiting-merge:
    kind: agent
    role: merge-queue
    prompt: |
      Execute the pull request merge now that this feature is at the head of the merge queue. Only merge if queue ordering, required approvals, and required deterministic checks still hold.
    completion:
      all_of:
        - pull-request-merged
    next:
      on_success: done
      on_failure: blocked

  merge-reconciliation:
    kind: agent
    role: documentation-merge
    prompt: |
      Reconcile the feature branch with main so the pull request can merge cleanly. When documentation conflicts exist, read the competing versions, infer author intent based on which documents are newer and what changed, and rewrite the document into one coherent result instead of preserving garbled merge output. Commit the reconciliation, push the branch, and update the pull request description before completing the state.
    completion:
      all_of:
        - documentation-merge-resolved
        - main-clean-mergeable
        - branch-has-new-commit
        - branch-pushed-to-origin
        - pr-description-current
    next:
      on_success: merge-readiness
      on_failure: blocked

  done:
    kind: terminal

  blocked:
    kind: human
    role: operator-or-orchestrator
    prompt: |
      Resolve the blocking issue or explicitly redirect the feature.
    next:
      on:
        issue-cleared: implementation
        redefine-feature: feature-definition
        abort: aborted

  aborted:
    kind: terminal

checks:
  prd-read:
    kind: deterministic
  worktree-created-from-main:
    kind: deterministic
  branch-created-from-main:
    kind: deterministic
  branch-pushed-to-origin:
    kind: deterministic
  branch-has-new-commit:
    kind: deterministic
  pull-request-open:
    kind: deterministic
  pull-request-description-has-required-sections:
    kind: deterministic
  pull-request-features-is-checklist:
    kind: deterministic
  pull-request-test-plan-is-checklist:
    kind: deterministic
  pr-template-correct:
    kind: agent
    role: pr-template-reviewer
  implementation-plan-ready:
    kind: agent
    role: architect
  prd-impl-plan-reconciled:
    kind: agent
    role: documentation-merge
  scaffold-ready:
    kind: agent
    role: engineer
  tests-added-first:
    kind: agent
    role: engineer
  implementation-complete:
    kind: agent
    role: engineer
  clarification-required:
    kind: agent
    role: engineer
  clarification-answered:
    kind: human
  pre-commit-hard-gates-passing:
    kind: deterministic
    source: git-hook
    hook: pre-commit
    description: >
      Blocking pre-commit gates pass: no doc merge markers in staged docs, required
      planning files are staged, no forbidden JS files or package usage are introduced,
      no mocking or skipped tests are introduced, and no forbidden packages are added.
  commit-message-metadata-valid:
    kind: deterministic
    source: git-hook
    hook: commit-msg
    description: >
      Blocking commit message gates pass: CALYPSO_CHECKLIST has no unchecked items and
      GIT_BRAIN_METADATA exists with valid schema.
  pre-push-blueprint-audit-passing:
    kind: deterministic
    source: git-hook
    hook: pre-push
    description: >
      Blocking pre-push blueprint audit passes: no JavaScript logic files in apps/packages
      and no forbidden packages in package manifests.
  pre-push-quality-passing:
    kind: deterministic
    source: git-hook
    hook: pre-push
    description: >
      Blocking pre-push quality checks pass: eslint, prettier check, and TypeScript noEmit.
  ci-quality-gate-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/quality-gate.yml
    description: Quality Gate workflow is green.
  ci-unit-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-unit.yml
    description: Unit Tests workflow is green.
  ci-api-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-api.yml
    description: API Integration Tests workflow is green.
  ci-component-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-component.yml
    description: React Component Tests workflow is green.
  ci-e2e-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-e2e.yml
    description: Full-Page User Story Tests workflow is green.
  ci-pg-container-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-pg-container.yml
    description: PG Container Tests workflow is green.
  blueprint-policy-clean:
    kind: agent
    role: blueprint
  pr-features-checkboxes-complete:
    kind: agent
    role: release-reviewer
  pr-test-plan-checkboxes-complete:
    kind: agent
    role: release-reviewer
  pr-description-current:
    kind: agent
    role: pr-editor
  main-clean-mergeable:
    kind: deterministic
    builtin: builtin.git.is_main_compatible
    description: Pull request branch can merge with main without conflicts.
  documentation-merge-resolved:
    kind: agent
    role: documentation-merge
  review-approved:
    kind: human
  merge-queue-position-assigned:
    kind: agent
    role: merge-queue
  merge-order-explained:
    kind: agent
    role: merge-queue
  current-feature-at-queue-head:
    kind: agent
    role: merge-queue
  waiting-for-earlier-feature:
    kind: agent
    role: merge-queue
  pull-request-merged:
    kind: deterministic

agent_prompts:
  feature-definer: |
    Read the project PRD, define the feature unit, create the worktree and branch from main, push the branch to origin, open the pull request, and populate the PR description with motivation, features, and test plan.
  pr-template-reviewer: |
    Review the pull request for correctness against the required template. Motivation must exist as prose. Features and test plan must exist as checklists and match the intended scope.
  architect: |
    Read the PRD and current pull request, then produce the architecture and implementation plan needed for the feature.
  engineer: |
    Execute the current engineering state in small, reviewable steps while preserving TDD discipline and keeping the feature scope aligned.
  documentation-merge: |
    Reconcile product and implementation documents semantically so the current scope, plan, and constraints stay aligned.
    When documentation conflicts exist, read both versions, infer author intent from recency and surrounding changes, and rewrite one coherent document rather than preserving garbled merge output.
  blueprint: |
    Review current transcripts and planned work for drift from the documented blueprint and process rules.
  pr-editor: |
    Keep the pull request description aligned with the current feature state and gate checklist.
  release-reviewer: |
    Confirm the PR feature checklist and test plan checklist are complete and that the PR description still matches the implemented feature.
  merge-queue: |
    Define and execute the merge queue for merge-ready features. Decide which features land first, record the ordering rationale, identify dependencies or conflicts that force one feature to wait behind another, mark the queue-head feature, and perform the merge when that feature is the next correct PR to land on main.

hard_gates:
  git_hooks:
    - hook: pre-commit
      blocking: true
      checks:
        - pre-commit-hard-gates-passing
    - hook: commit-msg
      blocking: true
      checks:
        - commit-message-metadata-valid
    - hook: pre-push
      blocking: true
      checks:
        - pre-push-blueprint-audit-passing
        - pre-push-quality-passing
  ci_workflows:
    - workflow: .github/workflows/quality-gate.yml
      blocking: true
      check: ci-quality-gate-green
    - workflow: .github/workflows/test-unit.yml
      blocking: true
      check: ci-unit-tests-green
    - workflow: .github/workflows/test-api.yml
      blocking: true
      check: ci-api-tests-green
    - workflow: .github/workflows/test-component.yml
      blocking: true
      check: ci-component-tests-green
    - workflow: .github/workflows/test-e2e.yml
      blocking: true
      check: ci-e2e-tests-green
    - workflow: .github/workflows/test-pg-container.yml
      blocking: true
      check: ci-pg-container-tests-green
  merge_compatibility:
    blocking: true
    check: main-clean-mergeable
    remediation_state: merge-reconciliation
