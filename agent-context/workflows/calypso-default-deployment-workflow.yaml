version: 1
name: calypso-default-deployment-workflow
initial_state: release-candidate

release_requirements:
  source_branch: main
  tag_required: true
  tag_format: semver-plus-pr-hash6
  tag_format_examples:
    - v1.2.3+abc123
    - v2.0.0+9f27d1
  tag_constraints:
    - tag-applies-to-main-commit
    - all-required-ci-green-on-tagged-commit

artifact_requirements:
  github_release_required: true
  github_release_asset_required: true
  ghcr_images_required: true
  kubernetes-image-ready-signal_required: true

rollout_order:
  - database-migrations
  - frontend
  - workers
  - static-web

states:
  release-candidate:
    kind: deterministic
    checks:
      - main-commit-selected
      - ci-quality-gate-green
      - ci-unit-tests-green
      - ci-api-tests-green
      - ci-component-tests-green
      - ci-e2e-tests-green
      - ci-pg-container-tests-green
    next:
      on_pass: tag-release
      on_fail: blocked

  tag-release:
    kind: agent
    role: release-manager
    prompt: |
      Create a release tag on a commit that is already on main and already has all required CI checks passing. The tag must use semver plus the six-digit PR hash suffix.
    completion:
      all_of:
        - release-tag-created
        - release-tag-format-valid
        - tag-applies-to-main-commit
        - all-required-ci-green-on-tagged-commit
    next:
      on_success: publish-release
      on_failure: blocked

  publish-release:
    kind: deterministic
    checks:
      - github-release-published
      - github-release-asset-published
      - ghcr-images-published
      - kubernetes-image-ready-signal-sent
    next:
      on_pass: wait-for-rollout-approval
      on_fail: blocked

  wait-for-rollout-approval:
    kind: human
    role: operator
    prompt: |
      Confirm rollout may begin for the prepared release artifacts.
    completion:
      all_of:
        - rollout-approved
    next:
      on_success: database-migrations

  database-migrations:
    kind: agent
    role: deploy-orchestrator
    prompt: |
      Roll out the database migrations first. The release may proceed only if migrations complete cleanly and the new application remains compatible with both the previous and new schema versions.
    completion:
      all_of:
        - database-migrations-applied
        - running-system-healthy-after-migrations
    next:
      on_success: frontend-rollout
      on_failure: blocked

  frontend-rollout:
    kind: agent
    role: deploy-orchestrator
    prompt: |
      Roll out the frontend application deployment and verify the running system remains healthy.
    completion:
      all_of:
        - frontend-rollout-complete
        - running-system-healthy-after-frontend
    next:
      on_success: worker-rollout
      on_failure: blocked

  worker-rollout:
    kind: agent
    role: deploy-orchestrator
    prompt: |
      Roll out the worker deployments and verify the running system remains healthy.
    completion:
      all_of:
        - worker-rollout-complete
        - running-system-healthy-after-workers
    next:
      on_success: static-web-rollout
      on_failure: blocked

  static-web-rollout:
    kind: agent
    role: deploy-orchestrator
    prompt: |
      Roll out the static web tier last and verify the running system remains healthy end to end.
    completion:
      all_of:
        - static-web-rollout-complete
        - running-system-healthy-after-static-web
    next:
      on_success: done
      on_failure: blocked

  done:
    kind: terminal

  blocked:
    kind: human
    role: operator-or-orchestrator
    prompt: |
      Resolve the blocking release issue or abort the rollout.
    next:
      on:
        issue-cleared: release-candidate
        resume-rollout: database-migrations
        abort: aborted

  aborted:
    kind: terminal

checks:
  main-commit-selected:
    kind: deterministic
    description: Release candidate commit exists on main.
  ci-quality-gate-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/quality-gate.yml
    workflow_name: Quality Gate
  ci-unit-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-unit.yml
    workflow_name: Unit Tests
  ci-api-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-api.yml
    workflow_name: API Integration Tests
  ci-component-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-component.yml
    workflow_name: React Component Tests
  ci-e2e-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-e2e.yml
    workflow_name: Full-Page User Story Tests
  ci-pg-container-tests-green:
    kind: deterministic
    source: ci
    workflow: .github/workflows/test-pg-container.yml
    workflow_name: PG Container Tests
  release-tag-created:
    kind: deterministic
  release-tag-format-valid:
    kind: deterministic
  tag-applies-to-main-commit:
    kind: deterministic
  all-required-ci-green-on-tagged-commit:
    kind: deterministic
  github-release-published:
    kind: deterministic
  github-release-asset-published:
    kind: deterministic
    description: Release executable is published to GitHub.
  ghcr-images-published:
    kind: deterministic
    description: New release images are built and pushed to GHCR.
  kubernetes-image-ready-signal-sent:
    kind: deterministic
    description: Kubernetes deployment infrastructure is notified that the release images are ready.
  rollout-approved:
    kind: human
  database-migrations-applied:
    kind: deterministic
  running-system-healthy-after-migrations:
    kind: deterministic
  frontend-rollout-complete:
    kind: deterministic
  running-system-healthy-after-frontend:
    kind: deterministic
  worker-rollout-complete:
    kind: deterministic
  running-system-healthy-after-workers:
    kind: deterministic
  static-web-rollout-complete:
    kind: deterministic
  running-system-healthy-after-static-web:
    kind: deterministic

agent_prompts:
  release-manager: |
    Tag the release on a commit already on main, verify the tag format is semver plus the six-digit PR hash, and do not proceed unless all required CI checks passed on that exact commit.
  deploy-orchestrator: |
    Execute the current rollout phase in order, verify the running system after the phase completes, and stop the rollout immediately if the health checks do not hold.

github_actions:
  current_required:
    - workflow: .github/workflows/quality-gate.yml
      workflow_name: Quality Gate
      used_for:
        - ci-quality-gate-green
    - workflow: .github/workflows/test-unit.yml
      workflow_name: Unit Tests
      used_for:
        - ci-unit-tests-green
    - workflow: .github/workflows/test-api.yml
      workflow_name: API Integration Tests
      used_for:
        - ci-api-tests-green
    - workflow: .github/workflows/test-component.yml
      workflow_name: React Component Tests
      used_for:
        - ci-component-tests-green
    - workflow: .github/workflows/test-e2e.yml
      workflow_name: Full-Page User Story Tests
      used_for:
        - ci-e2e-tests-green
    - workflow: .github/workflows/test-pg-container.yml
      workflow_name: PG Container Tests
      used_for:
        - ci-pg-container-tests-green
  proposed_required:
    - workflow: .github/workflows/test-schema-upgrade-compatibility.yml
      workflow_name: Schema Upgrade Compatibility
      purpose: Validate new application code against both previous and new schema versions using plausible fixtures.
    - workflow: .github/workflows/release-cli.yml
      workflow_name: Release CLI
      used_for:
        - github-release-asset-published
      purpose: Build the release executable and attach it to the GitHub release for the tagged main commit.
    - workflow: .github/workflows/release-ghcr-images.yml
      workflow_name: Release GHCR Images
      used_for:
        - ghcr-images-published
      purpose: Build and publish release-tagged deployment images to GHCR.
    - workflow: .github/workflows/signal-k8s-images-ready.yml
      workflow_name: Signal K8s Images Ready
      used_for:
        - kubernetes-image-ready-signal-sent
      purpose: Notify Kubernetes infrastructure that release images are ready for rollout.
    - workflow: .github/workflows/rollout-database.yml
      workflow_name: Rollout Database
      used_for:
        - database-migrations-applied
        - running-system-healthy-after-migrations
      purpose: Apply production database migrations and verify post-migration health.
    - workflow: .github/workflows/rollout-frontend.yml
      workflow_name: Rollout Frontend
      used_for:
        - frontend-rollout-complete
        - running-system-healthy-after-frontend
      purpose: Roll out frontend application workloads and verify running health.
    - workflow: .github/workflows/rollout-workers.yml
      workflow_name: Rollout Workers
      used_for:
        - worker-rollout-complete
        - running-system-healthy-after-workers
      purpose: Roll out worker workloads and verify running health.
    - workflow: .github/workflows/rollout-static-web.yml
      workflow_name: Rollout Static Web
      used_for:
        - static-web-rollout-complete
        - running-system-healthy-after-static-web
      purpose: Roll out the static web tier last and verify end-to-end health.
